<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crucibulum</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; }
:root {
  --bg: #070b13;
  --bg-elevated: rgba(10, 16, 30, 0.88);
  --surface: rgba(11, 18, 32, 0.78);
  --surface-strong: rgba(10, 17, 31, 0.94);
  --surface-glass: rgba(19, 31, 56, 0.45);
  --line: rgba(92, 124, 170, 0.24);
  --line-soft: rgba(92, 124, 170, 0.14);
  --text: #e6edf3;
  --text-dim: #a7b4c6;
  --text-muted: #71839b;
  --cyan: #59f4d2;
  --blue: #6aa8ff;
  --violet: #b890ff;
  --amber: #f3b84b;
  --green: #49d17d;
  --red: #ff6762;
  --pink: #ff7fe1;
  --shadow: 0 30px 100px rgba(0, 0, 0, 0.4);
  --shadow-panel: 0 18px 50px rgba(3, 8, 18, 0.55);
  --mono: 'JetBrains Mono', monospace;
  --body: 'IBM Plex Sans', sans-serif;
}
html, body {
  margin: 0;
  height: 100%;
  background:
    radial-gradient(circle at 0% 0%, rgba(106,168,255,0.14), transparent 24%),
    radial-gradient(circle at 82% 0%, rgba(184,144,255,0.12), transparent 26%),
    radial-gradient(circle at 100% 100%, rgba(89,244,210,0.12), transparent 24%),
    linear-gradient(180deg, #09101c 0%, #070b13 52%, #060910 100%);
  color: var(--text);
  font-family: var(--body);
}
body::before {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  background:
    radial-gradient(circle at 18% 18%, rgba(89,244,210,0.08), transparent 18%),
    radial-gradient(circle at 75% 30%, rgba(106,168,255,0.08), transparent 20%),
    radial-gradient(circle at 60% 82%, rgba(255,127,225,0.06), transparent 18%);
  filter: blur(12px);
  animation: drift 14s ease-in-out infinite;
}
@keyframes drift {
  0%, 100% { transform: translate3d(0, 0, 0) scale(1); }
  50% { transform: translate3d(0, -10px, 0) scale(1.02); }
}
@keyframes breathe {
  0%, 100% { box-shadow: var(--shadow-panel), 0 0 0 1px rgba(89,244,210,0.06); }
  50% { box-shadow: var(--shadow-panel), 0 0 0 1px rgba(89,244,210,0.12), 0 0 36px rgba(89,244,210,0.08); }
}
#app {
  position: relative;
  min-height: 100%;
  padding: 32px;
}
.shell {
  max-width: 1500px;
  margin: 0 auto;
  display: grid;
  gap: 24px;
}
.hero {
  position: relative;
  padding: 28px 30px;
  border: 1px solid var(--line);
  border-radius: 28px;
  background: linear-gradient(180deg, rgba(13,22,38,0.88), rgba(8,13,24,0.94));
  overflow: hidden;
  box-shadow: var(--shadow);
}
.hero::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, rgba(89,244,210,0.09), transparent 24%, transparent 76%, rgba(184,144,255,0.08));
  pointer-events: none;
}
.hero-top {
  display: flex;
  justify-content: space-between;
  gap: 20px;
  align-items: flex-start;
}
.brand {
  display: grid;
  gap: 8px;
}
.eyebrow, .section-label, .metric-label, .mini-label, .table-label {
  font-family: var(--mono);
  text-transform: uppercase;
  letter-spacing: 0.18em;
  font-size: 11px;
  color: var(--text-muted);
}
.title {
  font-family: var(--mono);
  font-size: 30px;
  line-height: 1;
  letter-spacing: 0.18em;
  margin: 0;
}
.subcopy {
  max-width: 760px;
  color: var(--text-dim);
  line-height: 1.7;
}
.hero-status {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  border-radius: 999px;
  background: rgba(89,244,210,0.08);
  border: 1px solid rgba(89,244,210,0.18);
  font-family: var(--mono);
  font-size: 12px;
  color: var(--cyan);
}
.hero-dot {
  width: 9px;
  height: 9px;
  border-radius: 999px;
  background: var(--cyan);
  box-shadow: 0 0 16px rgba(89,244,210,0.6);
}
.tabbar {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}
.tab {
  border: 1px solid var(--line);
  background: rgba(10, 18, 32, 0.55);
  color: var(--text-dim);
  padding: 12px 18px;
  border-radius: 16px;
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  cursor: pointer;
  transition: 180ms ease;
}
.tab.active {
  color: var(--text);
  border-color: rgba(89,244,210,0.28);
  background: linear-gradient(180deg, rgba(19,36,52,0.92), rgba(10,18,32,0.88));
  box-shadow: 0 0 0 1px rgba(89,244,210,0.12), 0 0 26px rgba(89,244,210,0.1);
}
.panel-grid {
  display: grid;
  grid-template-columns: 380px minmax(0, 1fr);
  gap: 24px;
  align-items: start;
}
.panel,
.stat-card,
.table-card,
.history-card,
.leaderboard-card,
.status-card {
  background: linear-gradient(180deg, rgba(15,24,40,0.78), rgba(8,13,24,0.96));
  border: 1px solid var(--line);
  border-radius: 24px;
  box-shadow: var(--shadow-panel);
  animation: breathe 6s ease-in-out infinite;
}
.panel {
  padding: 24px;
  display: grid;
  gap: 18px;
  position: sticky;
  top: 24px;
}
.panel-head {
  display: grid;
  gap: 8px;
}
.panel-title {
  margin: 0;
  font-family: var(--mono);
  font-size: 18px;
  letter-spacing: 0.08em;
}
.panel-copy {
  color: var(--text-dim);
  font-size: 14px;
  line-height: 1.7;
}
.field {
  display: grid;
  gap: 8px;
}
.field label {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text-muted);
}
.select,
.input,
.button {
  width: 100%;
  border: 1px solid rgba(111, 142, 188, 0.24);
  background: rgba(10, 17, 30, 0.86);
  color: var(--text);
  border-radius: 16px;
  padding: 14px 15px;
  font-family: var(--body);
  font-size: 14px;
}
.select:focus,
.input:focus {
  outline: none;
  border-color: rgba(89,244,210,0.34);
  box-shadow: 0 0 0 3px rgba(89,244,210,0.08);
}
.button {
  cursor: pointer;
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  background: linear-gradient(180deg, rgba(24,54,78,0.94), rgba(11,23,38,0.94));
  transition: 180ms ease;
}
.button:hover { transform: translateY(-1px); }
.button.primary {
  border-color: rgba(89,244,210,0.24);
  box-shadow: 0 0 0 1px rgba(89,244,210,0.08), 0 0 20px rgba(89,244,210,0.08);
}
.button.secondary {
  border-color: rgba(106,168,255,0.24);
}
.selector-note {
  padding: 14px 16px;
  border-radius: 16px;
  background: rgba(14, 24, 41, 0.74);
  border: 1px solid var(--line-soft);
  color: var(--text-dim);
  line-height: 1.7;
  min-height: 90px;
}
.live-run {
  padding: 14px 16px;
  border-radius: 18px;
  background: rgba(8, 14, 25, 0.9);
  border: 1px solid rgba(89,244,210,0.14);
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text-dim);
  display: grid;
  gap: 8px;
}
.metric-grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 16px;
}
.stat-card {
  padding: 18px 20px;
}
.metric-value {
  margin-top: 10px;
  font-family: var(--mono);
  font-size: 28px;
  color: var(--text);
}
.metric-sub {
  margin-top: 6px;
  color: var(--text-muted);
  font-size: 13px;
}
.content-grid {
  display: grid;
  grid-template-columns: 1.1fr 0.9fr;
  gap: 24px;
}
.table-card,
.history-card,
.leaderboard-card,
.status-card {
  padding: 20px;
  display: grid;
  gap: 16px;
}
.table-head {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  align-items: center;
}
.table-title {
  margin: 0;
  font-family: var(--mono);
  font-size: 14px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.table-meta {
  color: var(--text-muted);
  font-family: var(--mono);
  font-size: 11px;
}
.table-wrap {
  overflow: auto;
  border-radius: 18px;
  border: 1px solid var(--line-soft);
}
.table-wrap table {
  width: 100%;
  border-collapse: collapse;
  min-width: 560px;
}
.table-wrap th,
.table-wrap td {
  padding: 13px 14px;
  text-align: left;
  border-bottom: 1px solid rgba(90, 121, 166, 0.14);
  font-size: 13px;
}
.table-wrap th {
  font-family: var(--mono);
  color: var(--text-muted);
  letter-spacing: 0.08em;
  font-size: 11px;
  text-transform: uppercase;
}
.table-wrap td {
  color: var(--text-dim);
}
.table-wrap tr:last-child td { border-bottom: none; }
.badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 6px 10px;
  border-radius: 999px;
  font-family: var(--mono);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}
.badge.pass { background: rgba(73,209,125,0.12); color: var(--green); }
.badge.fail { background: rgba(255,103,98,0.12); color: var(--red); }
.badge.neutral { background: rgba(106,168,255,0.12); color: var(--blue); }
.badge.personality { background: rgba(255,127,225,0.12); color: var(--pink); }
.badge.benchmark { background: rgba(106,168,255,0.12); color: var(--blue); }
.badge.build { background: rgba(243,184,75,0.12); color: var(--amber); }
.empty {
  padding: 32px 18px;
  text-align: center;
  color: var(--text-muted);
  font-size: 14px;
}
.inline-family {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.12em;
}
.status-line {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  padding: 10px 12px;
  border-radius: 14px;
  background: rgba(12, 20, 34, 0.7);
  border: 1px solid var(--line-soft);
}
.status-line strong {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text);
}
.muted { color: var(--text-muted); }
@media (max-width: 1180px) {
  .panel-grid, .content-grid { grid-template-columns: 1fr; }
  .panel { position: static; }
}
@media (max-width: 780px) {
  #app { padding: 18px; }
  .hero-top { flex-direction: column; }
  .metric-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
}
</style>
</head>
<body>
<div id="app"></div>
<script>
const TAB_CONFIG = {
  personality: {
    key: 'personality',
    label: 'Personality',
    badge: 'personality',
    scoreFamilies: ['G'],
    taskFamilies: ['personality', 'identity'],
    headline: 'Identity, behavior, style, and instruction pressure.',
  },
  benchmark: {
    key: 'benchmark',
    label: 'Benchmark',
    badge: 'benchmark',
    scoreFamilies: ['A', 'B', 'D', 'E', 'F'],
    taskFamilies: ['poison_localization', 'spec_discipline', 'truthfulness', 'cost_efficiency', 'identity'],
    headline: 'Adversarial, discipline, truth, efficiency, and general benchmark pressure.',
  },
  build: {
    key: 'build',
    label: 'Build',
    badge: 'build',
    scoreFamilies: ['C'],
    taskFamilies: ['orchestration'],
    headline: 'Repo tasks. Multi-file fixes. Real build behavior under pressure.',
  },
};

const TASK_FAMILY_LABELS = {
  personality: 'Personality',
  identity: 'Identity',
  poison_localization: 'Poison',
  spec_discipline: 'Spec',
  truthfulness: 'Truthfulness',
  cost_efficiency: 'Efficiency',
  orchestration: 'Orchestration',
};

const state = {
  activeTab: localStorage.getItem('crucibulum-active-tab') || 'benchmark',
  tasks: [],
  adapters: [],
  providers: [],
  models: [],
  tabData: {},
  runState: {},
};

function esc(value) {
  return String(value ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function fmtPct(value) {
  return `${Number(value ?? 0)}%`;
}

function fmtMoney(value) {
  return `$${Number(value ?? 0).toFixed(4)}`;
}

function fmtDate(value) {
  if (!value) return 'Never';
  const date = new Date(value);
  return Number.isNaN(date.getTime()) ? String(value) : date.toLocaleString();
}

function apiUrl(path, families) {
  const url = new URL(path, window.location.origin);
  if (families && families.length) url.searchParams.set('families', families.join(','));
  return url.toString();
}

function defaultTabState(tabKey) {
  return {
    selectedTask: '',
    selectedAdapter: '',
    selectedProvider: '',
    selectedModel: '',
  };
}

async function fetchJSON(url) {
  const res = await fetch(url);
  if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
  return res.json();
}

async function loadBootData() {
  const [tasksRes, adaptersRes, providersRes, modelsRes] = await Promise.all([
    fetchJSON('/api/tasks'),
    fetchJSON('/api/adapters'),
    fetchJSON('/api/providers'),
    fetchJSON('/api/models'),
  ]);

  state.tasks = Array.isArray(tasksRes.tasks) ? tasksRes.tasks : [];
  state.adapters = Array.isArray(adaptersRes.adapters) ? adaptersRes.adapters : [];
  state.providers = Array.isArray(providersRes.providers) ? providersRes.providers : (Array.isArray(providersRes) ? providersRes : []);
  state.models = Array.isArray(modelsRes.models) ? modelsRes.models : [];

  for (const key of Object.keys(TAB_CONFIG)) {
    state.tabData[key] = defaultTabState(key);
    await refreshTabData(key);
  }
}

function taskOptionsForTab(tabKey) {
  const config = TAB_CONFIG[tabKey];
  return state.tasks
    .filter((task) => config.taskFamilies.includes(task.family))
    .sort((a, b) => String(a.id).localeCompare(String(b.id)));
}

function currentTask(tabKey) {
  const tabState = state.tabData[tabKey] || defaultTabState(tabKey);
  return taskOptionsForTab(tabKey).find((task) => task.id === tabState.selectedTask) || null;
}

async function refreshTabData(tabKey) {
  const config = TAB_CONFIG[tabKey];
  const [stats, leaderboard, runs] = await Promise.all([
    fetchJSON(apiUrl('/api/stats', config.scoreFamilies)),
    fetchJSON(apiUrl('/api/leaderboard', config.scoreFamilies)),
    fetchJSON(apiUrl('/api/runs', config.scoreFamilies)),
  ]);

  const tabState = state.tabData[tabKey] || defaultTabState(tabKey);
  const tasks = taskOptionsForTab(tabKey);
  if (!tabState.selectedTask && tasks[0]) tabState.selectedTask = tasks[0].id;
  if (!tabState.selectedAdapter && state.adapters[0]) tabState.selectedAdapter = state.adapters[0].id || state.adapters[0].adapter || state.adapters[0].key || '';
  if (!tabState.selectedModel && state.models[0]) tabState.selectedModel = state.models[0].id || state.models[0].name || state.models[0].model || '';
  state.tabData[tabKey] = {
    ...tabState,
    stats,
    leaderboard: leaderboard.leaderboard || [],
    runs: runs.runs || [],
  };
}

function setActiveTab(tabKey) {
  state.activeTab = tabKey;
  localStorage.setItem('crucibulum-active-tab', tabKey);
  render();
}

function updateTabField(tabKey, field, value) {
  state.tabData[tabKey] = { ...(state.tabData[tabKey] || defaultTabState(tabKey)), [field]: value };
  render();
}

function describeTask(task) {
  if (!task) return 'Select a task to see its objective and run it inside this family-isolated lane.';
  return task.diagnostic_purpose || task.title || task.id;
}

async function startRun(tabKey) {
  const tab = state.tabData[tabKey];
  if (!tab?.selectedTask || !tab?.selectedAdapter || !tab?.selectedModel) {
    alert('Select a task, adapter, and model first.');
    return;
  }

  state.runState[tabKey] = { status: 'starting', lines: ['Starting run...'], runId: null };
  render();

  try {
    const payload = {
      task: tab.selectedTask,
      adapter: tab.selectedAdapter,
      provider: tab.selectedProvider || null,
      model: tab.selectedModel,
      count: 1,
    };
    const result = await fetchJSON('/api/run', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
  } catch (err) {}
}

const originalFetchJSON = fetchJSON;
fetchJSON = async function(url, options) {
  const res = await fetch(url, options);
  if (!res.ok) {
    const text = await res.text();
    throw new Error(text || `${res.status} ${res.statusText}`);
  }
  return res.json();
};

async function handleRun(tabKey) {
  const tab = state.tabData[tabKey];
  if (!tab?.selectedTask || !tab?.selectedAdapter || !tab?.selectedModel) {
    alert('Select a task, adapter, and model first.');
    return;
  }

  state.runState[tabKey] = { status: 'starting', lines: ['Spinning up run chamber...'], runId: null };
  render();

  try {
    const result = await fetchJSON('/api/run', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        task: tab.selectedTask,
        adapter: tab.selectedAdapter,
        provider: tab.selectedProvider || null,
        model: tab.selectedModel,
        count: 1,
      }),
    });

    state.runState[tabKey] = {
      status: 'running',
      runId: result.run_id,
      lines: ['Run accepted.', `Run ID: ${result.run_id}`],
      result: null,
    };
    render();
    watchRun(tabKey, result.run_id);
  } catch (err) {
    state.runState[tabKey] = {
      status: 'error',
      runId: null,
      lines: [String(err)],
    };
    render();
  }
}

function watchRun(tabKey, runId) {
  const source = new EventSource(`/api/run/${encodeURIComponent(runId)}/live`);
  source.addEventListener('step', (event) => {
    try {
      const payload = JSON.parse(event.data);
      const line = payload.detail || payload.type || 'Step';
      state.runState[tabKey].lines.push(line);
      render();
    } catch {}
  });
  source.addEventListener('complete', async (event) => {
    source.close();
    const payload = JSON.parse(event.data);
    state.runState[tabKey].status = 'complete';
    state.runState[tabKey].result = payload;
    state.runState[tabKey].lines.push(payload.pass ? 'Run passed.' : 'Run completed with failures.');
    await refreshTabData(tabKey);
    render();
  });
  source.addEventListener('error', (event) => {
    source.close();
    try {
      const payload = JSON.parse(event.data);
      state.runState[tabKey].lines.push(payload.error || 'Run error');
    } catch {
      state.runState[tabKey].lines.push('Run stream closed.');
    }
    state.runState[tabKey].status = 'error';
    render();
  });
}

function renderTabs() {
  return Object.values(TAB_CONFIG).map((tab) => `
    <button class="tab ${state.activeTab === tab.key ? 'active' : ''}" onclick="setActiveTab('${tab.key}')">${esc(tab.label)}</button>
  `).join('');
}

function renderTaskOptions(tabKey) {
  const tabState = state.tabData[tabKey] || defaultTabState(tabKey);
  return taskOptionsForTab(tabKey).map((task) => `
    <option value="${esc(task.id)}" ${tabState.selectedTask === task.id ? 'selected' : ''}>${esc(task.id)} · ${esc(TASK_FAMILY_LABELS[task.family] || task.family)} · ${esc(task.difficulty)}</option>
  `).join('');
}

function renderAdapterOptions(tabKey) {
  const tabState = state.tabData[tabKey] || defaultTabState(tabKey);
  return state.adapters.map((adapter) => {
    const value = adapter.id || adapter.adapter || adapter.key || '';
    const label = adapter.label || adapter.name || value;
    return `<option value="${esc(value)}" ${tabState.selectedAdapter === value ? 'selected' : ''}>${esc(label)}</option>`;
  }).join('');
}

function renderProviderOptions(tabKey) {
  const tabState = state.tabData[tabKey] || defaultTabState(tabKey);
  const options = ['<option value="">Auto / none</option>'];
  for (const provider of state.providers) {
    const value = provider.id || provider.key || provider.name || '';
    const label = provider.label || provider.name || value;
    options.push(`<option value="${esc(value)}" ${tabState.selectedProvider === value ? 'selected' : ''}>${esc(label)}</option>`);
  }
  return options.join('');
}

function renderModelOptions(tabKey) {
  const tabState = state.tabData[tabKey] || defaultTabState(tabKey);
  return state.models.map((model) => {
    const value = model.id || model.name || model.model || '';
    const label = model.label || model.name || value;
    return `<option value="${esc(value)}" ${tabState.selectedModel === value ? 'selected' : ''}>${esc(label)}</option>`;
  }).join('');
}

function renderMetrics(tabKey) {
  const stats = state.tabData[tabKey]?.stats || {};
  const cards = [
    ['Pass rate', fmtPct(stats.pass_rate), 'Filtered for this lane only'],
    ['Avg score', fmtPct(stats.avg_score), 'Mean score across matched runs'],
    ['Total runs', String(stats.total_runs || 0), 'Historical completed runs'],
    ['Cost', fmtMoney(stats.total_cost_usd), 'Estimated spend in this lane'],
  ];
  return cards.map(([label, value, sub]) => `
    <div class="stat-card">
      <div class="metric-label">${esc(label)}</div>
      <div class="metric-value">${esc(value)}</div>
      <div class="metric-sub">${esc(sub)}</div>
    </div>
  `).join('');
}

function renderLeaderboard(tabKey) {
  const entries = state.tabData[tabKey]?.leaderboard || [];
  if (!entries.length) return '<div class="empty">No leaderboard rows for this lane yet.</div>';
  return `
    <div class="table-wrap">
      <table>
        <thead><tr><th>#</th><th>Model</th><th>Composite</th><th>Runs</th><th>Last run</th></tr></thead>
        <tbody>
          ${entries.slice(0, 14).map((entry, index) => `
            <tr>
              <td>${index + 1}</td>
              <td>${esc(entry.modelId)}</td>
              <td>${fmtPct(entry.composite)}</td>
              <td>${esc(entry.totalRuns)}</td>
              <td>${esc(fmtDate(entry.lastRun))}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  `;
}

function renderRuns(tabKey) {
  const runs = state.tabData[tabKey]?.runs || [];
  if (!runs.length) return '<div class="empty">No run history in this lane yet.</div>';
  return `
    <div class="table-wrap">
      <table>
        <thead><tr><th>Task</th><th>Family</th><th>Model</th><th>Score</th><th>Pass</th><th>Started</th></tr></thead>
        <tbody>
          ${runs.slice(0, 18).map((run) => `
            <tr>
              <td>${esc(run.task_id)}</td>
              <td><span class="inline-family">${esc(TASK_FAMILY_LABELS[run.family] || run.family)}</span></td>
              <td>${esc(run.model)}</td>
              <td>${fmtPct(run.score)}</td>
              <td><span class="badge ${run.pass ? 'pass' : 'fail'}">${run.pass ? 'Pass' : 'Fail'}</span></td>
              <td>${esc(fmtDate(run.timestamp))}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  `;
}

function renderRunStatus(tabKey) {
  const run = state.runState[tabKey];
  if (!run) {
    return '<div class="live-run"><div class="muted">No live run in this lane.</div></div>';
  }
  const badge = run.status === 'complete' ? 'pass' : run.status === 'error' ? 'fail' : 'neutral';
  return `
    <div class="live-run">
      <div class="status-line"><strong>Run chamber</strong><span class="badge ${badge}">${esc(run.status)}</span></div>
      ${run.runId ? `<div><span class="muted">Run ID:</span> ${esc(run.runId)}</div>` : ''}
      ${run.lines.map((line) => `<div>${esc(line)}</div>`).join('')}
    </div>
  `;
}

function renderActiveTab() {
  const tab = TAB_CONFIG[state.activeTab];
  const tabState = state.tabData[tab.key] || defaultTabState(tab.key);
  const task = currentTask(tab.key);
  return `
    <div class="panel-grid">
      <aside class="panel">
        <div class="panel-head">
          <div class="section-label">${esc(tab.label)} lane</div>
          <h2 class="panel-title">Single-task run chamber</h2>
          <div class="panel-copy">${esc(tab.headline)}</div>
        </div>
        <div class="field">
          <label>Task selector</label>
          <select class="select" onchange="updateTabField('${tab.key}', 'selectedTask', this.value)">${renderTaskOptions(tab.key)}</select>
        </div>
        <div class="selector-note">${esc(describeTask(task))}</div>
        <div class="field">
          <label>Adapter</label>
          <select class="select" onchange="updateTabField('${tab.key}', 'selectedAdapter', this.value)">${renderAdapterOptions(tab.key)}</select>
        </div>
        <div class="field">
          <label>Provider</label>
          <select class="select" onchange="updateTabField('${tab.key}', 'selectedProvider', this.value)">${renderProviderOptions(tab.key)}</select>
        </div>
        <div class="field">
          <label>Model</label>
          <select class="select" onchange="updateTabField('${tab.key}', 'selectedModel', this.value)">${renderModelOptions(tab.key)}</select>
        </div>
        <button class="button primary" onclick="handleRun('${tab.key}')">Run selected task</button>
        <button class="button secondary" onclick="reloadLane('${tab.key}')">Refresh lane data</button>
        ${renderRunStatus(tab.key)}
      </aside>
      <section style="display:grid; gap:24px; min-width:0;">
        <div class="metric-grid">${renderMetrics(tab.key)}</div>
        <div class="content-grid">
          <div class="leaderboard-card">
            <div class="table-head">
              <div>
                <div class="table-label">Leaderboard</div>
                <h3 class="table-title">${esc(tab.label)} models</h3>
              </div>
              <div class="table-meta">Families ${esc(tab.scoreFamilies.join(', '))}</div>
            </div>
            ${renderLeaderboard(tab.key)}
          </div>
          <div class="status-card">
            <div class="table-head">
              <div>
                <div class="table-label">Lane stats</div>
                <h3 class="table-title">Current filter envelope</h3>
              </div>
              <span class="badge ${esc(tab.badge)}">${esc(tab.label)}</span>
            </div>
            <div class="status-line"><strong>Score families</strong><span>${esc(tab.scoreFamilies.join(', '))}</span></div>
            <div class="status-line"><strong>Task families</strong><span>${esc(tab.taskFamilies.map((family) => TASK_FAMILY_LABELS[family] || family).join(', '))}</span></div>
            <div class="status-line"><strong>Selected task</strong><span>${esc(tabState.selectedTask || 'None')}</span></div>
            <div class="status-line"><strong>Selected model</strong><span>${esc(tabState.selectedModel || 'None')}</span></div>
          </div>
        </div>
        <div class="history-card">
          <div class="table-head">
            <div>
              <div class="table-label">Run history</div>
              <h3 class="table-title">${esc(tab.label)} run stream</h3>
            </div>
            <div class="table-meta">Filtered server-side</div>
          </div>
          ${renderRuns(tab.key)}
        </div>
      </section>
    </div>
  `;
}

async function reloadLane(tabKey) {
  await refreshTabData(tabKey);
  render();
}

function render() {
  document.getElementById('app').innerHTML = `
    <div class="shell">
      <section class="hero">
        <div class="hero-top">
          <div class="brand">
            <div class="eyebrow">Bioluminescent task chamber</div>
            <h1 class="title">CRUCIBULUM</h1>
            <div class="subcopy">Three isolated lanes now split task selection, leaderboard, history, and stats into their own family envelopes. No more single giant cross-family wall.</div>
          </div>
          <div class="hero-status"><span class="hero-dot"></span> Family-isolated control surface</div>
        </div>
      </section>
      <nav class="tabbar">${renderTabs()}</nav>
      ${renderActiveTab()}
    </div>
  `;
}

window.setActiveTab = setActiveTab;
window.updateTabField = updateTabField;
window.handleRun = handleRun;
window.reloadLane = reloadLane;

(async function boot() {
  try {
    await loadBootData();
    render();
  } catch (err) {
    document.getElementById('app').innerHTML = `
      <div class="shell">
        <section class="hero">
          <div class="eyebrow">Crucibulum</div>
          <h1 class="title">Boot failure</h1>
          <div class="subcopy">${esc(String(err))}</div>
        </section>
      </div>
    `;
  }
})();
</script>
</body>
</html>
