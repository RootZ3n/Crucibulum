function prAccent(val) {
  if (val >= 70) return 'green';
  if (val >= 50) return 'amber';
  return 'red';
}

function animateMetricTiles() {
  document.querySelectorAll('.summary-metrics .metric-value[data-target]').forEach(function(el) {
    var target = Number(el.getAttribute('data-target') || '0');
    var suffix = el.getAttribute('data-suffix') || '';
    var duration = 600;
    var start = performance.now();
    function tick(now) {
      var pct = Math.min((now - start) / duration, 1);
      var eased = 1 - Math.pow(1 - pct, 3);
      var next = Math.round(target * eased);
      el.textContent = next + suffix;
      if (pct < 1) requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  });
}

function dismissHeatmapTooltip() {
  var tooltip = document.getElementById('heatmap-tooltip');
  if (tooltip) tooltip.remove();
  document.querySelectorAll('.heatmap-cell.active').forEach(function(cell) {

  });
}

function wireHeatmapInteractions() {
  var grid = document.getElementById('heatmap-grid');
  if (!grid) return;
  grid.querySelectorAll('.heatmap-cell').forEach(function(cell) {
    cell.addEventListener('click', function(ev) {
      ev.stopPropagation();
      dismissHeatmapTooltip();
      cell.classList.add('active');
      var rect = cell.getBoundingClientRect();
      var parentRect = grid.getBoundingClientRect();
      var tooltip = document.createElement('div');
      tooltip.className = 'heatmap-tooltip';
      tooltip.id = 'heatmap-tooltip';
      tooltip.innerHTML =
        '<div class="heatmap-tooltip-title">' + cell.dataset.task + '</div>' +
        '<div class="heatmap-tooltip-line">Model: ' + cell.dataset.model + '</div>' +
        '<div class="heatmap-tooltip-line">Score: ' + cell.dataset.score + '%</div>' +
        '<div class="heatmap-tooltip-line">Time: ' + cell.dataset.time + '</div>';
      grid.appendChild(tooltip);
      var left = rect.left - parentRect.left - 80;
      left = Math.max(0, Math.min(left, parentRect.width - 220));
      tooltip.style.left = left + 'px';
      tooltip.style.top = Math.max(0, rect.top - parentRect.top - 88) + 'px';
    });
  });
  document.addEventListener('click', dismissHeatmapTooltip, { once: true });
}

// Extra cloud models always available as manual options
var extraCloudModels = [
  { id: 'arcee-ai/trinity-large-thinking', name: 'arcee-ai/trinity-large-thinking', adapter: 'openrouter', provider: 'openrouter', type: 'cloud', size: '' },
  { id: 'xiaomi/mimo-v2-pro', name: 'xiaomi/mimo-v2-pro', adapter: 'openrouter', provider: 'openrouter', type: 'cloud', size: '' },
  { id: 'claude-opus-4-6', name: 'claude-opus-4-6', adapter: 'anthropic', provider: 'anthropic', type: 'cloud', size: '' },
  { id: 'claude-sonnet-4-6', name: 'claude-sonnet-4-6', adapter: 'anthropic', provider: 'anthropic', type: 'cloud', size: '' },
];

function getAllModelsGrouped() {
  // Merge fetched models + extra cloud models (dedup by id+adapter)
  var all = models.slice();
  var seen = {};
  all.forEach(function(m) { seen[(m.adapter || m.provider || '') + ':' + (m.id || m.name)] = true; });
  extraCloudModels.forEach(function(m) {
    var key = m.adapter + ':' + m.id;
    if (!seen[key]) { all.push(m); seen[key] = true; }
  });
  // Sort: LOCAL first, then CLOUD
  var local = all.filter(function(m) { return (m.type || '').toLowerCase() !== 'cloud' && (m.provider || m.adapter || '').toLowerCase() !== 'openrouter' && (m.provider || m.adapter || '').toLowerCase() !== 'anthropic'; });
  var cloud = all.filter(function(m) { return (m.type || '').toLowerCase() === 'cloud' || (m.provider || m.adapter || '').toLowerCase() === 'openrouter' || (m.provider || m.adapter || '').toLowerCase() === 'anthropic'; });
  return { local: local, cloud: cloud, all: local.concat(cloud) };
}

function getModelsForProvider(providerId) {
  // First try flattened models
  var providerModels = models.filter(function(model) { return model.adapter === providerId; });
  // Fallback to provider catalog models
  if (providerModels.length === 0) {
    var entry = getProviderEntry(providerId);
    if (entry && entry.models && entry.models.length > 0) {
      providerModels = entry.models.map(function(m) {
        return { id: m.id, name: m.label || m.id, adapter: providerId };
      });
    }
  }
  // Always include extra cloud models for matching provider
  var extras = extraCloudModels.filter(function(m) { return m.adapter === providerId; });
  var seen = {};
  providerModels.forEach(function(m) { seen[m.id || m.name] = true; });
  extras.forEach(function(m) { if (!seen[m.id]) providerModels.push(m); });
  return providerModels;
}

function providerKindLabel(kind) {
  if (kind === 'cloud') return 'Cloud';
  if (kind === 'subprocess') return 'Subprocess';
  return 'Local';
}

function adapterKindLabel(kind) {
  return providerKindLabel(kind);
}

          model: savedModel || 'Unavailable',
          adapter: defaultProvider || 'Unavailable',
          runtime: 'Unavailable',
          judge: 'Deterministic Judge (authoritative)',
          secondOpinion: 'Disabled',
          qcReview: 'Disabled',
          usageLine: 'Tokens unavailable / Cost unavailable',
          tokens: 'Unavailable',
          cost: 'Unavailable',
          bundle: 'Bundle Signed',
          subcopy: 'Claim evaluated under controlled conditions.',
          scoreBarWidth: 0,
          trustBadges: '<div class="trust-badges">' +
            '<span class="trust-badge"><span class="trust-check">\u2713</span> Deterministic Judge (authoritative)</span>' +
            '<span class="trust-badge"><span class="trust-check">\u2713</span> Advisory Review Only</span>' +
            '<span class="trust-badge"><span class="trust-check">\u2713</span> Bundle Signed</span>' +
          '</div>',
        }) + '</div>' +
        '<div class="run-log-header">' +
          '<span id="run-log-task">--</span>' +
          '<span id="run-log-model" class="log-meta-item">--</span>' +
          '<span id="run-log-timer" class="log-meta-item">00:00</span>' +
        '</div>' +
        '<div class="run-log-progress">' +
          '<div class="run-log-progress-bar" id="run-progress-bar"></div>' +
        '</div>' +
        '<div class="run-log-body" id="run-log-body">' +
          (isRunning ? '' : '<div class="run-log-idle">Select a task and model to begin.</div>') +
        '</div>' +
      '</div>' +
    '</div>';

  // Wire task select change for info + context panel
  var taskSel = document.getElementById('run-task');
  if (taskSel) {
    taskSel.addEventListener('change', function() {
      var t = tasks.find(function(tk) { return tk.id === taskSel.value; });
      var infoEl = document.getElementById('task-info');
      var ctxEl = document.getElementById('task-context');
      if (t) {
        if (infoEl) {
          infoEl.textContent = (t.family || '') + (t.difficulty ? ' / ' + t.difficulty : '') + (t.title ? ' \u2014 ' + t.title : '');
        }
        if (ctxEl) {
          var ctxLines = [];
          if (t.family) ctxLines.push('<span class="ctx-label">Family:</span> ' + esc(t.family));
          if (t.difficulty) ctxLines.push('<span class="ctx-label">Difficulty:</span> ' + esc(t.difficulty));
          if (t.time_limit_sec) ctxLines.push('<span class="ctx-label">Time limit:</span> ' + t.time_limit_sec + 's');
          if (t.max_steps) ctxLines.push('<span class="ctx-label">Max steps:</span> ' + t.max_steps);
          if (t.public_tests_command) ctxLines.push('<span class="ctx-label">Tests:</span> ' + esc(t.public_tests_command));
          ctxEl.innerHTML = ctxLines.join('<br>');
          ctxEl.classList.add('visible');
        }
      } else {
        if (infoEl) infoEl.textContent = '';
        if (ctxEl) { ctxEl.innerHTML = ''; ctxEl.classList.remove('visible'); }
      }
    });
  }

  var providerSel = document.getElementById('run-provider');
  var modelInput = document.getElementById('run-model');  // now a <select>

  function updateRunFormState() {
    var providerId = providerSel ? providerSel.value : defaultProvider;
    var providerEntry = getProviderEntry(providerId);
    // Re-acquire model select in case DOM was rebuilt
    modelInput = document.getElementById('run-model');
    // Fallback to adapter catalog if provider catalog not loaded
    if (!providerEntry) {
      var adapterEntry = getAdapterEntry(providerId);
      if (adapterEntry) {
        providerEntry = {
          id: adapterEntry.id,
          label: adapterEntry.name,
          kind: adapterEntry.kind,
          available: adapterEntry.available,
          reason: adapterEntry.reason,
          adapter: adapterEntry.id,
          manualModelAllowed: adapterEntry.supports_custom_model,
          models: (adapterEntry.models || []).map(function(m) { return { id: m.id, label: m.name || m.id, available: m.available }; }),
          envKey: null,
        };
      }
    }

    var providerAvailability = document.getElementById('provider-availability');
    var judgeSummary = document.getElementById('judge-summary');
    var pipelineSummary = document.getElementById('pipeline-summary');

    // Provider availability — distinct status wording
    if (providerAvailability) {
      if (!providerEntry) {
        providerAvailability.textContent = 'No providers loaded. Check server connection.';
      } else if (providerEntry.available) {
        providerAvailability.textContent = '\u2713 ' + providerEntry.label + ' available.';
      } else {
        var reason = providerEntry.reason || '';
        var statusLabel = '';
        if (reason.match(/API_KEY|api.key|not configured/i)) {
          statusLabel = 'Config required: ';
        } else if (reason.match(/spawn|ENOENT|binary|not found/i)) {
          statusLabel = 'Binary required: ';
        } else if (reason.match(/not.implemented/i)) {
          statusLabel = 'Not yet implemented: ';
        } else {
          statusLabel = 'Unavailable: ';
        }
        providerAvailability.textContent = statusLabel + reason;
      }
    }

    // Model select — build directly from the models global (all from /api/models)
    // plus extra cloud models, grouped LOCAL first then CLOUD.
    var allSelectModels = models.slice();
    var seenIds = {};
    allSelectModels.forEach(function(m) { seenIds[m.id || m.name] = true; });
    extraCloudModels.forEach(function(m) {
      if (!seenIds[m.id]) { allSelectModels.push(m); seenIds[m.id] = true; }
    });

    var localModels = allSelectModels.filter(function(m) { return (m.type || m.kind || '') !== 'cloud'; });
    var cloudSelectModels = allSelectModels.filter(function(m) { return (m.type || m.kind || '') === 'cloud'; });

    console.log('[model-select] providerId:', providerId, 'models global:', models.length, 'local:', localModels.length, 'cloud:', cloudSelectModels.length);

    var modelSel = document.getElementById('run-model');
    if (modelSel) {
      var prevVal = modelSel.value || savedModel;
      var opts = '<option value="">-- Select a model --</option>';
      if (localModels.length > 0) {
        opts += '<optgroup label="Local Models">';
        localModels.forEach(function(m) {
          var name = m.name || m.id || '';
          var size = m.size || (m.metadata && m.metadata.size) || '';
          var sizeBadge = size ? ' [' + size + ']' : '';
          opts += '<option value="' + esc(name) + '">' + esc(name + sizeBadge) + '</option>';
        });
        opts += '</optgroup>';
      }
      if (cloudSelectModels.length > 0) {
        opts += '<optgroup label="Cloud Models">';
        cloudSelectModels.forEach(function(m) {
          var name = m.name || m.id || '';
          var size = m.size || (m.metadata && m.metadata.size) || '';
          var sizeBadge = size ? ' [' + size + ']' : '';
          var prov = m.provider || m.adapter || '';
          opts += '<option value="' + esc(name) + '">' + esc(name + sizeBadge + (prov ? ' \u2014 ' + prov : '')) + '</option>';
        });
        opts += '</optgroup>';
      }
      modelSel.innerHTML = opts;
      // Restore previous selection or auto-select first
      if (prevVal && modelSel.querySelector('option[value="' + CSS.escape(prevVal) + '"]')) {
        modelSel.value = prevVal;
      } else if (allSelectModels.length > 0) {
        modelSel.value = allSelectModels[0].name || allSelectModels[0].id || '';
      }
    }

    var modelAvailability = document.getElementById('model-availability');
    if (modelAvailability) {
      if (!providerEntry || !providerEntry.available) {
        modelAvailability.textContent = 'Provider unavailable. Select a different provider or fix configuration.';
      } else if (allSelectModels.length > 0) {
        modelAvailability.textContent = allSelectModels.length + ' model' + (allSelectModels.length === 1 ? '' : 's') + ' available.';
      } else {
        modelAvailability.textContent = 'No models available.';
      }
    }

    // Judge summary
    if (judgeSummary) {
      judgeSummary.innerHTML =
        '<span class="ctx-label">Type:</span> ' + esc(judgeMeta.label || 'Judge: deterministic') + '<br>' +
        '<span class="ctx-label">Method:</span> ' + esc(judgeMeta.description || '') + '<br>' +
        '<span class="ctx-label">Verifier model:</span> ' + esc(judgeMeta.verifier_model || 'none');
    }

    // Review layer toggles
    var soEnabled = document.getElementById('review-so-enabled');
    var soFields = document.getElementById('review-so-fields');
    var qcEnabled = document.getElementById('review-qc-enabled');
    var qcFields = document.getElementById('review-qc-fields');
    if (soFields) soFields.style.display = (soEnabled && soEnabled.checked) ? 'block' : 'none';
    if (qcFields) qcFields.style.display = (qcEnabled && qcEnabled.checked) ? 'block' : 'none';

    // Populate review provider dropdowns with available cloud providers
    var reviewProviders = providers.filter(function(p) { return p.available && (p.kind === 'cloud' || p.kind === 'local'); });
    var reviewProvOpts = '<option value="">-- Provider --</option>' + reviewProviders.map(function(p) {
      return '<option value="' + esc(p.id) + '">' + esc((p.label || p.name) + ' [' + providerKindLabel(p.kind) + ']') + '</option>';
    }).join('');
    var soProv = document.getElementById('review-so-provider');
    var qcProv = document.getElementById('review-qc-provider');
    if (soProv && !soProv.dataset.init) { soProv.innerHTML = reviewProvOpts; soProv.dataset.init = '1'; }
    if (qcProv && !qcProv.dataset.init) { qcProv.innerHTML = reviewProvOpts; qcProv.dataset.init = '1'; }

    // Populate review model datalists based on selected review provider
    function fillReviewModels(provSelect, listId) {
      var rpid = provSelect ? provSelect.value : '';
      var rModels = getModelsForProvider(rpid);
      var rList = document.getElementById(listId);
      if (rList) {
        rList.innerHTML = rModels.map(function(m) {
          return '<option value="' + esc(m.id || m.name || '') + '">';
        }).join('');
      }
    }
    fillReviewModels(soProv, 'review-so-model-list');
    fillReviewModels(qcProv, 'review-qc-model-list');

    // Pipeline summary
    var taskId = taskSel ? taskSel.value : '';
    var currentModel = modelInput ? modelInput.value : '';
    var soOn = soEnabled && soEnabled.checked;
    var qcOn = qcEnabled && qcEnabled.checked;
    var reviewLine = 'none';
    if (soOn && qcOn) reviewLine = 'Second Opinion + QC Review';
    else if (soOn) reviewLine = 'Second Opinion';
    else if (qcOn) reviewLine = 'QC Review';

    if (pipelineSummary) {
      pipelineSummary.innerHTML = renderPipelineChain({
        task: taskId || 'Select task',
        provider: providerEntry ? providerEntry.label + ' [' + providerKindLabel(providerEntry.kind) + ']' : 'Select provider',
        model: currentModel || 'Enter model',
        judge: 'Deterministic Judge',
        review: reviewLine === 'none' ? 'Disabled' : reviewLine,
        bundle: 'Signed',
        taskState: taskId ? 'is-complete' : 'is-active',
        providerState: providerEntry && providerEntry.available ? 'is-complete' : 'is-waiting',
        modelState: currentModel ? 'is-complete' : 'is-waiting',
        judgeState: 'is-complete',
        reviewState: (soOn || qcOn) ? 'is-complete' : 'is-waiting',
        bundleState: 'is-waiting',
      });
    }

    var runBtn = document.getElementById('run-btn');
    var suiteBtn = document.getElementById('run-suite-btn');
    var hasTask = !!(taskSel && taskSel.value);
    var providerReady = providerEntry && providerEntry.available;
    var hasModel = !!(modelInput && modelInput.value.trim());
    if (runBtn && !isRunning) {
      runBtn.disabled = !hasTask || !providerReady || !hasModel;
    }
    if (suiteBtn && !isRunning) {
      suiteBtn.disabled = !providerReady || !hasModel;
    }
  }

  // Provider change: fetch fresh models then update form
  function onProviderChange() {
    var pid = providerSel ? providerSel.value : '';
    var needsFetch = /ollama|local/i.test(pid);
    if (needsFetch) {
      // Show loading state while fetching
      if (modelInput) modelInput.innerHTML = '<option value="">-- Loading models... --</option>';
      loadModels().then(function() {
        console.log('Models after provider change:', models.length);
        updateRunFormState();
      }).catch(function() {
        updateRunFormState();  // Fall back to cached models
      });
    } else {
      // For cloud providers, clear model input so auto-select can fire
      if (modelInput) modelInput.value = '';
      updateRunFormState();
    }
  }

  if (providerSel) providerSel.addEventListener('change', onProviderChange);
  if (modelInput) modelInput.addEventListener('change', updateRunFormState);
  if (taskSel) taskSel.addEventListener('change', updateRunFormState);

  // Wire review toggles
  var soChk = document.getElementById('review-so-enabled');
  var qcChk = document.getElementById('review-qc-enabled');
  if (soChk) soChk.addEventListener('change', updateRunFormState);
  if (qcChk) qcChk.addEventListener('change', updateRunFormState);
  var soProvSel = document.getElementById('review-so-provider');
  var qcProvSel = document.getElementById('review-qc-provider');
  if (soProvSel) soProvSel.addEventListener('change', updateRunFormState);
  if (qcProvSel) qcProvSel.addEventListener('change', updateRunFormState);

  // Initial load: fetch models for default provider, then update form
  (function() {
    var initialPid = providerSel ? providerSel.value : defaultProvider;
    if (/ollama|local/i.test(initialPid) && models.length === 0) {
      loadModels().then(function() {
        console.log('Models on initial load:', models.length);
        updateRunFormState();
      }).catch(function() {
        updateRunFormState();
      });
    } else {
      updateRunFormState();
    }
  })();
}

function setVerdictChamber(data) {

}

function setPipelineSummaryState(data) {
  var pipelineSummary = document.getElementById('pipeline-summary');
  if (!pipelineSummary) return;

async function startRun() {
  pressActionButton('run-btn');
  var taskId = document.getElementById('run-task') ? document.getElementById('run-task').value : '';
  var model = document.getElementById('run-model') ? document.getElementById('run-model').value : '';
  var count = parseInt((document.getElementById('run-count') ? document.getElementById('run-count').value : '1') || '1', 10);
  var providerId = document.getElementById('run-provider') ? document.getElementById('run-provider').value : '';
  var providerEntry = getProviderEntry(providerId);
  // Derive adapter from provider (provider IS the adapter in this architecture)
  var adapter = providerEntry ? providerEntry.adapter : providerId;

  if (!taskId) { showToast('Select a task.'); return; }
  if (!providerId) { showToast('Select a provider.'); return; }
  if (!model) { showToast('Enter a model name.'); return; }
  if (!providerEntry) { showToast('Unknown provider: ' + providerId); return; }
  if (!providerEntry.available) { showToast('Provider unavailable: ' + (providerEntry.reason || 'check configuration')); return; }

  localStorage.setItem('crucibulum-model', model);
  localStorage.setItem('crucibulum-provider', providerId);

  var btn = document.getElementById('run-btn');
  var logBody = document.getElementById('run-log-body');
  var progressBar = document.getElementById('run-progress-bar');
  var logTask = document.getElementById('run-log-task');
  var logModel = document.getElementById('run-log-model');
  var logTimer = document.getElementById('run-log-timer');
  var soEnabledChk = document.getElementById('review-so-enabled');
  var qcEnabledChk = document.getElementById('review-qc-enabled');

  btn.className = 'run-btn running';
  btn.innerHTML = '<span class="run-dot">\u25C9</span> EVALUATING...';
  btn.disabled = true;
  logBody.innerHTML = '';
  progressBar.style.width = '5%';
  if (logTask) logTask.textContent = taskId;
  if (logModel) logModel.textContent = (providerEntry ? providerEntry.label : providerId) + ' \u2192 ' + model;
  setRunFeedback({ title: 'Evaluation Running', step: 'Step 0/12 \u2014 initializing harness', tone: '' });
  setPipelineSummaryState({
    task: taskId || 'Select task',
    provider: providerEntry ? providerEntry.label + ' [' + providerKindLabel(providerEntry.kind) + ']' : 'Select provider',
    model: model || 'Enter model',
    judge: 'Deterministic Judge',
    review: ((soEnabledChk && soEnabledChk.checked) || (qcEnabledChk && qcEnabledChk.checked)) ? 'Advisory Review' : 'Disabled',
    bundle: 'Pending',
    taskState: 'is-complete',
    providerState: 'is-complete',
    modelState: 'is-complete',
    judgeState: 'is-active',
    reviewState: ((soEnabledChk && soEnabledChk.checked) || (qcEnabledChk && qcEnabledChk.checked)) ? 'is-active' : 'is-waiting',
    bundleState: 'is-waiting',
  });
  setVerdictChamber({
    verdict: 'Evaluating',
    stateTone: 'pending',
    score: null,
    confidence: 'Unavailable',
    provider: providerEntry ? providerEntry.label : providerId,
    model: model,
    adapter: adapter || 'Unavailable',
    runtime: 'In progress',
    judge: 'Deterministic Judge (authoritative)',
    secondOpinion: reviewStatusLabel((soEnabledChk && soEnabledChk.checked) ? {
      enabled: true,
      provider: (document.getElementById('review-so-provider') || {}).value || 'Unavailable',
      model: (document.getElementById('review-so-model') || {}).value || 'Unavailable',
      status: 'configured',
    } : null, 'Second Opinion'),
    qcReview: reviewStatusLabel((qcEnabledChk && qcEnabledChk.checked) ? {
      enabled: true,
      provider: (document.getElementById('review-qc-provider') || {}).value || 'Unavailable',
      model: (document.getElementById('review-qc-model') || {}).value || 'Unavailable',
      status: 'configured',
    } : null, 'QC Review'),
    usageLine: 'Token usage unavailable while run is active',
    tokens: 'Unavailable',
    cost: 'Unavailable',
    bundle: 'Pending signature',
    subcopy: 'Decision pending. Controlled evaluation in progress.',
    scoreBarWidth: 12,
    trustBadges: '<div class="trust-badges">' +
      '<span class="trust-badge"><span class="trust-check">\u2713</span> Deterministic Judge (authoritative)</span>' +
      '<span class="trust-badge"><span class="trust-check">\u2713</span> Advisory Review Only</span>' +
    '</div>',
  });

  // Start elapsed timer
  runStartTime = Date.now();
  if (runTimerInterval) clearInterval(runTimerInterval);
  runTimerInterval = setInterval(function() {
    if (logTimer && runStartTime) {
      var elapsed = Math.floor((Date.now() - runStartTime) / 1000);
      var mm = String(Math.floor(elapsed / 60)).padStart(2, '0');
      var ss = String(elapsed % 60).padStart(2, '0');
      logTimer.textContent = mm + ':' + ss;
    }
  }, 1000);

  try {
    // Build review config from form state
    var payload = {
      task: taskId,
      model: model,
      adapter: adapter,
      providerId: providerId,
      count: count,
      secondOpinion: (soEnabledChk && soEnabledChk.checked) ? {
        enabled: true,
        provider: (document.getElementById('review-so-provider') || {}).value || '',
        model: (document.getElementById('review-so-model') || {}).value || '',
      } : undefined,
      qcReview: (qcEnabledChk && qcEnabledChk.checked) ? {
        enabled: true,
        provider: (document.getElementById('review-qc-provider') || {}).value || '',
        model: (document.getElementById('review-qc-model') || {}).value || '',
      } : undefined,
    };
    var result = await api('POST', '/api/run', payload);
    var runId = result.run_id || result.runId || result.id;
    if (!runId) {
      appendLog(logBody, 'error', 'No run ID returned from API.');
      resetRunBtn();
      return;
    }

    activeRunId = runId;
    progressBar.style.width = '10%';
    appendLog(logBody, 'task_start', 'Run started: ' + runId);

    connectSSE(runId, logBody, progressBar);
  } catch (e) {
    appendLog(logBody, 'error', 'Failed to start run: ' + e.message);
    setRunFeedback({ title: 'Evaluation Interrupted', step: e.message, tone: 'error' });
    setVerdictChamber({
      verdict: 'Error',
      stateTone: 'error',
      score: null,
      confidence: 'Unavailable',
      provider: providerEntry ? providerEntry.label : providerId,
      model: model || 'Unavailable',
      adapter: adapter || 'Unavailable',
      runtime: 'Unavailable',
      judge: 'Deterministic Judge (authoritative)',
      secondOpinion: 'Second Opinion: Disabled',
      qcReview: 'QC Review: Disabled',
      usageLine: 'Unavailable',
      tokens: 'Unavailable',
      cost: 'Unavailable',
      bundle: 'Not recorded',
      subcopy: 'Evaluation failed before a verdict could be rendered.',
      scoreBarWidth: 0,
      trustBadges: '<div class="trust-badges"><span class="trust-badge"><span class="trust-check">\u2713</span> Deterministic Judge (authoritative)</span></div>',
    });
    resetRunBtn();
  }
}

    };
  }
  if (qcEnabledChk && qcEnabledChk.checked) {
    reviewPayload.qcReview = {
      enabled: true,
      provider: (document.getElementById('review-qc-provider') || {}).value || '',
      model: (document.getElementById('review-qc-model') || {}).value || '',
    };
  }

  appendLog(logBody, 'task_start', 'Suite run starting: ' + tasks.length + ' tasks');

  try {
    var result = await api('POST', '/api/run-suite', {
      model: model,
      adapter: adapter,
      provider: providerId,
      providerId: providerId,
      secondOpinion: reviewPayload.secondOpinion,
      qcReview: reviewPayload.qcReview,
    });

    var suiteId = result.suite_id;
    if (!suiteId) {
      appendLog(logBody, 'error', 'No suite ID returned.');
      resetRunBtn();
      return;
    }

    activeRunId = suiteId;
    appendLog(logBody, 'task_start', 'Suite ID: ' + suiteId);

    // Poll suite status
    var pollInterval = setInterval(async function() {
      try {
        var status = await api('GET', '/api/run-suite/' + encodeURIComponent(suiteId) + '/status');
        var completed = status.completed || 0;
        var total = status.total || 1;
        var pct = Math.min(5 + (completed / total) * 90, 95);
        progressBar.style.width = pct + '%';
        setRunFeedback({
          title: 'Evaluation Running',
          step: 'Step ' + completed + '/' + total + ' \u2014 suite execution in progress',
          tone: ''
        });

        // Log newly completed tasks
        if (status.results) {
          var shown = logBody.querySelectorAll('.suite-task-result').length;
          for (var i = shown; i < status.results.length; i++) {
            var r = status.results[i];
            var sc = Math.round((r.score || 0) * 100);
            var badge = r.pass ? '\x1b[32mPASS\x1b[0m' : '\x1b[31mFAIL\x1b[0m';
            var line = document.createElement('div');
            line.className = 'run-log-entry suite-task-result';
            var typeSpan = document.createElement('span');
            typeSpan.className = 'log-type ' + (r.pass ? 'type-complete' : 'type-error');
            typeSpan.textContent = r.pass ? 'PASS' : 'FAIL';
            line.appendChild(typeSpan);
            var textSpan = document.createElement('span');
            textSpan.className = 'log-text';
            textSpan.textContent = '  ' + (r.task_id || '--') + '  ' + sc + '%';
            line.appendChild(textSpan);
            logBody.appendChild(line);
            logBody.scrollTop = logBody.scrollHeight;
          }
        }

        if (status.status === 'complete' || status.status === 'error') {
          clearInterval(pollInterval);
          progressBar.style.width = '100%';
          progressBar.style.animation = 'none';
          progressBar.style.background = 'var(--pass)';
          setRunFeedback({
            title: status.status === 'complete' ? 'Evaluation Complete' : 'Evaluation Interrupted',
            step: status.status === 'complete' ? 'Suite verdict recorded' : 'Suite terminated with error',
            tone: status.status === 'complete' ? ((status.summary && status.summary.failed) ? 'fail' : 'pass') : 'error'
          });

          // Render suite summary
          var s = status.summary || {};
          var scoreArea = document.createElement('div');
          scoreArea.className = 'run-score-result';
          scoreArea.innerHTML =
            '<div style="font-family:var(--font-mono);font-size:11px;font-weight:600;letter-spacing:0.15em;text-transform:uppercase;color:var(--text-muted);margin-bottom:12px;">Suite Results</div>' +
            '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px;">' +
              '<div style="text-align:center;">' +
                '<div style="font-size:36px;font-weight:800;color:var(--pass);">' + (s.passed || 0) + '</div>' +
                '<div style="font-size:11px;color:var(--text-muted);">PASSED</div>' +
              '</div>' +
              '<div style="text-align:center;">' +
                '<div style="font-size:36px;font-weight:800;color:var(--fail);">' + (s.failed || 0) + '</div>' +
                '<div style="font-size:11px;color:var(--text-muted);">FAILED</div>' +
              '</div>' +
              '<div style="text-align:center;">' +
                '<div style="font-size:36px;font-weight:800;color:var(--active);">' + (s.pass_rate || 0) + '%</div>' +
                '<div style="font-size:11px;color:var(--text-muted);">PASS RATE</div>' +
              '</div>' +
            '</div>' +
            '<div style="font-family:var(--font-mono);font-size:12px;color:var(--text-secondary);line-height:1.8;">' +
              '<span style="color:var(--text-muted);">Tasks:</span> ' + (s.total || 0) + '<br>' +
              '<span style="color:var(--text-muted);">Avg score:</span> ' + (s.avg_score || 0) + '%<br>' +
              '<span style="color:var(--text-muted);">Total time:</span> ' + formatDuration(s.total_time_sec || 0) + '<br>' +
              '<span style="color:var(--text-muted);">Total tokens:</span> ' + ((s.total_tokens || 0)).toLocaleString() + '<br>' +
              '<span style="color:var(--text-muted);">Total cost:</span> $' + ((s.total_cost_usd || 0)).toFixed(4) + '<br>' +
              '<span class="compare-entry" onclick="navigate(\'history\')">View run history \u2192</span>' +
            '</div>';
          logBody.parentElement.appendChild(scoreArea);
          setVerdictChamber({
            verdict: 'Suite Complete',
            stateTone: (s.failed || 0) > 0 ? 'fail' : 'pass',
            score: s.avg_score != null ? s.avg_score : null,
            confidence: 'Validated',
            provider: providerEntry ? providerEntry.label : providerId,
            model: model,
            adapter: adapter || 'Unavailable',
            runtime: formatDuration(s.total_time_sec || 0),
            judge: 'Deterministic Judge (authoritative)',
            secondOpinion: reviewPayload.secondOpinion ? 'Second Opinion: configured for suite' : 'Second Opinion: Disabled',
            qcReview: reviewPayload.qcReview ? 'QC Review: configured for suite' : 'QC Review: Disabled',
            usageLine: 'Tasks ' + (s.total || 0) + ' / Pass rate ' + (s.pass_rate || 0) + '%',
            tokens: s.total_tokens != null ? (s.total_tokens || 0).toLocaleString() : 'Unavailable',
            cost: s.total_cost_usd != null ? '$' + ((s.total_cost_usd || 0)).toFixed(4) : 'Unavailable',
            bundle: 'Suite receipts recorded',
            subcopy: 'Decision rendered across the full suite.',
            scoreBarWidth: Math.max(6, Math.min(100, s.avg_score || 0)),
            trustBadges: '<div class="trust-badges">' +
              '<span class="trust-badge"><span class="trust-check">\u2713</span> Deterministic Judge (authoritative)</span>' +
              '<span class="trust-badge"><span class="trust-check">\u2713</span> Advisory Review Only</span>' +
              '<span class="trust-badge"><span class="trust-check">\u2713</span> Bundle Signed</span>' +
            '</div>',
          });
          setPipelineSummaryState({
            task: 'Full suite',
            provider: providerEntry ? providerEntry.label + ' [' + providerKindLabel(providerEntry.kind) + ']' : providerId,
            model: model,
            judge: 'Deterministic Judge',
            review: (reviewPayload.secondOpinion || reviewPayload.qcReview) ? 'Advisory Review' : 'Disabled',
            bundle: 'Validated',
            taskState: 'is-complete',
            providerState: 'is-complete',
            modelState: 'is-complete',
            judgeState: 'is-complete',
            reviewState: (reviewPayload.secondOpinion || reviewPayload.qcReview) ? 'is-complete' : 'is-waiting',
            bundleState: 'is-complete',
          });

          appendLog(logBody, 'complete', 'Suite complete: ' + (s.passed || 0) + '/' + (s.total || 0) + ' passed');

          activeRunId = null;
          if (runTimerInterval) clearInterval(runTimerInterval);
          runTimerInterval = null;
          resetRunBtn();

          loadRuns().then(function() {
            loadStats();
            updateSidebarStatus();
          });
        }
      } catch (err) {
        // Polling error — keep trying
      }
    }, 2000);

  } catch (e) {
    appendLog(logBody, 'error', 'Failed to start suite: ' + e.message);
    setRunFeedback({ title: 'Evaluation Interrupted', step: e.message, tone: 'error' });
    setVerdictChamber({
      verdict: 'Error',
      stateTone: 'error',
      score: null,
      confidence: 'Unavailable',
      provider: providerEntry ? providerEntry.label : providerId,
      model: model || 'Unavailable',
      adapter: adapter || 'Unavailable',
      runtime: 'Unavailable',
      judge: 'Deterministic Judge (authoritative)',
      secondOpinion: 'Second Opinion: Disabled',
      qcReview: 'QC Review: Disabled',
      usageLine: 'Unavailable',
      tokens: 'Unavailable',
      cost: 'Unavailable',
      bundle: 'Not recorded',
      subcopy: 'Suite start failed before controlled execution began.',
      scoreBarWidth: 0,
      trustBadges: '<div class="trust-badges"><span class="trust-badge"><span class="trust-check">\u2713</span> Deterministic Judge (authoritative)</span></div>',
    });
    resetRunBtn();
  }
}

function connectSSE(runId, logBody, progressBar) {
  if (activeEventSource) {
    activeEventSource.close();
  }

  var url = API_BASE + '/api/run/' + encodeURIComponent(runId) + '/live';
  var es = new EventSource(url);
  activeEventSource = es;
  var stepCount = 0;
  var totalSteps = 12;

  apiLog.push({
    method: 'SSE',
    path: '/api/run/' + runId + '/live',
    status: 'ok',
    statusCode: 'STREAM',
    time: new Date().toISOString(),
    duration: null,
  });
  renderTransparencyLog();

  es.addEventListener('step', function(e) {
    try {
      var data = JSON.parse(e.data);
      stepCount++;
      var pct = Math.min(10 + (stepCount / totalSteps) * 85, 95);
      progressBar.style.width = pct + '%';

      var stepNum = String(stepCount).padStart(2, '0');
      var typeLabel = (data.type || 'step').toUpperCase();
      var detail = '';
      var logType = data.type || 'task_start';

      if (data.type === 'file_read') {
        detail = data.path || '';
        typeLabel = 'READ';
      } else if (data.type === 'file_write') {
        detail = data.path || '';
        if (data.size) detail += '  ' + data.size + 'B';
        typeLabel = 'WRITE';
      } else if (data.type === 'shell') {
        detail = (data.command || '') + (data.exit_code !== undefined ? '  EXIT ' + data.exit_code : '');
        logType = data.exit_code === 0 ? 'shell-pass' : 'shell-fail';
        typeLabel = 'SHELL';
        if (data.exit_code === 0) {
          detail += '  \u2713';
        } else {
          detail += '  \u2717';
        }
      } else if (data.type === 'search') {
        detail = data.query || data.path || '';
        typeLabel = 'SEARCH';
      } else {
        detail = data.detail || data.path || data.command || '';
      }

      setRunFeedback({
        title: 'Evaluation Running',
        step: 'Step ' + Math.min(stepCount, totalSteps) + '/' + totalSteps + ' \u2014 ' + (detail || typeLabel.toLowerCase()),
        tone: ''
      });

      appendLog(logBody, logType, '[' + stepNum + ']  ' + typeLabel.padEnd(10) + detail);
    } catch (err) {
      appendLog(logBody, 'error', 'Parse error: ' + err.message);
    }
  });

  es.addEventListener('complete', function(e) {
    progressBar.style.width = '100%';
    progressBar.style.animation = 'none';
    progressBar.style.background = 'var(--pass)';
    setRunFeedback({ title: 'Evaluation Complete', step: 'Verdict sealed and bundle recorded', tone: 'pass' });
    try {
      var data = JSON.parse(e.data);
      appendLog(logBody, 'complete', 'DONE     Task complete                    \u2713');

      if (data.score || data.aggregate) {
        var scoreArea = document.createElement('div');
        scoreArea.className = 'run-score-result';
        var aggregate = data.aggregate || null;
        var total = aggregate ? Math.round((aggregate.avg_score || 0) * 100) : (typeof data.score === 'number' ? Math.round(data.score * 100) : Math.round((data.score.total || 0) * 100));
        var pass = aggregate ? !!(aggregate.pass_at && aggregate.pass_at.pass_at_1) : (typeof data.pass === 'boolean' ? data.pass : (data.score.pass || false));
        var bd = (data.score && data.score.breakdown) || {};
        var review = data.review || {};
        var reviewSecurity = review.security || {};
        var aggregateLine = aggregate
          ? '<div style="margin-top:12px;font-family:var(--font-mono);font-size:12px;color:var(--text-secondary);">Runs ' + aggregate.run_count +
            '  PASS@1 ' + (((aggregate.pass_at || {}).pass_at_1) ? 'YES' : 'NO') +
            '  PASS@3 ' + (((aggregate.pass_at || {}).pass_at_3) === null ? 'N/A' : (((aggregate.pass_at || {}).pass_at_3) ? 'YES' : 'NO')) +
            '  PASS@5 ' + (((aggregate.pass_at || {}).pass_at_5) === null ? 'N/A' : (((aggregate.pass_at || {}).pass_at_5) ? 'YES' : 'NO')) +
            '</div>'
          : '';
        var trustSurface = '<div class="trust-badges">' +
          '<span class="trust-badge"><span class="trust-check">\u2713</span> Deterministic Judge (authoritative)</span>' +
          '<span class="trust-badge"><span class="trust-check">\u2713</span> Advisory Review Only</span>' +
          (reviewSecurity.review_input_sanitized ? '<span class="trust-badge"><span class="trust-check">\u2713</span> Review Input Sanitized</span>' : '') +
          ((reviewSecurity.injection_flags_count || 0) > 0 ? '<span class="trust-badge"><span class="trust-check">\u2713</span> Injection Flags Detected</span>' : '') +
          (reviewSecurity.review_blocked_reason ? '<span class="trust-badge"><span class="trust-check">\u2713</span> Review Blocked</span>' : '') +
          '<span class="trust-badge"><span class="trust-check">\u2713</span> Bundle Signed</span>' +
        '</div>';
        scoreArea.innerHTML =
          '<div style="display:flex;align-items:center;gap:16px;margin-bottom:20px;">' +
            '<span style="font-family:var(--font-mono);font-size:62px;font-weight:800;color:var(--' + (pass ? 'pass' : 'fail') + ');">' + total + '%</span>' +
            '<span class="badge ' + (pass ? 'badge-pass' : 'badge-fail') + '">' + (aggregate ? ('PASS@1 ' + (pass ? 'PASS' : 'FAIL')) : (pass ? 'PASS' : 'FAIL')) + '</span>' +
          '</div>' +
          trustSurface +
          aggregateLine +
          '<div style="margin-top:16px;">' + renderScoreBars(bd) + '</div>';
        logBody.parentElement.appendChild(scoreArea);
        setVerdictChamber({
          verdict: reviewSecurity.review_blocked_reason ? 'Blocked' : (pass ? 'Pass' : 'Fail'),
          stateTone: reviewSecurity.review_blocked_reason ? 'blocked' : (pass ? 'pass' : 'fail'),
          score: total,
          confidence: aggregate ? (((aggregate.reliability || {}).assessment) || 'Unavailable') : ((((review.secondOpinion || {}).confidence) || ((review.qcReview || {}).confidence) || 'Unavailable')),
          provider: ((data.target || {}).provider) || 'Unavailable',
          model: ((data.target || {}).model) || 'Unavailable',
          adapter: ((data.target || {}).adapter) || 'Unavailable',
          runtime: document.getElementById('run-log-timer') ? document.getElementById('run-log-timer').textContent : 'Unavailable',
          judge: 'Deterministic Judge (authoritative)',
          secondOpinion: reviewStatusLabel(review.secondOpinion, 'Second Opinion'),
          qcReview: reviewStatusLabel(review.qcReview, 'QC Review'),
          usageLine: aggregate ? ('Tokens ' + (aggregate.total_tokens || 0) + ' / Cost $' + (((aggregate.total_cost_usd || 0).toFixed ? aggregate.total_cost_usd.toFixed(4) : aggregate.total_cost_usd))) : 'Tokens Unavailable / Cost Unavailable',
          tokens: aggregate ? String(aggregate.total_tokens || 0) : 'Unavailable',
          cost: aggregate ? ('$' + (((aggregate.total_cost_usd || 0).toFixed ? aggregate.total_cost_usd.toFixed(4) : aggregate.total_cost_usd))) : 'Unavailable',
          bundle: 'Bundle Signed',
          subcopy: reviewSecurity.review_blocked_reason ? 'Review blocked. Deterministic verdict stands.' : (aggregate ? ('Repeated runs complete. ' + (((aggregate.reliability || {}).assessment) || 'guarded') + ' reliability from stored evidence.') : 'Decision rendered under controlled conditions.'),
          scoreBarWidth: total,
          trustBadges: trustSurface,
        });
        setPipelineSummaryState({
          task: document.getElementById('run-task') ? (document.getElementById('run-task').value || 'Selected task') : 'Selected task',
          provider: ((data.target || {}).provider) || 'Unavailable',
          model: ((data.target || {}).model) || 'Unavailable',
          judge: 'Deterministic Judge',
          review: (review.secondOpinion && review.secondOpinion.enabled) || (review.qcReview && review.qcReview.enabled) ? 'Advisory Review' : 'Disabled',
          bundle: 'Validated',
          taskState: 'is-complete',
          providerState: 'is-complete',
          modelState: 'is-complete',
          judgeState: 'is-complete',
          reviewState: (review.secondOpinion && review.secondOpinion.enabled) || (review.qcReview && review.qcReview.enabled) ? 'is-complete' : 'is-waiting',
          bundleState: 'is-complete',
        });
      }
    } catch (err) {
      appendLog(logBody, 'complete', 'DONE     Task complete                    \u2713');
    }

    es.close();
    activeEventSource = null;
    activeRunId = null;
    if (runTimerInterval) clearInterval(runTimerInterval);
    runTimerInterval = null;
    resetRunBtn();

    loadRuns().then(function() {
      loadStats();
      updateSidebarStatus();
    });
  });

  es.addEventListener('error', function(e) {
    if (es.readyState === EventSource.CLOSED) return;
    if (e.data) {
      try {
        var data = JSON.parse(e.data);
        appendLog(logBody, 'error', 'ERROR: ' + (data.message || data.error || 'Unknown error'));
        setRunFeedback({ title: 'Evaluation Interrupted', step: data.message || data.error || 'Unknown error', tone: 'error' });
        setVerdictChamber({
          verdict: 'Error',
          stateTone: 'error',
          score: null,
          confidence: 'Unavailable',
          provider: 'Unavailable',
          model: 'Unavailable',
          adapter: 'Unavailable',
          runtime: document.getElementById('run-log-timer') ? document.getElementById('run-log-timer').textContent : 'Unavailable',
          judge: 'Deterministic Judge (authoritative)',
          secondOpinion: 'Second Opinion: Disabled',
          qcReview: 'QC Review: Disabled',
          usageLine: 'Unavailable',
          tokens: 'Unavailable',
          cost: 'Unavailable',
          bundle: 'Not recorded',
          subcopy: 'Execution stream reported an error.',
          scoreBarWidth: 0,
          trustBadges: '<div class="trust-badges"><span class="trust-badge"><span class="trust-check">\u2713</span> Deterministic Judge (authoritative)</span></div>',
        });
      } catch (err) {
        appendLog(logBody, 'error', 'ERROR: ' + e.data);
      }
    }
  });

  es.onerror = function() {
    if (activeRunId) {
      appendLog(logBody, 'error', 'Connection lost. Attempting reconnect...');
      setRunFeedback({ title: 'Evaluation Running', step: 'Stream interrupted \u2014 attempting reconnect', tone: 'error' });
      setTimeout(function() {
        if (es.readyState === EventSource.CLOSED) {
          activeEventSource = null;
          activeRunId = null;
          if (runTimerInterval) clearInterval(runTimerInterval);
          runTimerInterval = null;
          resetRunBtn();
          progressBar.style.width = '0%';
          appendLog(logBody, 'error', 'Connection permanently closed.');
          setRunFeedback({ title: 'Evaluation Interrupted', step: 'Connection permanently closed', tone: 'error' });
        }
      }, 5000);
    }
  };
}

function resetRunBtn() {
  var btn = document.getElementById('run-btn');
  if (btn) {
    btn.className = 'run-btn';
    btn.innerHTML = '\u25B6 RUN EVALUATION';
    btn.disabled = false;
  }
  var suiteBtn = document.getElementById('run-suite-btn');
  if (suiteBtn) {
    suiteBtn.className = 'run-btn-suite';
    suiteBtn.innerHTML = '\u25B6 RUN FULL SUITE';
    suiteBtn.disabled = false;
  }
  runStartTime = null;
  setTimeout(function() { setRunFeedback(null); }, 2200);
}

function appendLog(container, type, text) {
  if (!container) return;
  var idle = container.querySelector('.run-log-idle');
  if (idle) idle.remove();

  var line = document.createElement('div');
  line.className = 'log-line type-' + type;

  var now = new Date();
  var ts = String(now.getHours()).padStart(2, '0') + ':' +
           String(now.getMinutes()).padStart(2, '0') + ':' +
           String(now.getSeconds()).padStart(2, '0');

  var tsSpan = document.createElement('span');
  tsSpan.className = 'log-ts';
  tsSpan.textContent = '[' + ts + ']';
  line.appendChild(tsSpan);
  line.appendChild(document.createTextNode(text));
  container.appendChild(line);
  container.scrollTop = container.scrollHeight;
}

/* =========================================================================
   HISTORY VIEW
   ========================================================================= */
function renderHistory(el) {
  var uniqueTasks = [];
  var taskSet = {};
  runs.forEach(function(r) { if (r.task_id && !taskSet[r.task_id]) { taskSet[r.task_id] = true; uniqueTasks.push(r.task_id); } });
  var uniqueModels = [];
  var modelSet = {};
  runs.forEach(function(r) { if (r.model && !modelSet[r.model]) { modelSet[r.model] = true; uniqueModels.push(r.model); } });

  var taskFilterOpts = '<option value="">All Tasks</option>';
  uniqueTasks.forEach(function(t) {
    taskFilterOpts += '<option value="' + esc(t) + '" ' + (historyFilters.task === t ? 'selected' : '') + '>' + esc(t) + '</option>';
  });

  var modelFilterOpts = '<option value="">All Models</option>';
  uniqueModels.forEach(function(m) {
    modelFilterOpts += '<option value="' + esc(m) + '" ' + (historyFilters.model === m ? 'selected' : '') + '>' + esc(m) + '</option>';
  });

  var filtered = runs.filter(function(r) {
    if (historyFilters.task && r.task_id !== historyFilters.task) return false;
    if (historyFilters.model && r.model !== historyFilters.model) return false;
    if (historyFilters.status === 'pass' && !r.pass) return false;
    if (historyFilters.status === 'fail' && r.pass) return false;
    if (historyFilters.date) {
      var rd = (r.timestamp || '').slice(0, 10);
      if (rd !== historyFilters.date) return false;
    }
    return true;
  });

  if (sortState.column) {
    filtered = sortRuns(filtered, sortState.column, sortState.direction);
  }

  var rows = '';
  if (filtered.length > 0) {
    rows = filtered.map(function(r) {
      var sc = Math.round(r.score * 100);
      var badgeCls = r.pass ? 'badge-pass' : 'badge-fail';
      var badgeTxt = r.pass ? 'PASS' : 'FAIL';
      var date = formatDateShort(r.timestamp);
      return '<tr onclick="openBundle(\'' + esc(r.bundle_id || '') + '\')">' +
        '<td class="mono-bright">' + esc(shortId(r.bundle_id)) + '</td>' +
        '<td>' + taskFamilyPill(r.task_id, r.family) + '</td>' +
        '<td>' + esc(r.provider || r.adapter || '--') + '</td>' +
        '<td>' + esc(r.model || '--') + '</td>' +
        '<td class="' + scoreColumnClass(sc) + '">' + sc + '%</td>' +
        '<td class="col-time">' + formatDuration(r.duration_sec) + '</td>' +
        '<td>' + date + '</td>' +
        '<td><span class="badge ' + badgeCls + '">' + badgeTxt + '</span></td>' +
      '</tr>';
    }).join('');
  }

  var thSorted = function(col, label) {
    var cls = '';
    if (sortState.column === col) cls = sortState.direction === 'asc' ? 'sorted-asc' : 'sorted-desc';
    return '<th class="' + cls + '" onclick="sortHistory(\'' + col + '\')">' + label + '</th>';
  };

  el.innerHTML =
    '<div class="content-constrained">' +
    '<div class="filter-row">' +
      '<select onchange="historyFilters.task=this.value;renderView()">' + taskFilterOpts + '</select>' +
      '<select onchange="historyFilters.model=this.value;renderView()">' + modelFilterOpts + '</select>' +
      '<select onchange="historyFilters.status=this.value;renderView()">' +
        '<option value="" ' + (historyFilters.status === '' ? 'selected' : '') + '>All Status</option>' +
        '<option value="pass" ' + (historyFilters.status === 'pass' ? 'selected' : '') + '>Pass</option>' +
        '<option value="fail" ' + (historyFilters.status === 'fail' ? 'selected' : '') + '>Fail</option>' +
      '</select>' +
      '<input type="date" value="' + historyFilters.date + '" onchange="historyFilters.date=this.value;renderView()" style="color-scheme:dark;">' +
      '<button class="header-btn" onclick="exportHistoryJSON()" style="margin-left:auto;">Export JSON</button>' +
    '</div>' +
    '<div class="data-table-wrap">' +

function sortHistory(column) {
  if (sortState.column === column) {
    sortState.direction = sortState.direction === 'asc' ? 'desc' : 'asc';
  } else {
    sortState.column = column;
    sortState.direction = 'desc';
  }
  renderView();
}

function sortRuns(arr, col, dir) {
  var sorted = arr.slice();
  sorted.sort(function(a, b) {
    var va, vb;
    switch (col) {
      case 'id': va = a.bundle_id || ''; vb = b.bundle_id || ''; break;
      case 'task': va = a.task_id || ''; vb = b.task_id || ''; break;
      case 'model': va = a.model || ''; vb = b.model || ''; break;
      case 'score': va = a.score || 0; vb = b.score || 0; break;
      case 'time': va = a.duration_sec || 0; vb = b.duration_sec || 0; break;
      case 'date': va = a.timestamp || ''; vb = b.timestamp || ''; break;
      case 'status': va = a.pass ? 1 : 0; vb = b.pass ? 1 : 0; break;
      default: return 0;
    }
    if (typeof va === 'string') {
      return dir === 'asc' ? va.localeCompare(vb) : vb.localeCompare(va);
    }
    return dir === 'asc' ? va - vb : vb - va;
  });
  return sorted;
}

function exportHistoryJSON() {
  var data = JSON.stringify(runs, null, 2);
  downloadFile('crucibulum-history.json', data, 'application/json');
}

function exportReceiptsCSV() {

    return date + ',' + (r.task_id || '') + ',' + (r.provider || r.adapter || '') + ',' + (r.model || '') + ',' + cost + ',' + r.tokens_in + ',' + r.tokens_out + ',' + r.duration_sec + ',' + result;

async function openBundle(bundleId) {
  if (!bundleId) return;
  try {
    var data = await api('GET', '/api/runs/' + encodeURIComponent(bundleId));
    var bundle = data.bundle || data;
    renderBundleDrawer(bundle);
    document.getElementById('bundle-overlay').classList.add('open');
    document.getElementById('bundle-drawer').classList.add('open');
  } catch (e) {
    var run = runs.find(function(r) { return r.bundle_id === bundleId; });
    if (run) {
      renderBundleDrawerFromSummary(run);
      document.getElementById('bundle-overlay').classList.add('open');
      document.getElementById('bundle-drawer').classList.add('open');
    } else {
      showToast('Failed to load bundle: ' + e.message);
    }
  }
}
