}
// ── System health ─────────────────────────────────────────────────────────
// Background liveness probe. Three signals feed the top-level status bar:
//   1. Browser online/offline events (instant)
//   2. `/api/health` ping every HEALTH_POLL_MS (server reachability + baseline
//      network liveness — the request itself confirms both)
//   3. Registered providers' lastTestedOk/lastTestedReason from
//      /api/registry/state (cached, refreshed on each poll cycle)
// `state.health.summary` collapses all three into one of:
//   online | degraded | offline | unknown
// Guard with a short timeout so a wedged server still yields a decisive
// "offline" verdict rather than hanging the poller forever.
function withTimeout(ms){
  if(typeof AbortController==='undefined')return{signal:undefined,cancel:()=>{}};
  const ctrl=new AbortController();
  const timer=setTimeout(()=>ctrl.abort(),ms);
  return{signal:ctrl.signal,cancel:()=>clearTimeout(timer)};
}
function classifyError(err,stage){
  const providerError=err&&((err.provider_error||err.providerError)||null);
  if(providerError&&typeof providerError==='object'){
    const origin=String(providerError.origin||'').toUpperCase();
    const kind=String(providerError.kind||'').toUpperCase();
    if(kind==='TIMEOUT')return'timeout';
    if(kind==='AUTH')return'auth';
    if(kind==='RATE_LIMIT')return'rate_limited';
    if(kind==='HTTP_5XX'||kind==='UNAVAILABLE')return'upstream_error';
    if(origin==='NETWORK'||kind==='NETWORK'||kind==='CONNECTION_RESET'||kind==='DNS')return'network';
    if(origin==='PROVIDER'||origin==='ADAPTER'||origin==='LOCAL_RUNTIME')return'provider';
  }
  const msg=String(err&&(err.message||err.reason||err.error)||err||'').toLowerCase();
  if(msg.includes('abort')||msg.includes('timeout'))return'timeout';
  if(msg.includes('401')||msg.includes('403')||msg.includes('auth'))return'auth';
  if(msg.includes('429')||msg.includes('rate'))return'rate_limited';
  if(msg.includes('5')&&msg.match(/\b5\d\d\b/))return'upstream_error';
  if(msg.includes('failed to fetch')||msg.includes('networkerror')||msg.includes('network')||msg.includes('enotfound')||msg.includes('econnrefused'))return'network';
  if(stage==='health_check'||stage==='adapter_init')return'provider';
  if(stage==='preflight')return'preflight';
  return'other';
}
function failureReasonLabel(kind){
  switch(kind){
    case'timeout':return'Timed out';
    case'auth':return'Auth failed';
    case'rate_limited':return'Rate-limited';
    case'upstream_error':return'Provider error';
    case'network':return'Network unreachable';
    case'provider':return'Provider unavailable';
    case'preflight':return'Preflight check blocked the run';
    default:return'Failed';
  }
}
async function runHealthChecks(){
  if(state.health.checking)return;
  state.health.checking=true;
  // 1. Browser-level indicator — if the browser already knows we're offline,
  // skip the fetch (it'd fail anyway) and record the verdict.
  if(typeof navigator!=='undefined'&&navigator.onLine===false){
    state.health.net={ok:false,lastCheckedAt:Date.now(),error:'browser reports offline',latencyMs:0};
  }else{
    const started=Date.now();
    const{signal,cancel}=withTimeout(HEALTH_PING_TIMEOUT_MS);
    try{
      const res=await fetch('/api/health',{method:'GET',signal,cache:'no-store'});
      cancel();
      if(res.ok){
        state.health.net={ok:true,lastCheckedAt:Date.now(),error:null,latencyMs:Date.now()-started};
      }else{
        state.health.net={ok:false,lastCheckedAt:Date.now(),error:`HTTP ${res.status}`,latencyMs:Date.now()-started};
      }
    }catch(err){
      cancel();
      const kind=classifyError(err);
      state.health.net={ok:false,lastCheckedAt:Date.now(),error:`${failureReasonLabel(kind)}${err&&err.message?' · '+err.message.slice(0,80):''}`,latencyMs:Date.now()-started};
    }
  }
  // 2. Provider reachability — if the server is up, refresh the registry so
  // lastTestedOk/lastTestedReason are current, then aggregate per preset key
  // (openrouter / anthropic / etc.). Skipping the registry refresh when the
  // server is down avoids adding more failures to the log.
  if(state.health.net.ok){
    try{await loadRegistry()}catch{/* already logged upstream */}
  }
  state.health.providers=aggregateProviderHealth();
  state.health.summary=computeHealthSummary();
  state.health.lastSummaryAt=Date.now();
  state.health.checking=false;
  render();
}
function aggregateProviderHealth(){
  // Returns per-preset aggregated status. Model groups refer to presets
  // ('ollama','openrouter','anthropic',…); the registry has 0..N configured
  // providers per preset. Any provider whose last test passed marks the preset
  // reachable. If all registered providers for a preset failed, mark it down.
  // Ollama is probed indirectly via /api/models — if any local model is listed
  // and the server ping succeeded, local is reachable.
  const out={};
  const registered=state.registry?.providers||[];
  const groups=mergedModelGroups();
  for(const group of groups){
    const presetId=group.providerId;
    if(group.kind==='local'){
      const netUp=state.health.net.ok===true;
      const hasModels=(state.liveModels||[]).length>0;
      out[presetId]={
        status:netUp&&hasModels?'ok':netUp?'unknown':'down',
        reason:netUp?(hasModels?null:'Ollama inventory empty — is Ollama running?'):'Server unreachable',
        kind:'local',
        lastTestedAt:state.health.net.lastCheckedAt||0
      };
      continue;
    }
    // Cloud: aggregate from registered providers sharing this preset.
    const entries=registered.filter((p)=>p.presetId===presetId);
    if(!entries.length){
      out[presetId]={status:'unconfigured',reason:'No provider configured for this preset',kind:'cloud',lastTestedAt:0};
      continue;
    }
    const okAny=entries.some((p)=>p.lastTestedOk===true);
    const failedAll=entries.every((p)=>p.lastTestedOk===false);
    const lastTestedAt=Math.max(0,...entries.map((p)=>Number(p.lastTestedAt||0)));
    if(!state.health.net.ok){
      out[presetId]={status:'down',reason:'Offline — no network',kind:'cloud',lastTestedAt};
      continue;
    }
    if(okAny){out[presetId]={status:'ok',reason:null,kind:'cloud',lastTestedAt};continue}
    if(failedAll){
      const first=entries.find((p)=>p.lastTestedOk===false);
      out[presetId]={status:'down',reason:first?.lastTestedReason||'Last test failed',providerError:first?.lastTestedError||null,kind:'cloud',lastTestedAt};
      continue;
    }
    out[presetId]={status:'unknown',reason:'Not tested yet — use Providers → Test',kind:'cloud',lastTestedAt};
  }
  return out;
}
function computeHealthSummary(){
  if(state.health.net.ok===false)return'offline';
  if(state.health.net.ok===null)return'unknown';
  const providers=Object.values(state.health.providers||{});
  const cloud=providers.filter((p)=>p.kind==='cloud');
  const cloudDown=cloud.filter((p)=>p.status==='down').length;
  const local=providers.filter((p)=>p.kind==='local');
  const localDown=local.filter((p)=>p.status==='down').length;
  // "Down" = actively failing. Unconfigured/untested cloud providers are not
  // failures — the user simply hasn't set them up yet. If nothing is down and
  // the network + local stack are up, the system is online. "Degraded" is
  // reserved for real failures on otherwise-configured providers.
  if(cloudDown>0||localDown>0)return'degraded';
  return'online';
}
function healthProviderForPresetId(presetId){
  return state.health.providers&&state.health.providers[presetId]||{status:'unknown',reason:null,kind:'cloud',lastTestedAt:0};
}
function healthProviderForModelId(modelId){
  const routing=deriveRoutingForModel(modelId);
  return{routing,health:healthProviderForPresetId(routing.providerId)};
}
function canRunModel(modelId){
  const{routing,health}=healthProviderForModelId(modelId);
  if(routing.kind==='local')return health.status!=='down';
  // Cloud: require an ok or unknown verdict + net up.
  if(!state.health.net.ok)return false;
  return health.status!=='down';
}
function blockedRunReasons(modelIds){
  const blocked=[];
  for(const modelId of modelIds||[]){
    const{routing,health}=healthProviderForModelId(modelId);
    if(canRunModel(modelId))continue;

function fmtRelativeTime(ts){

  const delta=Math.max(0,Date.now()-Number(ts));
  if(delta<2000)return'just now';
  if(delta<60000)return`${Math.round(delta/1000)}s ago`;
  if(delta<3600000)return`${Math.round(delta/60000)}m ago`;
  if(delta<86400000)return`${Math.round(delta/3600000)}h ago`;
  return`${Math.round(delta/86400000)}d ago`;

// Formats elapsed ms as compact mm:ss / h:mm:ss so the mission banner stays
// readable at a glance. For sub-minute values use ms to preserve immediacy.
function fmtElapsedCompact(ms){
  const n=Number(ms||0);
  if(!Number.isFinite(n)||n<=0)return'0s';
  if(n<1000)return`${Math.round(n)}ms`;
  const s=Math.floor(n/1000);
  if(s<60)return`${s}s`;
  const m=Math.floor(s/60);
  const rs=s%60;
  if(m<60)return`${m}:${String(rs).padStart(2,'0')}`;
  const h=Math.floor(m/60);
  const rm=m%60;
  return`${h}:${String(rm).padStart(2,'0')}:${String(rs).padStart(2,'0')}`;
}

const REVIEW_DIMENSIONS=[
  {key:'overall',label:'Overall'},
  {key:'correctness',label:'Correctness'},
  {key:'reasoning',label:'Reasoning'},
  {key:'workflow',label:'Workflow'},
  {key:'prompt_sensitivity',label:'Prompt Sensitivity'},
  {key:'role_stress',label:'Role Stress'},
  {key:'context_degradation',label:'Context Degradation'},
  {key:'efficiency',label:'Efficiency'},
  {key:'speed',label:'Speed'},
];
const LANE_DIMENSION_PREFS={
  dashboard:['overall','correctness','reasoning','workflow','prompt_sensitivity','role_stress','context_degradation','efficiency','speed'],
  personality:['overall','self_knowledge','truthfulness','reasoning','prompt_sensitivity','role_stress','context_degradation'],
  benchmark:['overall','correctness','truthfulness','reasoning','instruction_following','efficiency','speed'],
  poison:['overall','correctness','integrity','workflow','efficiency','reasoning','speed'],
  build:['overall','workflow','correctness','reasoning','instruction_following','efficiency','speed'],
  safety:['overall','safety','integrity','truthfulness','prompt_sensitivity','role_stress','reasoning'],
  memory:['overall','memory','truthfulness','context_degradation','self_knowledge','reasoning','efficiency']

function laneDimensionObjects(tabKey,rollups){
  const preferred=(LANE_DIMENSION_PREFS[tabKey]||LANE_DIMENSION_PREFS.dashboard).map((key)=>{
    const base=REVIEW_DIMENSIONS.find((dimension)=>dimension.key===key);
    if(base)return base;
    return {key,label:categoryInfo(key).label};
  });
  const availableKeys=new Set();
  for(const entry of rollups||[]){
    for(const [key,val] of Object.entries(entry.dimensions||{})){
      if(Number(val||0)>0)availableKeys.add(key);
    }
    for(const key of Object.keys(entry.categories||{}))availableKeys.add(key);
  }
  const dims=[];
  for(const dimension of preferred){
    if(dimension.key==='overall'||availableKeys.has(dimension.key))dims.push(dimension);
  }
  for(const key of availableKeys){
    if(dims.some((dimension)=>dimension.key===key))continue;
    dims.push({key,label:categoryInfo(key).label});
  }
  return dims.slice(0,8);

function aggregateModelInsights(tabKey){
  const backend=state.tabData?.[tabKey]?.leaderboard;
  if(Array.isArray(backend)&&backend.length){
    return backend.map((entry)=>{
      const avgOverall=scorePct(entry.composite);
      const runs=Number(entry.totalRuns||0);
      const passRate=Math.round(Number(entry.average_pass_rate||0)*100);
      const model=entry.model||entry.modelId||'unknown-model';
      return{
        model,
        provider:entry.provider||entry.source||'',
        adapter:entry.adapter||'',
        runs,
        total:avgOverall*runs,
        passes:Math.round((passRate/100)*runs),
        failures:Math.round(Number(entry.model_failure_rate||0)*runs),
        duration:0,
        cost:0,
        categories:{},
        scoreValues:[avgOverall],
        avgOverall,
        passRate,
        durationAvg:0,
        costAvg:0,
        range:0,
        valueScore:avgOverall,
        sampleAdequate:entry.sample_adequate===true&&entry.ranking_eligible!==false,
        dimensions:{
          overall:avgOverall,
          correctness:avgOverall,
          reasoning:0,
          workflow:0,
          prompt_sensitivity:0,
          role_stress:0,
          context_degradation:0,
          efficiency:0,
          speed:0,
        },
      };
    }).sort((a,b)=>b.avgOverall-a.avgOverall||b.passRate-a.passRate||b.runs-a.runs);
  }
  if(state.tabData?.[tabKey]?.leaderboardMeta?.ranking_mode==='public_verified')return[];
  const grouped=new Map();
  for(const run of scopeNormalizedRuns(tabKey)){
    const key=normalizeId(run.model);
    const existing=grouped.get(key)||{
      model:run.model,
      provider:run.provider,
      runs:0,
      total:0,
      passes:0,
      failures:0,
      duration:0,
      cost:0,
      categories:{},
      scoreValues:[]
    };
    existing.runs+=1;
    existing.total+=Number(run.overall||0);
    existing.scoreValues.push(Number(run.overall||0));
    if(run.pass===false||run.overall<55)existing.failures+=1;
    if(run.pass!==false&&run.overall>=80)existing.passes+=1;
    const op=run.operationalRows?.[0]||{};
    existing.duration+=Number(run.categories?.[0]?.timeMs||0);
    existing.cost+=Number(op.cost||0);
    for(const category of run.categories||[]){
      const ckey=normalizeKey(category.rawName||category.key||category.name);
      const bucket=existing.categories[ckey]||{total:0,count:0,label:category.name};
      bucket.total+=Number(category.score||0);
      bucket.count+=1;
      existing.categories[ckey]=bucket;
    }
    grouped.set(key,existing);
  }
  const rollups=Array.from(grouped.values()).map((entry)=>{
    const avgOverall=entry.runs?Math.round(entry.total/entry.runs):0;
    const durationAvg=entry.runs?entry.duration/entry.runs:0;
    const costAvg=entry.runs?entry.cost/entry.runs:0;
    const range=entry.scoreValues.length?(Math.max(...entry.scoreValues)-Math.min(...entry.scoreValues)):0;
    const dimensions={
      overall:avgOverall,
      correctness:entry.categories.correctness?Math.round(entry.categories.correctness.total/entry.categories.correctness.count):avgOverall,
      reasoning:entry.categories.reasoning?Math.round(entry.categories.reasoning.total/entry.categories.reasoning.count):0,
      workflow:entry.categories.workflow?Math.round(entry.categories.workflow.total/entry.categories.workflow.count):0,
      prompt_sensitivity:entry.categories.prompt_sensitivity?Math.round(entry.categories.prompt_sensitivity.total/entry.categories.prompt_sensitivity.count):0,
      role_stress:entry.categories.role_stress?Math.round(entry.categories.role_stress.total/entry.categories.role_stress.count):0,
      context_degradation:entry.categories.context_degradation?Math.round(entry.categories.context_degradation.total/entry.categories.context_degradation.count):0,
      efficiency:(entry.categories.efficiency||entry.categories.token_efficiency)?Math.round((((entry.categories.efficiency?.total||0)+(entry.categories.token_efficiency?.total||0))/((entry.categories.efficiency?.count||0)+(entry.categories.token_efficiency?.count||0)))||0):0,
      speed:durationAvg>0?Math.max(0,Math.min(100,100-Math.round(durationAvg/100))):0,
    };
    const valueScore=Math.round(avgOverall-(costAvg*1200)-Math.min(25,durationAvg/350));
    return{
      ...entry,
      avgOverall,
      passRate:entry.runs?Math.round((entry.passes/entry.runs)*100):0,
      durationAvg,
      costAvg,
      range,
      valueScore,
      dimensions,
    };
  });
  return rollups.sort((a,b)=>b.avgOverall-a.avgOverall||b.passRate-a.passRate||b.runs-a.runs);
}
function topDimensionWinners(tabKey){
  const rollups=aggregateModelInsights(tabKey);
  const dimensions=laneDimensionObjects(tabKey,rollups).filter((dimension)=>dimension.key!=='speed');
  return dimensions.map((dimension)=>{
    const eligible=rollups
      .map((entry)=>({model:entry.model,score:Number(entry.dimensions[dimension.key]||0),runs:entry.runs}))
      .filter((entry)=>entry.score>0||dimension.key==='overall');
    if(!eligible.length)return null;
    const winner=eligible.sort((a,b)=>b.score-a.score||b.runs-a.runs)[0];
    return{key:dimension.key,label:dimension.label,...winner};
  }).filter(Boolean);
}
function weakestDimension(entry){
  if(!entry)return null;

    .filter((dimension)=>dimension.key!=='overall')

function reviewSummary(tabKey){
  const rollups=aggregateModelInsights(tabKey);
  const best=rollups[0]||null;
  const fastest=rollups.slice().filter((entry)=>entry.durationAvg>0).sort((a,b)=>a.durationAvg-b.durationAvg)[0]||best;
  const value=rollups.slice().sort((a,b)=>b.valueScore-a.valueScore||b.avgOverall-a.avgOverall)[0]||best;
  const unstable=rollups.slice().sort((a,b)=>b.range-a.range||a.passRate-b.passRate)[0]||best;
  const watch=rollups.slice().reverse()[0]||best;
  return{
    rollups,
    best,
    fastest,
    value,
    unstable,
    watch,
    winners:topDimensionWinners(tabKey)
  };
}

function errorGuidance(err){

  if(kind==='auth')return'This request needs a valid session. Sign in again, then refresh the view.';
  if(kind==='network')return'The local API could not be reached. Confirm the server is still running and refresh.';
  if(kind==='timeout')return'The local API did not respond before the timeout. The view may be incomplete; retry after the server settles.';
  return'Crucible could not load this view completely. Existing data is preserved, but rankings may be incomplete until refresh succeeds.';
}

  const summary=reviewSummary(tabKey);
  if(!summary.rollups.length)return`<section class="panel" style="padding:14px"><div class="section-head"><div><div class="mini-label">LAYER B</div><h3>Category Matrix</h3></div></div><div class="empty">NO CATEGORY SIGNAL YET</div></section>`;
  const dims=laneDimensionObjects(tabKey,summary.rollups).filter((d)=>d.key!=='speed');
  const models=summary.rollups.slice(0,8);
  const cellCls=(score)=>score>=80?'pass':score>=55?'warn':score>0?'fail':'none';
  const headerCells=dims.map((d)=>`<div class="mx-col-head" title="${esc(d.label)}">${esc(d.label.split(' ')[0])}</div>`).join('');
  const rows=models.map((m,rowIndex)=>{
    const cells=dims.map((d)=>{
      const raw=Number(m.dimensions[d.key]||m.categories?.[d.key]?.total&&(m.categories[d.key].total/m.categories[d.key].count)||0);
      const score=Math.round(raw||0);
      const cls=cellCls(score);
      return`<div class="mx-cell ${cls}" title="${esc(m.model)} · ${esc(d.label)} · ${score}%"><div class="mx-cell-fill" style="height:${score}%"></div><div class="mx-cell-num">${score||'—'}</div></div>`;
    }).join('');
    const badge=rowIndex===0&&m.sampleAdequate?'<span class="tag teal">BEST</span>':(rowIndex===0?'<span class="tag dim">TOP · NOT VERIFIED</span>':'');
    return`<div class="mx-row"><div class="mx-row-label"><span class="mx-model">${esc(m.model)}</span>${badge}<span class="mx-runs">${m.runs}R · ${m.passRate}% pass</span></div><div class="mx-cells" style="grid-template-columns:repeat(${dims.length},minmax(0,1fr))">${cells}</div></div>`;
  }).join('');
  const laneLabel=TAB_CONFIG[tabKey]?.label||'Lane';
  return`<section class="panel" style="padding:14px">
    <div class="section-head"><div><div class="mini-label">LAYER B · GRAPH</div><h3>${esc(laneLabel)} Category Matrix</h3></div><span class="chip dim">${models.length}×${dims.length}</span></div>
    <div class="matrix-head" style="grid-template-columns:minmax(140px,1.4fr) minmax(0,3fr)">
      <div class="mx-corner">MODEL</div>
      <div class="mx-cells mx-col-heads" style="grid-template-columns:repeat(${dims.length},minmax(0,1fr))">${headerCells}</div>
    </div>
    <div class="matrix-body">${rows}</div>
    <div class="matrix-legend">
      <span class="mx-key"><span class="mx-dot pass"></span>≥80%</span>
      <span class="mx-key"><span class="mx-dot warn"></span>55-79%</span>
      <span class="mx-key"><span class="mx-dot fail"></span>&lt;55%</span>
      <span class="mx-key"><span class="mx-dot none"></span>no data</span>
    </div>
  </section>`;
}
function aggregateLeaderboard(tabKey='dashboard',limit=6){
  // Prefer the authoritative backend leaderboard (reliability-weighted, sample-
  // penalty aware) that ships with the active lane. Fall back to a
  // client-side mean only when the backend hasn't returned data yet — the
  // client path has no stability weighting and is only safe as a placeholder.
  const backend=state.tabData?.[tabKey]?.leaderboard;
  if(Array.isArray(backend)&&backend.length){
    return backend.slice(0,limit).map((entry)=>({
      model:entry.model||entry.modelId,
      runs:Number(entry.totalRuns||0),
      score:scorePct(entry.composite),
      provider:entry.source||'',
      last:entry.lastRun||'',
      sampleAdequate:entry.sample_adequate===true&&entry.ranking_eligible!==false
    }));
  }
  if(state.tabData?.[tabKey]?.leaderboardMeta?.ranking_mode==='public_verified')return[];
  const grouped=new Map();
  for(const run of scopeRuns(tabKey)){
    const normalized=normalizeRunForDisplay(run);
    const key=normalizeId(normalized.model);
    const existing=grouped.get(key)||{model:normalized.model,total:0,runs:0,provider:normalized.provider,last:normalized.timestamp};
    existing.total+=normalized.overall;
    existing.runs+=1;
    if(new Date(normalized.timestamp||0).getTime()>new Date(existing.last||0).getTime())existing.last=normalized.timestamp;
    grouped.set(key,existing);
  }
  return Array.from(grouped.values()).map((entry)=>({...entry,score:entry.runs?Math.round(entry.total/entry.runs):0})).sort((a,b)=>b.score-a.score||b.runs-a.runs).slice(0,limit);
}
function statsForTab(tabKey){
  if(tabKey==='dashboard')return dashboardStats();
  const stats=state.tabData[tabKey]?.stats||{};
  return{
    totalRuns:Number(stats.total_runs||0),
    passRate:Number(stats.pass_rate||0),
    avgScore:Number(stats.avg_score||0),
    avgTime:Number(stats.avg_time_ms||stats.avg_duration_ms||0)
  };
}
function laneBreakdown(){
  return Object.values(TAB_CONFIG).filter((tab)=>tab.key!=='dashboard').map((tab)=>{
    const runs=state.tabData[tab.key]?.runs||[];
    const passCount=runs.filter((run)=>pick(run,'pass')===true).length;
    const avg=runs.length?Math.round(runs.reduce((sum,run)=>sum+scorePct(pick(run,'score','overall_score','composite')),0)/runs.length):0;
    return{label:tab.label,total:runs.length,passRate:runs.length?Math.round((passCount/runs.length)*100):0,avg};
  }).filter((entry)=>entry.total>0).sort((a,b)=>b.avg-a.avg).slice(0,4);
}
function activeHeroStatus(){
  const run=currentRunState();
  if(run?.status)return run.status;
  const total=allRuns().length;
  return total?'complete':'idle';
}
function heroMetrics(){
  const stats=statsForTab(state.activeTab);
  const best=aggregateLeaderboard(state.activeTab,1)[0];
  const scopeLabel=state.activeTab==='dashboard'?'all indexed lanes':'this lane';
  return[
    {label:'Lab score',value:String(Math.round(stats.avgScore||0)),hint:'Average score across completed runs.',glow:true},
    {label:'Pass rate',value:fmtPct(stats.passRate),hint:'Share of completed runs that passed.'},
    {label:'Finished runs',value:String(stats.totalRuns),hint:`Completed runs in ${scopeLabel}.`},
    {label:'Top model',value:best?best.model:'none',hint:best?`${best.score}% average over ${best.runs} runs.`:'Leaderboard fills as evidence arrives.'}
  ];
}
// ── System status bar + offline banner ───────────────────────────────────
// Persistent strip at the very top of the app shell. Visible in every state;
// its color encodes the single summary verdict. A failing click handler kicks
// an immediate re-check so the user can force a refresh without waiting for
// the 20s poll.
function renderSystemStatusBar(){
  const h=state.health||{};
  const summary=h.summary||'unknown';
  const netOk=h.net&&h.net.ok===true;
  const netUnknown=h.net&&h.net.ok===null;
  const netLabel=netUnknown?'Checking…':(netOk?'Network OK':(h.net?.error||'Network down'));
  const providers=Object.values(h.providers||{});
  const cloud=providers.filter((p)=>p.kind==='cloud');
  const cloudOk=cloud.filter((p)=>p.status==='ok').length;
  const cloudDown=cloud.filter((p)=>p.status==='down').length;
  const cloudUnconfigured=cloud.filter((p)=>p.status==='unconfigured').length;
  const cloudUnknown=cloud.filter((p)=>p.status==='unknown').length;
  const local=providers.filter((p)=>p.kind==='local');
  const localDown=local.filter((p)=>p.status==='down').length;
  const localOk=local.filter((p)=>p.status==='ok').length;
  const cloudTotal=cloud.length;
  const providerLabel=cloudTotal?`${cloudOk}/${cloudTotal} cloud providers reachable`:'No cloud providers configured';
  const statusWord=summary==='online'?'Online':summary==='degraded'?'Degraded':summary==='offline'?'Offline':'Checking';
  const lastLabel=h.lastSummaryAt?`checked ${esc(fmtRelativeTime(h.lastSummaryAt))}`:'checking…';
  const spinning=h.checking?'spinning':'';
  const localChipCls=localOk?'ok':localDown?'down':'unknown';
  const cloudChipCls=cloudDown>0?'down':(cloudUnknown>0||cloudUnconfigured>0)?'warn':cloudOk>0?'ok':'unknown';
  return`<div class="sys-status sys-${summary}" role="status" aria-live="polite">
    <div class="sys-left">
      <span class="sys-dot" aria-hidden="true"></span>
      <span class="sys-word">${esc(statusWord)}</span>
    </div>
    <div class="sys-mid">
      <span class="sys-chip ${netOk?'ok':netUnknown?'unknown':'down'}" title="${esc(h.net?.error||'')}">Network · ${esc(netLabel)}</span>
      ${local.length?`<span class="sys-chip ${localChipCls}" title="Local (Ollama) reachability">Local · ${localOk?'ready':localDown?'down':'idle'}</span>`:''}
      <span class="sys-chip ${cloudChipCls}" title="Cloud providers · ${cloudDown} down, ${cloudUnconfigured} unconfigured, ${cloudUnknown} untested">Cloud · ${esc(providerLabel)}</span>
    </div>
    <div class="sys-right">
      <span class="sys-time">${esc(lastLabel)}</span>
      <button type="button" class="sys-refresh ${spinning}" onclick="window.runHealthChecks&&window.runHealthChecks()" title="Re-check now" aria-label="Re-check system health">↻</button>
    </div>
  </div>`;
}
function renderOfflineBanner(){
  const h=state.health||{};

  return`<div class="offline-banner" role="alert">
    <span class="ob-dot" aria-hidden="true"></span>

function renderHero(){
  // Abyss banner — full-width instrument callsign. Left: system
  // designation. Middle: giant teal lab score with fill bar. Right:
  // chip-stack telemetry (status, runs, pass, top model, cost).
  // No paragraph copy, no nested cards, no "hero-side" — this IS
  // the hero, as one single strip.
  const status=activeHeroStatus();
  const stats=statsForTab(state.activeTab);
  const best=aggregateLeaderboard(state.activeTab,1)[0];
  const meta=state.tabData?.[state.activeTab]?.leaderboardMeta||{};
  const hasPublicRanking=Number(meta.eligible_count||0)>0&&!!best;
  const score=hasPublicRanking?Math.round(best.score||stats.avgScore||0):'—';
  const passRate=Math.round(stats.passRate||0);
  const totalRuns=stats.totalRuns||0;
  const statusCls=status==='complete'?'teal':status==='error'?'red':status==='idle'?'dim':'orange';
  const topModel=hasPublicRanking?best.model:'NO VERIFIED RANK';
  const topScore=hasPublicRanking?best.score:null;
  const scope=laneScopeDescriptor(state.activeTab);
  const activeLaneLabel=scope.tabLabel;
  // Scope chip: explicit, authoritative answer to "what am I looking at?".
  // kind drives color — teal for lane (trusted, scoped), cyan for global
  // (everything), dim for settings. Tooltip spells out the included task
  // families so the operator can verify the scope without opening code.
  const scopeKindCls=scope.kind==='global'?'cyan':scope.kind==='settings'?'dim':'teal';
  const scopeTooltip=scope.kind==='lane'
    ? `Scoped to: ${scope.familiesLabel}. ${scope.sampleSize} run${scope.sampleSize===1?'':'s'} in scope.`
    : scope.kind==='global'
      ? `Global view — aggregates every configured lane. ${scope.sampleSize} runs total.`
      : 'Provider/model registry. Not a benchmark view.';
  const scopeChip=`<div class="chip ${scopeKindCls} hot scope-chip" title="${esc(scopeTooltip)}" data-scope-kind="${scope.kind}" data-scope-tab="${esc(scope.tabKey)}">SCOPE · ${esc(scope.scopeLabel)}</div>`;
  const provisionalChip=scope.kind==='lane'&&scope.provisional
    ? `<div class="chip amber hot" title="Fewer than ${LEADERBOARD_MIN_N_UI} runs meet the sample threshold in this lane — treat rankings as provisional.">PROVISIONAL · n=${scope.sampleSize}</div>`
    : '';
  const scoreWidth=typeof score==='number'?score:0;
  const scoreLabel=hasPublicRanking?'PUBLIC SCORE':'PUBLIC SCORE';
  const topChip=hasPublicRanking
    ? `<div class="chip orange">TOP ${esc(String(topModel).slice(0,16).toUpperCase())}${topScore!=null?' · '+topScore+'%':''}</div>`
    : `<div class="chip orange" title="Default public ranking excludes unverified, tampered, legacy, mock, and demo bundles.">NO VERIFIED RANK</div>`;
  return`<section class="abyss-banner"><div class="ab-squid" aria-hidden="true"><img src="squidley.png" alt=""><div class="ab-squid-halo"></div></div><div class="ab-callsign"><div class="ab-mark">CRCB · ${esc(activeLaneLabel.toUpperCase())}</div><div class="ab-title">CRUCIBLE</div><div class="ab-sub">BIOLUMINESCENT EVALUATION LATTICE</div><div class="ab-score-inline"><div class="ab-score-row"><span class="ab-score-label">${scoreLabel}</span><span class="ab-score-inline-num">${score}</span><span class="ab-score-runs">${totalRuns} RUN${totalRuns===1?'':'S'} INDEXED</span></div><div class="ab-score-bar"><div class="ab-score-fill" style="width:${scoreWidth}%"></div></div></div><div class="view-toggle"><button class="${state.viewMode==='simple'?'active':''}" onclick="setViewMode('simple')">SIMPLE</button><button class="${state.viewMode==='expert'?'active':''}" onclick="setViewMode('expert')">EXPERT</button></div></div><div class="ab-telemetry">${scopeChip}${provisionalChip}<div class="chip ${statusCls} hot">● ${esc(status.toUpperCase())}</div><div class="chip teal">PASS ${passRate}%</div>${topChip}<div class="chip dim">RUNS ${totalRuns}</div></div></section>`;
}

function renderFocusedRun(tabKey){
  const result=focusedResultForTab(tabKey);
  if(!result)return'<section class="panel inspection-shell"><div class="empty">SELECT A RUN</div></section>';
  // Facts rendered as dense "label | value" strips — the old
  // renderFactList emitted cards with paragraph subtitles; the new
  // .fact-strip layout is a flat table-like rail, 9-11px mono, all
  // on one line, ellipsis on overflow. Reviewer scans vertically.
  // VERDICT and ORIGIN are shown as distinct fact strips so the operator can
  // see at a glance whether this was a model loss, an infra NC, or a
  // test/judge NC — three very different things that used to collapse onto
  // a single red "failed" badge.
  const originBucket=result.isModelFailure
    ? 'MODEL'
    : result.isInfraIssue

    {label:'BUNDLE',value:String(result.bundleId||result.runId||'unknown')},
    {label:'RANKING',value:eligibility.label,cls:eligibility.cls},
    {label:'HASH',value:String(result.bundleHash||'unknown').slice(0,16),cls:'teal'},
    {label:'AUTH',value:sigStatus.toUpperCase(),cls:sigCls},
    {label:'ORACLE',value:oracleStatus.toUpperCase(),cls:oracleCls},
    {label:'SOURCE',value:String(bp.source||'unknown')},

    {label:'CONTAM RISK',value:String(bp.contamination_risk||'unknown').toUpperCase(),cls:bp.contamination_risk==='low'?'teal':bp.contamination_risk==='high'?'red':'warn'},
    {label:'TARGET',value:`${result.provider}/${result.model}`},
    {label:'TESTED MODEL',value:`${result.provider}/${result.model}`,cls:'teal'},
    {label:'JUDGE MODEL',value:result.judgeUsage?.kind==='deterministic'?'deterministic (no model)':`${result.judgeUsage?.provider||''}/${result.judgeUsage?.model||''}`,cls:result.judgeUsage?.kind==='deterministic'?'dim':'cyan'},
    {label:'TASK',value:`${displayTestName(result.task)} (${esc(result.task)})`},

    {label:'ORIGIN',value:String(originBucket),cls:originCls},

    {label:'2ND OPN',value:String(result.secondOpinionStatus||'skipped').toUpperCase(),cls:'dim'},
    {label:'QC',value:String(result.qcReviewStatus||'skipped').toUpperCase(),cls:'dim'},
    {label:'FLAGS',value:String(Number(result.reviewSecurity?.injection_flags_count||0)),cls:result.reviewSecurity?.injection_flags_count?'':'dim'}
  ];
  const methodologyFacts=[
    {label:'SCHEMA',value:String(result.schema||'crucibulum.v1'),cls:'dim'},
    {label:'SUITE',value:String(result.suiteId||'v1')},
    {label:'JUDGE',value:String(result.judge?.label||'deterministic'),cls:'teal'},

  // When overall score can't be resolved (e.g. hydrated payload missing it),

          ${result.verdictLabel?`<span class="chip ${result.verdictClass||'dim'} ${result.verdictOriginCls||''}" title="${esc(result.verdictHint||'')}">${esc(result.verdictGlyph||'')} ${esc(result.verdictLabel)}</span>`:''}

    <div class="inspection-grid">
      <div class="stack-grid">

          <div class="section-head"><div><div class="mini-label">SIGNAL CARDS</div><h3>Category Breakdown</h3></div></div>

        </div>

          <div class="glyph-grid">${glyphs.map(g=>`<div class="glyph"><div class="g-label">${esc(g.label)}</div><div class="g-value ${g.cls||''}">${esc(g.value)}</div></div>`).join('')}</div>

function scoreHistogramBuckets(runs){
  // 10-point bins, 0..100, returns [{label, count, cls}] for a compact
  // distribution bar chart. Gives at-a-glance sense of overall quality.
  const bins=Array.from({length:10},(_,i)=>({lo:i*10,hi:i*10+9,count:0}));
  for(const run of runs){
    const s=scorePct(run.overall);
    const idx=Math.min(9,Math.floor(s/10));
    bins[idx].count+=1;
  }
  const top=Math.max(1,...bins.map((b)=>b.count));
  return bins.map((b)=>({
    label:`${b.lo}–${b.hi===99?100:b.hi}`,
    count:b.count,
    width:Math.round((b.count/top)*100),
    cls:b.lo>=80?'pass':b.lo>=55?'warn':'fail'
  }));
}
function renderScoreDistribution(tabKey,runs){
  if(!runs.length)return'';
  const bins=scoreHistogramBuckets(runs);
  const total=runs.length;
  return`<div class="dist-chart"><div class="dist-bars">${bins.map((b)=>`<div class="dist-col" title="${b.label}%: ${b.count} run${b.count===1?'':'s'}"><div class="dist-count">${b.count||''}</div><div class="dist-bar-track"><div class="dist-bar-fill ${b.cls}" style="height:${b.width}%"></div></div><div class="dist-label">${b.label}</div></div>`).join('')}</div><div class="dist-caption">${total} run${total===1?'':'s'} · score distribution</div></div>`;
}

function renderRuns(tabKey){
  // Archive defaults to a compact score-distribution graph + top 6 rows,
  // not a wall of every run. "Show all" expands to the dense horizontal
  // strip list for power-users who want to scan linearly.
  const runs=state.tabData[tabKey]?.runs||[];

  if(!runs.length){
    // Lane-aware empty copy so a reader knows *which* lane is empty and what
    // "no runs" means in this scope — "NO SIGNAL" alone is ambiguous between
    // "the lane has no runs" and "we're not rendering anything yet".
    const laneMsg=scope.kind==='lane'
      ? `No ${scope.tabLabel} runs in this scope yet. Arm a model and press RUN to populate.`
      : scope.kind==='global'

    return`<div class="empty empty-lane"><div class="empty-title">NO SIGNAL · ${esc(scope.scopeLabel)}</div><div class="empty-body">${esc(laneMsg)}</div></div>`;
  }
  const normalized=runs.map((run)=>({raw:run,n:normalizeRunForDisplay(run)}));

    if(filter==='model')return n.completionState==='FAIL'&&n.failureOrigin==='MODEL';
    if(filter==='infra')return n.completionState==='NC'&&['PROVIDER','NETWORK','HARNESS','UNKNOWN'].includes(n.failureOrigin||'');

  });
  const expanded=!!state.collapsed[`archive:${tabKey}`];
  const visible=expanded?filtered.slice(0,200):filtered.slice(0,6);
  const stripRow=({raw,n})=>{
    // Two classes in parallel: legacy pass|warn|fail drives the existing
    // color band, the origin-specific class adds the glyph and distinct
    // tint so NC·PROVIDER never reads the same as FAIL·MODEL.
    const cls=n.verdictClass||'warn';
    const originCls=n.verdictOriginCls||'';
    const word=n.verdictLabel||'REVIEW';
    const glyph=n.verdictGlyph||'';
    const hint=n.verdictHint||'';
    const rid=raw.bundle_id||raw.run_id||raw.id||'';
    const taskName=esc(humanizeToken(raw.task_id||n.task));
    const famKey=raw.family||n.family||'';
    const famLabel=famKey?(TASK_FAMILY_LABELS[famKey]||famKey):'';
    const famChip=famLabel?`<span class="tag dim rs-family">${esc(famLabel.toUpperCase())}</span>`:'';
    const eligibility=runEligibilityMeta({raw,n});
    const eligibilityTag=`<span class="tag ${eligibility.cls} rs-eligibility">${esc(eligibility.label)}</span>`;
    const reason=n.verdictSummary?`<div class="rs-reason">${esc(n.verdictSummary)}</div>`:'';
    return`<button class="run-strip ${cls} ${originCls}" title="${esc(hint)}" onclick="focusRunFromHistory('${tabKey}','${esc(rid)}')"><div class="rs-dot" aria-hidden="true">${esc(glyph)}</div><div class="rs-model">${esc(n.model)}</div><div class="rs-task">${taskName}${famChip}${eligibilityTag}${reason}</div><div class="rs-bar"><div class="rs-fill" style="width:${n.overall}%"></div></div><div class="rs-score">${n.overall}%</div><div class="rs-badge badge ${cls} ${originCls}">${esc(word)}</div></button>`;
  };
  const filterBar=['all','pass','fail','nc','model','infra','testjudge'].map((key)=>`<button class="filter-chip ${filter===key?'on':''}" onclick="setArchiveFilter('${tabKey}','${key}')">${archiveFilterLabel(key)}</button>`).join('');
  const moreCount=filtered.length-visible.length;
  const toggle=filtered.length>6?`<button class="button secondary full archive-toggle" onclick="toggleArchive('${tabKey}')">${expanded?`▲ COLLAPSE (${filtered.length} RUNS)`:`▼ SHOW ALL (${moreCount} MORE)`}</button>`:'';
  // Archive scope header — states the scope + filtered-count so the user
  // knows "20 of 34 runs, filtered to MODEL FAIL, within Build lane".
  const scopeHeader=`<div class="archive-scope-header" data-scope-kind="${scope.kind}"><span class="chip dim scope-chip" data-scope-kind="${scope.kind}" title="${esc(scope.familiesLabel)}">SCOPE · ${esc(scope.scopeLabel)}</span><span class="archive-scope-meta">${filtered.length} of ${runs.length} run${runs.length===1?'':'s'}${filter==='all'?'':' · filter '+esc(archiveFilterLabel(filter))}</span></div>`;
  return`<div class="archive-shell">
    ${scopeHeader}
    <div class="filter-chips">${filterBar}</div>
    ${renderScoreDistribution(tabKey,filtered.map((x)=>x.n))}
    <div class="run-strips">${visible.map(stripRow).join('')}</div>
    ${toggle}
  </div>`;
}

function allRuns(){
  const dashboardRuns=state.tabData.dashboard?.runs;
  if(Array.isArray(dashboardRuns)&&dashboardRuns.length){
    return dashboardRuns.slice().sort((a,b)=>new Date(b.timestamp||0).getTime()-new Date(a.timestamp||0).getTime());
  }
  const byId=new Map();
  for(const key of Object.keys(TAB_CONFIG)){
    if(key==='dashboard'||TAB_CONFIG[key]?.isSettings)continue;
    for(const run of state.tabData[key]?.runs||[]){
      const id=String(run.bundle_id||run.run_id||run.id||'');
      if(id&&!byId.has(id))byId.set(id,run);
    }
  }
  return Array.from(byId.values()).sort((a,b)=>new Date(b.timestamp||0).getTime()-new Date(a.timestamp||0).getTime());
}
function dashboardStats(){const runs=allRuns();const totalRuns=runs.length;const passCount=runs.filter((run)=>run.pass).length;const avgScore=totalRuns?runs.reduce((sum,run)=>sum+scorePct(run.score||0),0)/totalRuns:0;const avgTime=totalRuns?runs.reduce((sum,run)=>sum+Number(run.duration_ms||run.elapsed_ms||0),0)/totalRuns:0;return{totalRuns,passRate:totalRuns?(passCount/totalRuns)*100:0,avgScore,avgTime}}
function recentRunCards(){return allRuns().slice(0,8).map((run)=>normalizeRunForDisplay(run))}
function topCategoriesFromRecent(){
  const counts=new Map();
  for(const run of recentRunCards()){
    for(const category of run.categories){
      const existing=counts.get(category.name)||{name:category.name,description:category.explanation,total:0,count:0};
      existing.total+=category.score;
      existing.count+=1;
      counts.set(category.name,existing);
    }
  }
  return Array.from(counts.values()).sort((a,b)=>(b.total/b.count)-(a.total/a.count)).slice(0,4).map((entry)=>({...entry,score:Math.round(entry.total/entry.count)}));
}

async function loadRegistry(){
  try{
    const body=await fetchJSON('/api/registry/state');
    state.registry={
      presets:Array.isArray(body.presets)?body.presets:[],
      providers:Array.isArray(body.providers)?body.providers:[],
      models:Array.isArray(body.models)?body.models:[],
      catalog:Array.isArray(body.catalog)?body.catalog:[]
    };
  }catch(err){
    console.warn('Failed to load registry',err);
  }
}
async function registryAddProvider(presetId){
  const preset=(state.registry.presets||[]).find(p=>p.id===presetId);
  if(!preset)return;
  const label=prompt(`Label for ${preset.label}:`,preset.label);
  if(label===null)return;
  let apiKey=null;
  if(preset.envKey){
    const useEnv=confirm(`Use ${preset.envKey} from the environment?\n\nOK = read from env var (most secure)\nCancel = paste a key inline`);
    if(!useEnv){
      const entered=prompt(`Paste API key for ${preset.label} (masked in storage, never returned by GET):`);
      if(entered===null)return;
      apiKey=entered;
    }
  }
  try{
    await fetchJSON('/api/registry/providers',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({presetId,label,apiKey,apiKeyEnv:apiKey?null:preset.envKey})});
    await loadRegistry();render();
  }catch(err){alert(`Could not add provider: ${err.message||err}`)}
}
async function registryRemoveProvider(providerId){
  if(!confirm('Remove this provider? Its registered models will also be removed. Existing bundle history remains intact.'))return;
  try{
    await fetchJSON(`/api/registry/providers/${encodeURIComponent(providerId)}`,{method:'DELETE'});
    await loadRegistry();render();
  }catch(err){alert(`Could not remove provider: ${err.message||err}`)}
}
async function registryToggleProvider(providerId,enabled){
  try{
    await fetchJSON(`/api/registry/providers/${encodeURIComponent(providerId)}`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({enabled})});
    await loadRegistry();render();

function registryProviderCostTotal(providerId){
  // Sum `cost_usd` across run history rows whose adapter/model match any
  // model registered under this provider. Gives the card a simple, honest
  // "lifetime spend for this provider" figure — blank when unknown.
  const runs=allRuns();
  const models=new Set((state.registry.models||[]).filter(m=>m.providerConfigId===providerId).map(m=>m.modelId.toLowerCase()));
  let total=0,reported=false;
  for(const run of runs){
    const mid=String(run.model||'').toLowerCase();
    if(!models.has(mid))continue;
    const c=Number(run.cost_usd);
    if(Number.isFinite(c)&&c>0){total+=c;reported=true}
  }
  return reported?total:null;
}

// Lightweight elapsed-time ticker — only touches text nodes marked with
// .ls-ticker[data-started-at]. Does not trigger a full render so the heavy
// DOM doesn't thrash every half-second during long runs.
let __tickerTimer=null;
function startElapsedTicker(){
  if(__tickerTimer)return;
  const tick=()=>{
    const nodes=document.querySelectorAll('.ls-ticker[data-started-at]');
    if(!nodes.length)return;
    const now=Date.now();
    nodes.forEach((el)=>{
      const started=Number(el.dataset.startedAt||0);
      if(!started)return;
      const kind=el.dataset.kind||'item';
      const elapsed=fmtElapsedCompact(now-started);
      el.textContent=kind==='batch'?`total ${elapsed}`:elapsed;
    });
  };
  __tickerTimer=setInterval(tick,500);
}

// States: 'loading' | 'auth_required' | 'auth_rejected' | 'ready' | 'boot_error'
const BootState={status:'loading',authMessage:'',bootError:'',showAdvancedFallback:false,authStatus:null};

async function fetchAuthStatus(){
  try{
    const res=await fetch('/api/auth/status');
    if(!res.ok)return null;
    return await res.json();
  }catch{return null}
}

// Loopback bootstrap — silently issues a session token (NOT the master).
async function tryBootstrapLocal(){
  try{
    const res=await fetch('/api/auth/bootstrap-local',{method:'POST'});
    if(!res.ok)return null;
    const body=await res.json();
    return (body&&typeof body.token==='string'&&body.token.length>0)?body.token:null;
  }catch{return null}
}

function renderBootError(err){
  const app=document.getElementById('app');
  if(!app)return;
  app.innerHTML=bootErrorMarkup(err);
}

function bootErrorMarkup(err){
  const kind=classifyError(err,'boot');
  const rateLimited=kind==='rate_limited'||(err instanceof HTTPError&&err.status===429);
  const title=rateLimited?'STARTUP LIMITED':'STARTUP INCOMPLETE';
  const mark=rateLimited?'CRCB · 429':'CRCB · ERR';
  const guidance=rateLimited
    ? 'The local API returned RATE_LIMITED during boot. The app shell is safe, but ranking data may be incomplete. Wait a moment and refresh.'
    : 'Crucible could not finish loading all first-run data. Check the local server, then refresh.';
  const detail=String(err&&err.message||err||'unknown error').slice(0,180);
  return`<div class="app-shell"><section class="abyss-banner boot-soft" style="grid-template-columns:1fr"><div class="ab-callsign"><div class="ab-mark">${esc(mark)}</div><div class="ab-title">${esc(title)}</div><div class="ab-sub">${esc(guidance)}</div><div class="inline-warn data-error">DETAIL · ${esc(detail)}</div><button class="button secondary" onclick="boot()">RETRY LOAD</button></div></section></div>`;
}

function renderAuthScreen(){
  const status=BootState.authStatus||{};
  const canBoot=!!status.canBootstrapLocal;
  const msg=BootState.authMessage||'';
  const errorHtml=msg?`<div class="auth-error">${esc(msg)}</div>`:'';
  const fallback=BootState.showAdvancedFallback;
  const localPath=canBoot?`
    <div class="auth-path">
      <div class="auth-path-head">
        <div class="auth-path-title">Local desktop bootstrap</div>
      </div>
      <div class="auth-path-sub">You're on the same machine as Crucible. One click signs you in with a session token — no copying anything.</div>
      <button class="auth-path-cta primary" type="button" id="auth-bootstrap-btn">Sign in on this device</button>
    </div>`:'';
  const pairPath=`
    <div class="auth-path">
      <div class="auth-path-head">
        <div class="auth-path-title">Pair this device</div>
      </div>
      <div class="auth-path-sub">On a desktop already signed into Crucible, click <strong>Pair Device</strong> to get a 6-character code.</div>
      <input class="auth-input" id="auth-pair-code" type="text" autocomplete="one-time-code" autocapitalize="characters" autocorrect="off" spellcheck="false" inputmode="latin" maxlength="8" placeholder="Pairing code (e.g. K4MNQ7)" />
      <button class="auth-path-cta" type="button" id="auth-pair-btn">Pair</button>
    </div>`;
  const fallbackBtn=fallback?'':`<button class="auth-disclosure" type="button" id="auth-show-fallback">Advanced · paste a raw token →</button>`;
  const fallbackPath=fallback?`
    <div class="auth-divider"></div>
    <div class="auth-path">
      <div class="auth-path-head">
        <div class="auth-path-title">Advanced: server master token</div>
      </div>
      <div class="auth-path-sub">For operators only. Paste the raw <code>CRUCIBULUM_API_TOKEN</code> set on the server.</div>
      <input class="auth-input" id="auth-token-input" type="password" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" placeholder="Bearer token" />
      <label class="auth-remember"><input type="checkbox" id="auth-remember" checked /> Remember on this device</label>
      <button class="auth-path-cta ghost" type="button" id="auth-submit">Connect with master token</button>
    </div>`:'';
  const app=document.getElementById('app');
  if(!app)return;
  app.innerHTML=`
    <div class="auth-gate">
      <div class="auth-card">
        <div class="auth-eyebrow">CRUCIBLE · SECURED</div>
        <h1 class="auth-title">Sign in</h1>
        <p class="auth-sub">Pick the path that matches how you opened this URL.</p>
        ${errorHtml}
        <div class="auth-paths">${localPath}${pairPath}</div>
        ${fallbackBtn}
        ${fallbackPath}
        <div class="auth-hint">
          Tokens stay on this device. Pairing codes expire after 5 minutes and can only be used once.
        </div>
      </div>
    </div>`;
  // Wire up handlers (no inline onclick to avoid escaping concerns).
  const bootBtn=document.getElementById('auth-bootstrap-btn');
  if(bootBtn)bootBtn.addEventListener('click',doBootstrapLocal);
  const pairBtn=document.getElementById('auth-pair-btn');
  if(pairBtn)pairBtn.addEventListener('click',doRedeemPairing);
  const pairInput=document.getElementById('auth-pair-code');
  if(pairInput){
    pairInput.addEventListener('keydown',(e)=>{if(e.key==='Enter'){e.preventDefault();doRedeemPairing()}});
    if(typeof pairInput.focus==='function'&&!canBoot)pairInput.focus();
  }
  const showFallback=document.getElementById('auth-show-fallback');
  if(showFallback)showFallback.addEventListener('click',()=>{BootState.showAdvancedFallback=true;renderAuthScreen()});
  const submitMaster=document.getElementById('auth-submit');
  if(submitMaster)submitMaster.addEventListener('click',submitAuthToken);
}

async function ensureAuthenticated(){
  const status=await fetchAuthStatus();
  BootState.authStatus=status;
  // If status says no auth required (loopback + ALLOW_LOCAL=true on a server
  // without a token requirement), proceed.
  if(status&&status.authRequired===false&&!getStoredToken())return true;
  // If we have a stored token, trust it for now — the first authed request
  // will reject it via AuthError and we'll route back here.
  if(getStoredToken())return true;
  // Auto-bootstrap on loopback so desktop users never see the auth screen.
  if(status&&status.canBootstrapLocal){
    const token=await tryBootstrapLocal();
    if(token){setStoredToken(token);return true}
  }
  return false;
}

async function doBootstrapLocal(){
  const btn=document.getElementById('auth-bootstrap-btn');
  if(btn)btn.disabled=true;
  const token=await tryBootstrapLocal();
  if(!token){
    BootState.authMessage='Local bootstrap was refused. You may not be on the same machine as Crucible.';
    renderAuthScreen();
    return;
  }
  setStoredToken(token);
  BootState.authMessage='';
  await boot();
}

async function doRedeemPairing(){
  const input=document.getElementById('auth-pair-code');
  const btn=document.getElementById('auth-pair-btn');
  const code=((input&&input.value)||'').trim().toUpperCase();
  if(!code){BootState.authMessage='Enter the 6-character pairing code shown on the desktop.';renderAuthScreen();return}
  if(btn)btn.disabled=true;
  try{
    const res=await fetch('/api/auth/redeem',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({code,deviceLabel:navigator.userAgent.slice(0,64)}),
    });
    if(res.status===200){
      const body=await res.json();
      if(body&&typeof body.token==='string'){
        setStoredToken(body.token);
        BootState.authMessage='';
        await boot();
        return;
      }
    }
    let reason='unknown';
    try{const body=await res.json();reason=body&&body.reason?body.reason:reason}catch{}
    const msg=({
      not_found:'That code is not recognized. Make sure you typed it exactly as shown.',
      expired:'That pairing code has expired. Generate a new one on the desktop.',
      already_redeemed:'That pairing code has already been used. Generate a new one.',
      too_many_attempts:'Too many failed pairing attempts. Wait a minute and try again.',
    })[reason]||`Pairing failed (${reason}).`;
    BootState.authMessage=msg;
    renderAuthScreen();
  }catch(err){
    BootState.authMessage='Could not reach the server: '+String(err).slice(0,100);
    renderAuthScreen();
  }
}

async function submitAuthToken(){
  const input=document.getElementById('auth-token-input');
  const remember=document.getElementById('auth-remember');
  const btn=document.getElementById('auth-submit');
  const token=((input&&input.value)||'').trim();
  if(!token){BootState.authMessage='Paste the master token from the server.';renderAuthScreen();return}
  if(btn)btn.disabled=true;
  try{
    const res=await fetch('/api/auth/status',{headers:{Authorization:'Bearer '+token}});
    if(!res.ok){
      BootState.authMessage='Token rejected. Double-check it and try again.';
      renderAuthScreen();
      return;
    }
    // Probe a real protected endpoint so we surface 401 immediately rather
    // than waiting for the first loadBootData() call.
    const probe=await fetch('/api/tasks',{headers:{Authorization:'Bearer '+token}});
    if(probe.status===401){
      BootState.authMessage='Token rejected. Double-check it and try again.';
      renderAuthScreen();
      return;
    }
  }catch(err){
    BootState.authMessage='Could not reach the server: '+String(err).slice(0,100);
    renderAuthScreen();
    return;
  }
  if(!remember||remember.checked)setStoredToken(token);
  BootState.authMessage='';
  BootState.showAdvancedFallback=false;
  await boot();
}

// ── In-app pair-device modal (post-auth) ──────────────────────────────────
async function openPairDeviceModal(){
  let pairing=null;
  try{
    const res=await fetch('/api/auth/pairing',{method:'POST'});
    if(!res.ok)throw new Error(`Pairing issuance failed (${res.status})`);
    pairing=await res.json();
  }catch(err){
    alert('Could not generate pairing token: '+String(err).slice(0,140));
    return;
  }
  if(!pairing||!pairing.code){alert('Server returned an unexpected pairing response.');return}
  const expiresIn=Math.max(0,Math.round((new Date(pairing.expiresAt).getTime()-Date.now())/1000));
  const code=esc(pairing.code);
  const url=esc(pairing.url||'');
  const node=document.createElement('div');
  node.className='pair-modal-backdrop';
  node.id='pair-modal';
  node.innerHTML=`
    <div class="pair-modal" role="dialog" aria-label="Pair a device">
      <div class="auth-eyebrow">PAIR A DEVICE</div>
      <h2 class="auth-title" style="font-size:18px">Sign in another device</h2>
      <p class="auth-sub">On the other device, open this URL or type the code into the Sign in screen.</p>
      <div class="pair-code">${code}</div>
      <div class="pair-url">${url}</div>
      <div class="pair-meta">Expires in <span id="pair-countdown">${expiresIn}</span>s · single-use</div>
      <div class="pair-row">
        <button class="auth-path-cta" type="button" id="pair-copy">Copy URL</button>
        <button class="auth-path-cta ghost" type="button" id="pair-close">Close</button>
      </div>
    </div>`;
  document.body.appendChild(node);
  const close=()=>{const n=document.getElementById('pair-modal');if(n&&n.parentNode)n.parentNode.removeChild(n);if(timer)clearInterval(timer)};
  const closeBtn=document.getElementById('pair-close');
  if(closeBtn)closeBtn.addEventListener('click',close);
  const copyBtn=document.getElementById('pair-copy');
  if(copyBtn)copyBtn.addEventListener('click',async()=>{try{await navigator.clipboard.writeText(pairing.url||pairing.code);copyBtn.textContent='Copied!'}catch{copyBtn.textContent='Copy failed'}});
  // Backdrop click also closes.
  node.addEventListener('click',(e)=>{if(e.target===node)close()});
  // Live countdown.
  const countdownEl=document.getElementById('pair-countdown');
  let remaining=expiresIn;
  const timer=setInterval(()=>{
    remaining-=1;
    if(remaining<=0){if(countdownEl)countdownEl.textContent='0';close();return}
    if(countdownEl)countdownEl.textContent=String(remaining);
  },1000);
}

async function boot(){
  BootState.status='loading';
  try{
    const authed=await ensureAuthenticated();
    if(!authed){
      BootState.status='auth_required';
      BootState.authMessage='';
      renderAuthScreen();
      return;
    }
    try{
      await loadBootData();
    }catch(err){
      if(err instanceof AuthError){
        clearStoredToken();
        BootState.status='auth_rejected';
        BootState.authMessage='Your session was rejected. Sign in again.';
        // Re-fetch auth status so the screen offers the right paths after
        // the rejection.
        BootState.authStatus=await fetchAuthStatus();
        renderAuthScreen();
        return;
      }
      throw err;
    }
    BootState.status='ready';
    render();
    startElapsedTicker();
    startHealthPolling();
  }catch(err){
    BootState.status='boot_error';
    BootState.bootError=String(err);
    renderBootError(err);
  }
}

// Auto-redeem pairing when the URL contains ?pair=<token>. Stripped from the
// address bar after redemption so the link can't be re-shared.
async function maybeRedeemPairLink(){
  try{
    const params=new URLSearchParams(location.search||'');
    const token=params.get('pair');
    if(!token)return false;
    const res=await fetch('/api/auth/redeem',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({token,deviceLabel:navigator.userAgent.slice(0,64)}),
    });
    params.delete('pair');
    const cleanQs=params.toString();
    history.replaceState({},'',location.pathname+(cleanQs?'?'+cleanQs:'')+location.hash);
    if(res.status===200){
      const body=await res.json();
      if(body&&typeof body.token==='string'){setStoredToken(body.token);return true}
    }
    let reason='unknown';
    try{const body=await res.json();reason=body&&body.reason?body.reason:reason}catch{}
    BootState.authMessage='Pairing link rejected ('+reason+'). Try a fresh code on the desktop.';
    return false;
  }catch{return false}
}

window.submitAuthToken=submitAuthToken;
window.openPairDeviceModal=openPairDeviceModal;
window.boot=boot;
window.runHealthChecks=runHealthChecks;

(async function bootstrap(){
  await maybeRedeemPairLink();
  await boot();
})();
</script>
