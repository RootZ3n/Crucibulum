<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRUCIBULUM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=JetBrains+Mono:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* =========================================================================
   RESET + CUSTOM PROPERTIES
   ========================================================================= */
*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --void: #080b12;
  --surface: rgba(11, 18, 32, 0.72);
  --surface-raised: rgba(14, 24, 42, 0.88);
  --surface-strong: rgba(8, 14, 26, 0.94);
  --surface-glass: rgba(18, 31, 53, 0.54);
  --border: rgba(88, 121, 168, 0.26);
  --border-subtle: rgba(76, 98, 132, 0.16);
  --text-primary: #e6edf3;
  --text-secondary: #aab6c7;
  --text-muted: #66768d;
  --pass: #39d353;
  --fail: #f85149;
  --warn: #f59e0b;
  --active: #58a6ff;
  --integrity: #bc8cff;
  --teal: #4df5c8;
  --orange: #f59e0b;
  --pink: #ff7ad9;
  --silver: #e6edf3;
  --shadow-deep: 0 28px 90px rgba(0, 0, 0, 0.42);
  --shadow-panel: 0 14px 50px rgba(3, 8, 18, 0.55);
  --glow-teal: 0 0 0 1px rgba(77, 245, 200, 0.2), 0 0 26px rgba(77, 245, 200, 0.18);
  --glow-blue: 0 0 0 1px rgba(88, 166, 255, 0.18), 0 0 24px rgba(88, 166, 255, 0.18);
  --glow-purple: 0 0 0 1px rgba(188, 140, 255, 0.18), 0 0 24px rgba(188, 140, 255, 0.18);
  --glow-red: 0 0 0 1px rgba(248, 81, 73, 0.24), 0 0 26px rgba(248, 81, 73, 0.22);
  --glow-amber: 0 0 0 1px rgba(245, 158, 11, 0.2), 0 0 24px rgba(245, 158, 11, 0.18);
  --font-mono: 'JetBrains Mono', monospace;
  --font-body: 'IBM Plex Sans', sans-serif;
  --sidebar-width: 240px;
  --bundle-width: 660px;
  --content-max: 1200px;
}

html, body {
  height: 100%;
  background: var(--void);
  color: var(--text-primary);
  font-family: var(--font-mono);
  font-size: 15px;
  line-height: 1.6;
  overflow: hidden;
}

body {
  background:
    radial-gradient(circle at top left, rgba(88, 166, 255, 0.12), transparent 24%),
    radial-gradient(circle at 82% 14%, rgba(188, 140, 255, 0.11), transparent 22%),
    radial-gradient(circle at bottom right, rgba(77, 245, 200, 0.09), transparent 24%),
    linear-gradient(180deg, #09101b 0%, #080b12 52%, #070a11 100%);
}

/* =========================================================================
   ANIMATIONS
   ========================================================================= */
@keyframes pulse-load {
  0%, 100% { opacity: 0.4; }
  50% { opacity: 0.9; }
}

@keyframes slide-in-right {
  from { transform: translateX(100%); }
  to { transform: translateX(0); }
}

@keyframes fade-in {
  from { opacity: 0; }
  to { opacity: 1; }
}

@keyframes progress-pulse {
  0% { background-position: 0% 0; }
  100% { background-position: 200% 0; }
}

@keyframes run-dot-pulse {
  0%, 100% { opacity: 0.4; }
  50% { opacity: 1; }
}

@keyframes bar-grow {
  from { width: 0%; }
}

@keyframes sidebar-glow-cycle {
  0%, 100% { opacity: 0.45; box-shadow: 0 0 12px rgba(88, 166, 255, 0.18); }
  50% { opacity: 1; box-shadow: 0 0 22px rgba(77, 245, 200, 0.25); }
}

@keyframes score-bar-animate {
  from { width: 0%; }
  to { width: var(--bar-width); }
}

@keyframes breathe-idle {
  0%, 100% { opacity: 0.6; box-shadow: var(--shadow-panel); }
  50% { opacity: 1; box-shadow: var(--shadow-panel), 0 0 0 1px rgba(88, 166, 255, 0.08), 0 0 24px rgba(88, 166, 255, 0.08); }
}

@keyframes breathe-running {
  0%, 100% { opacity: 0.8; box-shadow: var(--shadow-panel), 0 0 0 1px rgba(77, 245, 200, 0.16), 0 0 12px rgba(77, 245, 200, 0.12); }
  50% { opacity: 1; box-shadow: var(--shadow-panel), 0 0 0 1px rgba(77, 245, 200, 0.28), 0 0 32px rgba(77, 245, 200, 0.24); }
}

@keyframes single-bloom-pass {
  0% { text-shadow: 0 0 0 rgba(57, 211, 83, 0); transform: scale(1); }
  18% { text-shadow: 0 0 38px rgba(57, 211, 83, 0.95), 0 0 84px rgba(77, 245, 200, 0.55); transform: scale(1.03); }
  100% { text-shadow: 0 0 16px rgba(77, 245, 200, 0.22); transform: scale(1); }
}

@keyframes single-flash-fail {
  0% { text-shadow: 0 0 0 rgba(248, 81, 73, 0); color: var(--fail); }
  14% { text-shadow: 0 0 34px rgba(248, 81, 73, 0.9); color: #ff8f88; }
  100% { text-shadow: 0 0 12px rgba(245, 158, 11, 0.18); color: var(--warn); }
}

@keyframes badge-arrival {
  from { opacity: 0; transform: translateY(10px) scale(0.98); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

@keyframes tile-ping {
  0% { box-shadow: inset 0 0 0 1px rgba(255,255,255,0.02), var(--shadow-panel); }
  40% { box-shadow: inset 0 0 0 1px rgba(88, 166, 255, 0.18), 0 0 24px rgba(88, 166, 255, 0.12), var(--shadow-panel); }
  100% { box-shadow: inset 0 0 0 1px rgba(255,255,255,0.02), var(--shadow-panel); }
}

@keyframes particle-travel {
  0% { transform: translateX(-20%) scale(0.8); opacity: 0; }
  20% { opacity: 1; }
  100% { transform: translateX(120%) scale(1); opacity: 0; }
}

@keyframes banner-enter {
  from { opacity: 0; transform: translateY(-10px); }
  to { opacity: 1; transform: translateY(0); }
}

.loading-pulse {
  animation: pulse-load 1.8s ease-in-out infinite;
}

/* =========================================================================
   LAYOUT
   ========================================================================= */
#app {
  display: flex;
  height: 100vh;
  width: 100vw;
  overflow: hidden;
}

/* =========================================================================
   SIDEBAR
   ========================================================================= */
#sidebar {
  width: var(--sidebar-width);
  min-width: var(--sidebar-width);
  background: linear-gradient(180deg, rgba(10, 16, 29, 0.94), rgba(7, 12, 22, 0.9));
  border-right: 1px solid var(--border);
  backdrop-filter: blur(24px);
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow-y: auto;
  z-index: 10;
  position: relative;
  box-shadow: inset -1px 0 0 rgba(255,255,255,0.03);
}

#sidebar::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  bottom: 0;
  width: 2px;
  background: linear-gradient(180deg, rgba(88,166,255,0.2), rgba(77,245,200,0.72), rgba(188,140,255,0.22));
  animation: sidebar-glow-cycle 4s ease-in-out infinite;
  z-index: 11;
}

#sidebar-header {
  padding: 32px 24px 20px;
  border-bottom: 1px solid var(--border-subtle);
}

#sidebar-header .logo {
  font-family: var(--font-mono);
  font-size: 18px;
  font-weight: 700;
  letter-spacing: 0.2em;
  color: var(--silver);
  margin-bottom: 4px;
}

#sidebar-header .version {
  display: inline-block;
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 500;
  color: var(--text-muted);
  margin-left: 6px;
  letter-spacing: 0;
}

#sidebar-header .tagline {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 6px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
}

#sidebar-nav {
  padding: 16px 0;
  flex: 1;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 0;
  padding: 12px 24px;
  cursor: pointer;
  color: var(--text-muted);
  font-family: var(--font-mono);
  font-size: 13px;
  font-weight: 500;
  border-left: 3px solid transparent;
  transition: all 0.2s ease;
  user-select: none;
  position: relative;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

.nav-item:hover {
  color: var(--silver);
  background: rgba(88, 166, 255, 0.05);
}

.nav-item.active {
  color: var(--silver);
  border-left-color: var(--teal);
  background: linear-gradient(90deg, rgba(77, 245, 200, 0.14), rgba(88, 166, 255, 0.02) 72%);
  box-shadow: inset 0 0 0 1px rgba(77, 245, 200, 0.08), 0 0 20px rgba(77, 245, 200, 0.06);
}

.nav-item.disabled {
  color: var(--text-muted);
  cursor: not-allowed;
  pointer-events: none;
  opacity: 0.4;
}

.nav-item .nav-badge {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--silver);
  background: rgba(14, 24, 42, 0.92);
  border: 1px solid rgba(88, 166, 255, 0.18);
  padding: 2px 8px;
  border-radius: 999px;
  margin-left: auto;
  min-width: 28px;
  text-align: center;
}

#sidebar-footer {
  padding: 16px 24px 20px;
  border-top: 1px solid var(--border-subtle);
}

.status-row {
  display: flex;
  justify-content: space-between;
  margin-bottom: 4px;
}

.status-label {
  color: var(--text-muted);
  font-family: var(--font-mono);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  font-size: 11px;
}

.status-value {
  color: var(--text-secondary);
  font-family: var(--font-mono);
  font-size: 12px;
}

.status-value.sv-model { color: var(--active); }
.status-value.sv-tasks { color: var(--teal); }
.status-value.sv-lastrun-pass { color: var(--pass); }
.status-value.sv-lastrun-fail { color: var(--fail); }

.sidebar-credit {
  margin-top: 16px;
  font-size: 11px;
  color: var(--text-muted);
  font-style: italic;
  text-align: center;
  letter-spacing: 0.3px;
  opacity: 0.7;
}

/* =========================================================================
   MAIN AREA
   ========================================================================= */
#main {
  flex: 1;
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
  position: relative;
}

#main-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 32px;
  border-bottom: 1px solid var(--border-subtle);
  background: rgba(8, 12, 22, 0.78);
  backdrop-filter: blur(20px);
  min-height: 58px;
  flex-shrink: 0;
}

#main-header .view-title {
  font-family: var(--font-mono);
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0.18em;
  color: var(--silver);
  text-transform: uppercase;
}

.header-actions {
  display: flex;
  align-items: center;
  gap: 8px;
}

.header-btn {
  background: rgba(14, 24, 42, 0.52);
  border: 1px solid var(--border);
  color: var(--active);
  font-family: var(--font-mono);
  font-size: 12px;
  padding: 8px 16px;
  border-radius: 999px;
  cursor: pointer;
  transition: all 0.2s ease;
  display: flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

.header-btn:hover {
  color: var(--silver);
  border-color: rgba(88, 166, 255, 0.4);
  background: rgba(18, 34, 58, 0.8);
  box-shadow: var(--glow-blue);
}

#main-content {
  flex: 1;
  overflow-y: auto;
  padding: 36px 32px 40px;
  background: transparent;
}

.content-constrained {
  max-width: var(--content-max);
  margin: 0 auto;
}

/* =========================================================================
   HERO PANEL -- LAST VERIFIED RUN
   ========================================================================= */
.hero-panel {
  background:
    linear-gradient(180deg, rgba(17, 28, 46, 0.74), rgba(8, 13, 24, 0.9)),
    radial-gradient(circle at top right, rgba(77, 245, 200, 0.08), transparent 22%);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 40px 44px;
  margin-bottom: 32px;
  position: relative;
  overflow: hidden;
  backdrop-filter: blur(26px);
  box-shadow: var(--shadow-deep);
  animation: breathe-idle 4s ease-in-out infinite;
}

.hero-panel::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 1px;
  opacity: 0.9;
}

.hero-panel::after {
  content: '';
  position: absolute;
  inset: 0;
  background:
    linear-gradient(115deg, rgba(255,255,255,0.04), transparent 30%),
    radial-gradient(circle at 76% 18%, rgba(88, 166, 255, 0.09), transparent 18%);
  pointer-events: none;
}

.hero-panel.pass-accent::before { background: linear-gradient(90deg, rgba(77,245,200,0.1), var(--teal), rgba(57,211,83,0.75)); }
.hero-panel.fail-accent::before { background: linear-gradient(90deg, rgba(248,81,73,0.12), var(--fail), rgba(245,158,11,0.72)); }
.hero-panel.neutral-accent::before { background: linear-gradient(90deg, rgba(230,237,243,0.08), rgba(88,166,255,0.3), rgba(188,140,255,0.24)); }

.hero-eyebrow {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--text-secondary);
  margin-bottom: 28px;
}

.hero-top-row {
  display: flex;
  align-items: flex-start;
  gap: 32px;
  margin-bottom: 32px;
}

.hero-score-block {
  flex-shrink: 0;
  display: flex;
  align-items: baseline;
  gap: 16px;
}

.hero-score {
  font-family: var(--font-mono);
  font-size: clamp(92px, 16vw, 200px);
  font-weight: 800;
  line-height: 0.9;
  letter-spacing: -0.06em;
  text-shadow: 0 0 16px rgba(230, 237, 243, 0.08);
}

.hero-score.pass { color: var(--teal); text-shadow: 0 0 18px rgba(77, 245, 200, 0.22); }
.hero-score.fail { color: var(--fail); text-shadow: 0 0 12px rgba(248, 81, 73, 0.18); }
.hero-score.verdict-bloom-pass { animation: single-bloom-pass 2s ease-out 1 forwards; }
.hero-score.verdict-bloom-fail { animation: single-flash-fail 1.2s ease-out 1 forwards; }

.hero-meta-line {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text-secondary);
  margin-bottom: 32px;
  line-height: 1.9;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

.hero-meta-line .meta-sep {
  color: var(--text-muted);
  margin: 0 8px;
}

/* Trust Badges -- distinct colors */
.trust-badges {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 32px;
}

.trust-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.14em;
  padding: 10px 14px;
  border-radius: 999px;
  text-transform: uppercase;
  position: relative;
  backdrop-filter: blur(20px);
  animation: badge-arrival 0.45s ease forwards;
  opacity: 0;
}

.trust-badge:nth-child(1) {
  color: var(--integrity);
  background: rgba(188, 140, 255, 0.08);
  border: 1px solid rgba(188, 140, 255, 0.24);
  box-shadow: var(--glow-purple);
  animation-delay: 0ms;
}
.trust-badge:nth-child(1) .trust-check { color: var(--integrity); }

.trust-badge:nth-child(2) {
  color: var(--active);
  background: rgba(88, 166, 255, 0.08);
  border: 1px solid rgba(88, 166, 255, 0.24);
  box-shadow: var(--glow-blue);
  animation-delay: 200ms;
}
.trust-badge:nth-child(2) .trust-check { color: var(--active); }

.trust-badge:nth-child(3) {
  color: var(--teal);
  background: rgba(45, 212, 191, 0.08);
  border: 1px solid rgba(45, 212, 191, 0.24);
  box-shadow: var(--glow-teal);
  animation-delay: 400ms;
}
.trust-badge:nth-child(3) .trust-check { color: var(--teal); }

.trust-badge:nth-child(4) {
  color: var(--pass);
  background: rgba(57, 211, 83, 0.08);
  border: 1px solid rgba(57, 211, 83, 0.24);
  box-shadow: 0 0 0 1px rgba(57, 211, 83, 0.14), 0 0 24px rgba(57, 211, 83, 0.12);
  animation-delay: 600ms;
}
.trust-badge:nth-child(4) .trust-check { color: var(--pass); }

/* fallback for badges beyond 4 */
.trust-badge:nth-child(n+5) {
  color: var(--orange);
  background: rgba(251, 146, 60, 0.08);
  border: 1px solid rgba(251, 146, 60, 0.24);
}
.trust-badge:nth-child(n+5) .trust-check { color: var(--orange); }

.trust-check {
  font-size: 13px;
  opacity: 1;
}

/* Score Breakdown Section in Hero */
.hero-breakdown-label {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--text-secondary);
  margin-bottom: 18px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border-subtle);
}

.hero-footer-link {
  margin-top: 28px;
  text-align: right;
}

.hero-footer-link a {
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--active);
  cursor: pointer;
  text-decoration: none;
  opacity: 0.92;
  transition: opacity 0.15s ease;
}

.hero-footer-link a:hover {
  opacity: 1;
}

/* =========================================================================
   STAT TILES -- SUMMARY METRICS
   ========================================================================= */
.summary-metrics {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 18px;
  margin-bottom: 32px;
}

.metric-tile {
  background: linear-gradient(180deg, rgba(15, 24, 40, 0.76), rgba(8, 14, 24, 0.92));
  border: 1px solid var(--border-subtle);
  border-radius: 20px;
  padding: 18px 22px 20px;
  position: relative;
  overflow: hidden;
  backdrop-filter: blur(20px);
  box-shadow: inset 0 0 0 1px rgba(255,255,255,0.02), var(--shadow-panel);
  animation: tile-ping 0.7s ease 1;
}

.metric-tile::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 4px;
}

.metric-tile.accent-blue::before { background: var(--active); }
.metric-tile.accent-green::before { background: var(--teal); }
.metric-tile.accent-amber::before { background: var(--warn); }
.metric-tile.accent-secondary::before { background: var(--orange); }
.metric-tile.accent-red::before { background: var(--fail); }
.metric-tile.accent-purple::before { background: var(--integrity); }

.metric-tile .metric-label {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 8px;
}

.metric-tile .metric-value {
  font-family: var(--font-mono);
  font-size: clamp(32px, 5vw, 54px);
  font-weight: 700;
  line-height: 1.1;
  color: var(--text-primary);
  text-shadow: 0 0 18px rgba(255,255,255,0.04);
}

.metric-tile .metric-value.color-active { color: var(--active); }
.metric-tile .metric-value.color-pass { color: var(--pass); }
.metric-tile .metric-value.color-fail { color: var(--fail); }
.metric-tile .metric-value.color-warn { color: var(--warn); }
.metric-tile .metric-value.color-secondary { color: var(--orange); }

/* =========================================================================
   SCORE TREND CHART
   ========================================================================= */
.score-trend-section {
  background: linear-gradient(180deg, rgba(15, 24, 40, 0.74), rgba(8, 13, 24, 0.94));
  border: 1px solid var(--border);
  border-radius: 22px;
  padding: 24px 28px;
  margin-bottom: 24px;
  position: relative;
  overflow: hidden;
  backdrop-filter: blur(22px);
  box-shadow: var(--shadow-panel);
  animation: breathe-idle 4s ease-in-out infinite;
}

.score-trend-section::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 1px;
  background: linear-gradient(90deg, rgba(77,245,200,0.08), var(--active), rgba(188,140,255,0.22));
}

.score-trend-title {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 16px;
}

.score-trend-chart {
  width: 100%;
  height: 120px;
}

.score-trend-chart line.grid-line {
  stroke: rgba(120, 145, 182, 0.15);
  stroke-width: 1;
}

.score-trend-chart polyline.trend-line {
  fill: none;
  stroke: var(--teal);
  stroke-width: 2.5;
  stroke-linejoin: round;
  stroke-linecap: round;
  filter: drop-shadow(0 0 6px rgba(77, 245, 200, 0.24));
}

.score-trend-chart circle.dot-pass { fill: var(--teal); filter: drop-shadow(0 0 5px rgba(77,245,200,0.5)); }
.score-trend-chart circle.dot-fail { fill: var(--fail); filter: drop-shadow(0 0 5px rgba(248,81,73,0.45)); }
.score-trend-chart circle.dot-latest { filter: drop-shadow(0 0 12px rgba(230,237,243,0.35)); }
.score-trend-chart text.drop-label { fill: var(--warn); font-family: var(--font-mono); font-size: 8px; letter-spacing: 0.08em; }

/* =========================================================================
   RUN HEATMAP
   ========================================================================= */
.run-heatmap-section {
  background: linear-gradient(180deg, rgba(15, 24, 40, 0.74), rgba(8, 13, 24, 0.94));
  border: 1px solid var(--border);
  border-radius: 22px;
  padding: 24px 28px;
  margin-bottom: 24px;
  position: relative;
  overflow: hidden;
  backdrop-filter: blur(22px);
  box-shadow: var(--shadow-panel);
  animation: breathe-idle 4s ease-in-out infinite;
}

.run-heatmap-section::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 1px;
  background: linear-gradient(90deg, rgba(57,211,83,0.08), var(--teal), var(--fail));
}

.heatmap-title {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 12px;
}

.heatmap-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 2px;
  position: relative;
}

.heatmap-cell {
  width: 18px;
  height: 18px;
  border-radius: 6px;
  transition: transform 0.15s ease, box-shadow 0.2s ease;
  border: 1px solid rgba(255,255,255,0.03);
  cursor: pointer;
}

.heatmap-cell:hover,
.heatmap-cell.active {
  transform: translateY(-2px);
  box-shadow: 0 0 0 1px rgba(230,237,243,0.12), 0 0 18px rgba(230,237,243,0.1);
}

.heatmap-cell.cell-pass { background: linear-gradient(180deg, rgba(77,245,200,0.92), rgba(57,211,83,0.82)); }
.heatmap-cell.cell-fail { background: linear-gradient(180deg, rgba(248,81,73,0.92), rgba(245,158,11,0.44)); }
.heatmap-cell.cell-empty { background: var(--border-subtle); }

.heatmap-tooltip {
  position: absolute;
  min-width: 180px;
  max-width: 220px;
  padding: 12px 14px;
  border-radius: 14px;
  background: rgba(10, 18, 31, 0.88);
  border: 1px solid rgba(230, 237, 243, 0.12);
  backdrop-filter: blur(20px);
  box-shadow: var(--shadow-panel);
  z-index: 4;
  pointer-events: none;
}

.heatmap-tooltip-title {
  color: var(--silver);
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 6px;
}

.heatmap-tooltip-line {
  color: var(--text-secondary);
  font-size: 11px;
  line-height: 1.7;
}

.anomaly-strip {
  display: none;
  align-items: center;
  gap: 10px;
  margin: -8px 0 24px;
  padding: 14px 18px;
  border-radius: 18px;
  background: rgba(245, 158, 11, 0.12);
  border: 1px solid rgba(245, 158, 11, 0.22);
  color: var(--warn);
  box-shadow: var(--glow-amber);
  animation: breathe-idle 4s ease-in-out infinite;
}

.anomaly-strip.visible {
  display: flex;
}

/* =========================================================================
   BADGES
   ========================================================================= */
.badge {
  display: inline-block;
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.1em;
  padding: 5px 12px;
  border-radius: 999px;
  text-transform: uppercase;
}

.badge-pass {
  background: rgba(57, 211, 83, 0.1);
  color: var(--pass);
  border: 1px solid rgba(57, 211, 83, 0.2);
}

.badge-fail {
  background: rgba(248, 81, 73, 0.1);
  color: var(--fail);
  border: 1px solid rgba(248, 81, 73, 0.2);
}

.badge-warn {
  background: rgba(210, 153, 34, 0.1);
  color: var(--warn);
  border: 1px solid rgba(210, 153, 34, 0.2);
}

.badge-neutral {
  background: rgba(139, 148, 158, 0.1);
  color: var(--text-secondary);
  border: 1px solid rgba(139, 148, 158, 0.2);
}

/* Task family pills */
.task-pill {
  display: inline-block;
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 4px;
  letter-spacing: 0.04em;
  margin-right: 4px;
}

.task-pill.fam-poison { background: rgba(248, 81, 73, 0.12); color: var(--fail); }
.task-pill.fam-spec { background: rgba(88, 166, 255, 0.12); color: var(--active); }
.task-pill.fam-coord,
.task-pill.fam-orchestration { background: rgba(188, 140, 255, 0.12); color: var(--integrity); }
.task-pill.fam-personality { background: rgba(255, 122, 217, 0.12); color: var(--pink); }
.task-pill.fam-swe { background: rgba(245, 158, 11, 0.12); color: var(--warn); }
.task-pill.fam-general { background: rgba(139, 148, 158, 0.1); color: var(--text-secondary); }

/* =========================================================================
   SCORE BARS
   ========================================================================= */
.score-bars {
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.score-bar-row {
  display: flex;
  align-items: center;
  gap: 16px;
}

.score-bar-label {
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 500;
  color: var(--text-secondary);
  width: 114px;
  flex-shrink: 0;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

.score-bar-track {
  flex: 1;
  height: 20px;
  background: var(--border);
  border-radius: 4px;
  overflow: hidden;
  position: relative;
}

.score-bar-fill {
  height: 100%;
  border-radius: 4px;
  transition: width 0.6s ease;
  min-width: 2px;
  animation: bar-grow 0.8s ease;
}

.score-bar-fill.correctness { background: var(--pass); }
.score-bar-fill.regression { background: var(--active); }
.score-bar-fill.integrity { background: var(--integrity); }
.score-bar-fill.efficiency { background: var(--warn); }

.score-bar-pct {
  font-family: var(--font-mono);
  font-size: 13px;
  font-weight: 600;
  color: var(--text-primary);
  width: 48px;
  text-align: right;
  flex-shrink: 0;
}

/* =========================================================================
   DATA TABLES
   ========================================================================= */
.data-table-wrap {
  background: linear-gradient(180deg, rgba(15, 24, 40, 0.74), rgba(8, 13, 24, 0.94));
  border: 1px solid var(--border);
  border-radius: 22px;
  overflow: hidden;
  backdrop-filter: blur(22px);
  box-shadow: var(--shadow-panel);
  animation: breathe-idle 4s ease-in-out infinite;
}

.data-table-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 22px;
  border-bottom: 1px solid var(--border-subtle);
}

.data-table-title {
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--text-muted);
}

.table-scroll {
  overflow-x: auto;
}

table {
  width: 100%;
  border-collapse: collapse;
}

table thead th {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-muted);
  text-align: left;
  padding: 14px 18px;
  border-bottom: 1px solid var(--border-subtle);
  cursor: pointer;
  user-select: none;
  white-space: nowrap;
  transition: color 0.1s ease;
}

table thead th:hover {
  color: var(--text-secondary);
}

table thead th.sorted-asc::after { content: ' \u25B2'; font-size: 8px; }
table thead th.sorted-desc::after { content: ' \u25BC'; font-size: 8px; }

table tbody tr {
  border-bottom: 1px solid var(--border-subtle);
  cursor: pointer;
  transition: background 0.1s ease;
}

table tbody tr:last-child {
  border-bottom: none;
}

table tbody tr:hover {
  background: rgba(88, 166, 255, 0.08);
}

table tbody td {
  padding: 14px 18px;
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--text-secondary);
  white-space: nowrap;
  line-height: 1.6;
}

table tbody td.mono-bright {
  color: var(--text-primary);
}

table tbody td.score-high { color: var(--pass); font-weight: 600; }
table tbody td.score-mid { color: var(--warn); font-weight: 600; }
table tbody td.score-low { color: var(--fail); font-weight: 600; }
table tbody td.col-time { color: var(--orange); }

/* =========================================================================
   EMPTY STATE
   ========================================================================= */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 72px 24px;
  text-align: center;
}

.empty-state .empty-circle {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  border: 2px solid var(--border);
  margin-bottom: 20px;
  opacity: 0.3;
}

.empty-state .empty-title {
  font-family: var(--font-body);
  font-size: 17px;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 10px;
}

.empty-state .empty-sub {
  font-family: var(--font-body);
  font-size: 14px;
  color: var(--text-muted);
  margin-bottom: 24px;
  max-width: 320px;
  line-height: 1.7;
}

.empty-state .empty-link {
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--active);
  cursor: pointer;
  text-decoration: none;
  opacity: 0.8;
  transition: opacity 0.15s ease;
}

.empty-state .empty-link:hover {
  opacity: 1;
}

/* =========================================================================
   RUN TASK VIEW
   ========================================================================= */
.run-layout {
  display: grid;
  grid-template-columns: 40% 60%;
  gap: 24px;
  height: calc(100vh - 108px);
  min-height: 0;
  max-width: 1200px;
  margin: 0 auto;
}

.run-config-panel {
  background: linear-gradient(180deg, rgba(15, 24, 40, 0.74), rgba(8, 13, 24, 0.94));
  border: 1px solid var(--border);
  border-radius: 22px;
  display: flex;
  flex-direction: column;
  min-height: 0;
  position: relative;
  overflow: hidden;
  backdrop-filter: blur(22px);
  box-shadow: var(--shadow-panel);
}

.run-config-scroll {
  flex: 1 1 0;
  overflow-y: auto;
  padding: 32px 32px 20px;
  min-height: 0;
}

.run-btn-container {
  flex-shrink: 0;
  padding: 16px 32px 24px;
  background: linear-gradient(180deg, rgba(9, 16, 28, 0.2) 0%, rgba(9, 16, 28, 0.86) 20%, rgba(9, 16, 28, 0.98) 100%);
  display: flex;
  gap: 12px;
  position: sticky;
  bottom: 0;
  border-top: 1px solid rgba(88, 166, 255, 0.12);
  box-shadow: 0 -16px 28px rgba(0,0,0,0.22);
  z-index: 4;
}

.run-btn-container .run-btn {
  flex: 1;
}

.run-action-copy {
  display: flex;
  flex-direction: column;
  gap: 4px;
  min-width: 0;
  margin-right: auto;
}

.run-action-title {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--active);
}

.run-action-sub {
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.6;
}

.run-btn-suite {
  height: 52px;
  background: linear-gradient(135deg, rgba(88,166,255,0.82), rgba(188,140,255,0.82));
  color: #fff;
  font-family: var(--font-mono);
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.08em;
  padding: 0 16px;
  border: 1px solid rgba(188,140,255,0.42);
  border-radius: 16px;
  cursor: pointer;
  transition: all 0.15s ease;
  flex: 1;
  text-transform: uppercase;
  white-space: nowrap;
  box-shadow: var(--glow-purple);
}

.run-btn-suite:hover:not(:disabled) {
  box-shadow: 0 0 0 1px rgba(188,140,255,0.24), 0 0 32px rgba(188,140,255,0.28);
}

.run-btn-suite:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}

.run-btn-suite.running {
  border-color: var(--warn);
  color: var(--warn);
}

.config-section {
  margin-bottom: 28px;
}

.config-section-label {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--silver);
  margin-bottom: 12px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border-subtle);
}

.config-section-label .section-num {
  color: var(--teal);
  margin-right: 8px;
}

.form-group {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 8px;
}

.form-group label {
  display: none;
}

.form-group select,
.form-group input {
  background: rgba(7, 12, 22, 0.92);
  border: 1px solid var(--border);
  color: var(--text-primary);
  font-family: var(--font-mono);
  font-size: 14px;
  padding: 12px 14px;
  border-radius: 14px;
  outline: none;
  transition: border-color 0.15s ease;
  width: 100%;
}

.form-group select:focus,
.form-group input:focus {
  border-color: rgba(77,245,200,0.52);
  box-shadow: var(--glow-teal);
}

.form-group select option {
  background: var(--surface);
  color: var(--text-primary);
}

.form-hint {
  font-family: var(--font-body);
  font-size: 13px;
  color: var(--text-muted);
  line-height: 1.6;
  min-height: 18px;
}

.task-context-mini {
  background: var(--void);
  border: 1px solid var(--border-subtle);
  border-radius: 5px;
  padding: 14px 16px;
  margin-top: 10px;
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text-secondary);
  line-height: 1.9;
  display: none;
}

.task-context-mini.visible {
  display: block;
}

.task-context-mini .ctx-label {
  color: var(--teal);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

.availability-note {
  font-family: var(--font-body);
  font-size: 13px;
  color: var(--text-muted);
  line-height: 1.6;
  min-height: 20px;
}

.pipeline-summary {
  background: rgba(7, 12, 22, 0.8);
  border: 1px solid var(--border-subtle);
  border-radius: 18px;
  padding: 16px;
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text-secondary);
  line-height: 1.9;
  word-break: break-word;
  overflow-wrap: break-word;
}

.pipeline-chain {
  display: flex;
  gap: 18px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  padding: 8px 2px 10px;
  align-items: flex-start;
}

.pipeline-stage {
  position: relative;
  background: transparent;
  border: none;
  border-radius: 0;
  padding: 0;
  min-height: 106px;
  min-width: 96px;
  flex: 1 0 auto;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
}

.pipeline-stage::after {
  content: "";
  position: absolute;
  right: -22px;
  top: 22px;
  width: 26px;
  height: 1px;
  background: linear-gradient(90deg, rgba(102,118,141,0.2), rgba(102,118,141,0.7));
}

.pipeline-stage:last-child::after {
  display: none;
}

.pipeline-stage::before {
  content: "";
  position: absolute;
  top: 18px;
  right: -18px;
  width: 10px;
  height: 10px;
  border-radius: 999px;
  background: var(--teal);
  opacity: 0;
}

.pipeline-stage.is-active {
  animation: none;
}

.pipeline-stage.is-active::before {
  animation: particle-travel 1s linear infinite;
}

.pipeline-stage.is-complete::after {
  background: linear-gradient(90deg, rgba(77,245,200,0.34), rgba(77,245,200,0.92));
}

.pipeline-stage.is-complete {
  opacity: 1;
}

.pipeline-stage.is-waiting {
  opacity: 0.58;
}

.pipeline-stage .stage-label {
  display: block;
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-top: 14px;
  margin-bottom: 6px;
  white-space: nowrap;
}

.pipeline-stage .stage-value {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 44px;
  height: 44px;
  border-radius: 999px;
  border: 1px solid rgba(102,118,141,0.28);
  background: rgba(10, 18, 31, 0.84);
  color: var(--silver);
  font-size: 11px;
  line-height: 1;
  box-shadow: inset 0 0 0 1px rgba(255,255,255,0.02);
}

.pipeline-stage .stage-meta {
  display: block;
  margin-top: 8px;
  color: var(--text-muted);
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  max-width: 96px;
  white-space: normal;
}

.pipeline-stage.is-active .stage-value {
  border-color: rgba(77,245,200,0.78);
  box-shadow: var(--glow-teal);
  animation: breathe-running 1.5s ease-in-out infinite;
}

.pipeline-stage.is-complete .stage-value {
  border-color: rgba(77,245,200,0.5);
  background: rgba(77,245,200,0.12);
  box-shadow: 0 0 18px rgba(77,245,200,0.12);
}

.compare-foundation {
  background: linear-gradient(180deg, rgba(22, 27, 34, 0.95), rgba(13, 17, 23, 0.92));
  border: 1px solid var(--border);
  border-radius: 7px;
  padding: 14px 16px;
}

.compare-foundation-title {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--active);
  margin-bottom: 6px;
}

.compare-foundation-copy {
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.65;
}

.compare-entry {
  display: inline-flex;
  align-items: center;
  margin-top: 10px;
  font-family: var(--font-mono);
  font-size: 12px;
  letter-spacing: 0.06em;
  color: var(--active);
  cursor: pointer;
}

.pipeline-summary .ctx-label {
  color: var(--teal);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

.run-btn {
  height: 52px;
  background: linear-gradient(135deg, rgba(77,245,200,0.92), rgba(36,185,162,0.92));
  color: #fff;
  font-family: var(--font-mono);
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 0.1em;
  padding: 0 28px;
  border: 1px solid rgba(77,245,200,0.4);
  border-radius: 16px;
  cursor: pointer;
  transition: all 0.2s ease;
  width: 100%;
  text-transform: uppercase;
  box-shadow: var(--glow-teal);
}

.run-btn:hover:not(:disabled) {
  box-shadow: 0 0 0 1px rgba(77,245,200,0.24), 0 0 34px rgba(77,245,200,0.32);
  color: #fff;
}

.run-btn:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}

.run-btn.running {
  background: linear-gradient(135deg, rgba(77,245,200,0.82), rgba(88,166,255,0.82));
  color: var(--void);
  animation: breathe-running 1.5s ease-in-out infinite;
}

.run-btn.running .run-dot {
  display: inline-block;
  animation: run-dot-pulse 1.2s ease-in-out infinite;
}

.run-btn.action-press,
.run-btn-suite.action-press {
  transform: scale(0.985);
}

.run-log-panel {
  background:
    radial-gradient(circle at top right, rgba(88, 166, 255, 0.12), transparent 30%),
    radial-gradient(circle at 20% 0%, rgba(77, 245, 200, 0.08), transparent 24%),
    linear-gradient(180deg, rgba(13, 20, 35, 0.96), rgba(8, 11, 18, 1));
  border: 1px solid var(--border);
  border-radius: 22px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
}

.run-log-panel::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    linear-gradient(180deg, rgba(255,255,255,0.02), transparent 22%),
    radial-gradient(circle at 50% 0%, rgba(88, 166, 255, 0.06), transparent 40%);
  pointer-events: none;
}

.verdict-chamber {
  position: relative;
  padding: 24px 24px 18px;
  border-bottom: 1px solid rgba(88, 166, 255, 0.14);
  background: linear-gradient(180deg, rgba(16, 26, 44, 0.88), rgba(9, 14, 24, 0.7));
}

.run-feedback-banner {
  display: none;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 14px 18px;
  border-bottom: 1px solid rgba(77,245,200,0.18);
  background: rgba(77,245,200,0.1);
  color: var(--teal);
  animation: banner-enter 0.28s ease;
}

.run-feedback-banner.visible {
  display: flex;
}

.run-feedback-banner.tone-pass {
  background: rgba(57,211,83,0.1);
  color: var(--pass);
}

.run-feedback-banner.tone-fail,
.run-feedback-banner.tone-error {
  background: rgba(248,81,73,0.12);
  color: var(--fail);
}

.run-feedback-title {
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.16em;
  text-transform: uppercase;
}

.run-feedback-step {
  font-size: 11px;
  color: var(--silver);
}

.run-feedback-rail {
  width: 110px;
  height: 4px;
  border-radius: 999px;
  background: rgba(255,255,255,0.08);
  overflow: hidden;
}

.run-feedback-rail span {
  display: block;
  width: 45%;
  height: 100%;
  background: linear-gradient(90deg, rgba(77,245,200,0.22), var(--teal), rgba(77,245,200,0.22));
  background-size: 200% 100%;
  animation: progress-pulse 1.4s linear infinite;
}

.verdict-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
  margin-bottom: 14px;
}

.verdict-kicker {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 8px;
}

.verdict-state {
  font-family: var(--font-mono);
  font-size: 44px;
  font-weight: 800;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  line-height: 1;
  animation: fade-in 0.35s ease;
}

.verdict-state.pass { color: var(--pass); }
.verdict-state.fail { color: var(--fail); }
.verdict-state.error,
.verdict-state.blocked { color: var(--warn); }
.verdict-state.pending { color: var(--text-secondary); }

.verdict-side {
  min-width: 140px;
  text-align: right;
}

.verdict-score {
  font-family: var(--font-mono);
  font-size: 34px;
  font-weight: 800;
  color: var(--text-primary);
  line-height: 1;
  animation: fade-in 0.45s ease;
}

.verdict-confidence {
  margin-top: 8px;
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-secondary);
}

.verdict-subcopy {
  color: var(--text-secondary);
  font-size: 14px;
  line-height: 1.65;
  margin-bottom: 16px;
  max-width: 720px;
}

.verdict-grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 10px;
  margin-bottom: 14px;
}

.verdict-item {
  background: rgba(8, 11, 18, 0.68);
  border: 1px solid rgba(33, 38, 45, 0.95);
  border-radius: 8px;
  padding: 10px 12px;
  min-height: 66px;
}

.verdict-item-label {
  display: block;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 6px;
}

.verdict-item-value {
  display: block;
  color: var(--text-primary);
  font-size: 13px;
  line-height: 1.55;
  word-break: break-word;
}

.verdict-review-row {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 10px;
}

.verdict-review-card {
  background: rgba(8, 11, 18, 0.55);
  border: 1px solid rgba(33, 38, 45, 0.95);
  border-radius: 8px;
  padding: 10px 12px;
}

.verdict-review-title {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 6px;
}

.verdict-review-status {
  color: var(--text-primary);
  font-size: 13px;
  line-height: 1.55;
}

.verdict-review-status .status-tone {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-muted);
}

.verdict-scorebar {
  height: 8px;
  border-radius: 999px;
  background: rgba(255,255,255,0.06);
  overflow: hidden;
  margin-top: 16px;
}

.verdict-scorebar-fill {
  height: 100%;
  border-radius: 999px;
  background: linear-gradient(90deg, var(--active), var(--teal), var(--pass));
  animation: bar-grow 0.7s ease;
}

.run-log-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 18px;
  background: var(--surface);
  border-bottom: 1px solid var(--border-subtle);
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text-muted);
  flex-shrink: 0;
}

.run-log-header .log-meta-item {
  color: var(--text-secondary);
}

.run-log-progress {
  height: 3px;
  background: var(--border-subtle);
  width: 100%;
  position: relative;
  flex-shrink: 0;
}

.run-log-progress-bar {
  height: 100%;
  background: linear-gradient(90deg, var(--active), var(--integrity), var(--active));
  background-size: 200% 100%;
  animation: progress-pulse 2s linear infinite;
  width: 0%;
  transition: width 0.3s ease;
  border-radius: 0 2px 2px 0;
}

.run-log-body {
  flex: 1;
  overflow-y: auto;
  padding: 18px;
  font-family: var(--font-mono);
  font-size: 13px;
  line-height: 1.9;
}

.run-log-idle {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: var(--text-muted);
  font-family: var(--font-body);
  font-size: 15px;
  text-align: center;
  padding: 40px;
  line-height: 1.7;
}

.log-line {
  white-space: pre-wrap;
  word-break: break-all;
}

.log-line .log-ts {
  color: var(--text-muted);
  margin-right: 10px;
}

.log-line.type-file_read { color: var(--text-secondary); }
.log-line.type-shell-pass { color: var(--pass); }
.log-line.type-shell-fail { color: var(--fail); }
.log-line.type-file_write { color: var(--active); }
.log-line.type-task_start { color: var(--text-muted); }
.log-line.type-complete { color: var(--pass); font-weight: 700; }
.log-line.type-error { color: var(--fail); font-weight: 700; }
.log-line.type-search { color: var(--integrity); }

.run-log-entry {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 4px 0;
  font-family: var(--font-mono);
  font-size: 13px;
}

.run-log-entry .log-type {
  font-weight: 700;
  font-size: 12px;
  letter-spacing: 0.06em;
}

.run-log-entry .log-type.type-complete { color: var(--pass); }
.run-log-entry .log-type.type-error { color: var(--fail); }

.run-score-result {
  padding: 24px 16px;
  border-top: 1px solid var(--border);
  background: var(--surface);
  animation: fade-in 0.35s ease;
}

/* =========================================================================
   FILTER ROW
   ========================================================================= */
.filter-row {
  display: flex;
  gap: 12px;
  margin-bottom: 24px;
  flex-wrap: wrap;
  align-items: center;
}

.filter-row select,
.filter-row input {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text-primary);
  font-family: var(--font-mono);
  font-size: 13px;
  padding: 9px 13px;
  border-radius: 5px;
  outline: none;
  min-width: 150px;
  transition: border-color 0.15s ease;
}

.filter-row select:focus,
.filter-row input:focus {
  border-color: var(--active);
}

/* =========================================================================
   BUNDLE VIEWER (DRAWER)
   ========================================================================= */
#bundle-overlay {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(8, 11, 18, 0.7);
  backdrop-filter: blur(3px);
  z-index: 100;
  display: none;
  animation: fade-in 0.15s ease;
}

#bundle-overlay.open {
  display: block;
}

#bundle-drawer {
  position: fixed;
  top: 0;
  right: 0;
  width: var(--bundle-width);
  max-width: 90vw;
  height: 100vh;
  background: var(--surface);
  border-left: 1px solid var(--border);
  z-index: 101;
  display: none;
  flex-direction: column;
  overflow: hidden;
}

#bundle-drawer.open {
  display: flex;
  animation: slide-in-right 0.2s ease;
}

#bundle-drawer-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 22px 24px;
  border-bottom: 1px solid var(--border);
  background: var(--surface-raised);
  flex-shrink: 0;
}

#bundle-drawer-header .drawer-title {
  font-family: var(--font-body);
  font-size: 17px;
  font-weight: 600;
  color: var(--text-primary);
}

#bundle-drawer-header .drawer-sub {
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--text-muted);
  margin-top: 2px;
}

.drawer-close {
  background: none;
  border: 1px solid var(--border);
  color: var(--active);
  font-size: 18px;
  width: 32px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  border-radius: 5px;
  transition: all 0.15s ease;
}

.drawer-close:hover {
  color: var(--text-primary);
  border-color: rgba(88, 166, 255, 0.4);
  background: var(--border);
}

#bundle-drawer-body {
  flex: 1;
  overflow-y: auto;
  padding: 28px 24px;
}

.bundle-meta-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 18px;
  margin-bottom: 32px;
}

.bundle-meta-item {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.bundle-meta-item .bm-label {
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-muted);
}

.bundle-meta-item .bm-value {
  font-family: var(--font-mono);
  font-size: 14px;
  color: var(--text-primary);
  line-height: 1.6;
}

.bundle-section {
  margin-bottom: 24px;
}

.bundle-section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 0;
  cursor: pointer;
  user-select: none;
  border-bottom: 1px solid var(--border-subtle);
  margin-bottom: 14px;
  transition: color 0.1s ease;
}

.bundle-section-header:hover .section-title {
  color: var(--text-primary);
}

.bundle-section-header .section-title {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--text-muted);
  transition: color 0.1s ease;
}

/* Bundle section header colors */
#score-section .section-title { color: var(--pass); }
#diff-section .section-title { color: var(--active); }
#timeline-section .section-title { color: var(--teal); }
#security-section .section-title { color: var(--fail); }
#usage-section .section-title { color: var(--orange); }
#diagnosis-section .section-title { color: var(--integrity); }
#review-section .section-title { color: var(--pink); }

.bundle-section-header .section-toggle {
  font-size: 12px;
  color: var(--text-muted);
  transition: transform 0.15s ease;
}

.bundle-section-header.collapsed .section-toggle {
  transform: rotate(-90deg);
}

.bundle-section-content {
  overflow: hidden;
}

.bundle-section-content.collapsed {
  display: none;
}

/* Timeline items */
.timeline-item {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 6px 0;
  font-family: var(--font-mono);
  font-size: 12px;
}

.timeline-time {
  color: var(--text-muted);
  width: 50px;
  flex-shrink: 0;
  text-align: right;
}

.timeline-type-badge {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  padding: 3px 8px;
  border-radius: 3px;
  flex-shrink: 0;
  min-width: 60px;
  text-align: center;
}

.timeline-type-badge.file_read {
  background: rgba(139, 148, 158, 0.1);
  color: var(--text-secondary);
}

.timeline-type-badge.shell {
  background: rgba(57, 211, 83, 0.08);
  color: var(--pass);
}

.timeline-type-badge.shell-fail {
  background: rgba(248, 81, 73, 0.08);
  color: var(--fail);
}

.timeline-type-badge.file_write {
  background: rgba(88, 166, 255, 0.1);
  color: var(--active);
}

.timeline-type-badge.task_start {
  background: rgba(139, 148, 158, 0.08);
  color: var(--text-secondary);
}

.timeline-type-badge.search {
  background: rgba(188, 140, 255, 0.1);
  color: var(--integrity);
}

.timeline-detail {
  color: var(--text-secondary);
  word-break: break-all;
}

/* Diff */
.diff-file {
  margin-bottom: 12px;
}

.diff-file-header {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text-primary);
  padding: 8px 12px;
  background: var(--surface-raised);
  border: 1px solid var(--border);
  border-radius: 5px 5px 0 0;
  display: flex;
  gap: 10px;
  align-items: center;
}

.diff-file-header .diff-stat-add {
  color: var(--pass);
  font-size: 10px;
}

.diff-file-header .diff-stat-del {
  color: var(--fail);
  font-size: 10px;
}

.diff-patch {
  font-family: var(--font-mono);
  font-size: 12px;
  line-height: 1.7;
  padding: 12px;
  background: var(--void);
  border: 1px solid var(--border);
  border-top: none;
  border-radius: 0 0 5px 5px;
  overflow-x: auto;
  white-space: pre;
}

.diff-line-add { color: var(--pass); background: rgba(57, 211, 83, 0.06); }
.diff-line-del { color: var(--fail); background: rgba(248, 81, 73, 0.06); }
.diff-line-ctx { color: var(--text-muted); }
.diff-line-hdr { color: var(--integrity); }

/* Security grid */
.security-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.security-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  background: var(--void);
  border: 1px solid var(--border-subtle);
  border-radius: 5px;
  font-family: var(--font-mono);
  font-size: 12px;
}

.security-item .sec-icon {
  font-size: 14px;
}

.security-item .sec-icon.clean { color: var(--pass); }
.security-item .sec-icon.violation { color: var(--fail); }

.security-item .sec-label {
  color: var(--text-secondary);
}

/* Diagnosis */
.diagnosis-grid {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.diagnosis-check {
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--text-secondary);
  padding: 5px 0;
}

.diagnosis-check .diag-icon { font-size: 14px; }
.diagnosis-check .diag-icon.yes { color: var(--pass); }
.diagnosis-check .diag-icon.no { color: var(--fail); }

/* Usage grid */
.usage-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 12px;
}

.usage-item {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.usage-item .usage-label {
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-muted);
}

.usage-item .usage-value {
  font-family: var(--font-mono);
  font-size: 15px;
  font-weight: 600;
  color: var(--orange);
}

/* =========================================================================
   TRANSPARENCY DRAWER
   ========================================================================= */
#transparency-overlay {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(8, 11, 18, 0.5);
  z-index: 200;
  display: none;
}

#transparency-overlay.open { display: block; }

#transparency-drawer {
  position: fixed;
  top: 0;
  right: 0;
  width: 480px;
  max-width: 90vw;
  height: 100vh;
  background: var(--surface);
  border-left: 1px solid var(--border);
  z-index: 201;
  display: none;
  flex-direction: column;
  overflow: hidden;
}

#transparency-drawer.open {
  display: flex;
  animation: slide-in-right 0.2s ease;
}

#transparency-drawer-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 22px 20px;
  border-bottom: 1px solid var(--border);
  background: var(--surface-raised);
  flex-shrink: 0;
}

#transparency-drawer-header .drawer-title {
  font-family: var(--font-body);
  font-size: 17px;
  font-weight: 600;
  color: var(--text-primary);
}

#transparency-drawer-header .drawer-tagline {
  font-family: var(--font-body);
  font-size: 13px;
  font-style: italic;
  color: var(--text-muted);
  margin-top: 2px;
}

#transparency-drawer-body {
  flex: 1;
  overflow-y: auto;
  padding: 14px;
}

.api-log-entry {
  display: grid;
  grid-template-columns: 72px 44px 1fr 46px 54px;
  gap: 8px;
  padding: 8px 10px;
  font-family: var(--font-mono);
  font-size: 11px;
  border-bottom: 1px solid var(--border-subtle);
  align-items: center;
}

.api-log-entry .log-time { color: var(--text-muted); }
.api-log-entry .log-method { color: var(--active); font-weight: 600; }
.api-log-entry .log-url { color: var(--text-secondary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.api-log-entry .log-status { font-weight: 600; text-align: center; }
.api-log-entry .log-status.s-ok { color: var(--pass); }
.api-log-entry .log-status.s-err { color: var(--fail); }
.api-log-entry .log-status.s-pending { color: var(--warn); }
.api-log-entry .log-dur { color: var(--text-muted); text-align: right; }

.transparency-empty {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 200px;
  color: var(--text-muted);
  font-family: var(--font-body);
  font-size: 13px;
  font-style: italic;
}

#transparency-drawer-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}

#transparency-drawer-footer .footer-count {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text-muted);
}

/* =========================================================================
   RECEIPTS VIEW
   ========================================================================= */
.receipts-header {
  margin-bottom: 28px;
}

.receipts-header .receipts-title {
  font-family: var(--font-body);
  font-size: 23px;
  font-weight: 700;
  color: var(--text-primary);
  margin-bottom: 8px;
}

.receipts-header .receipts-tagline {
  font-family: var(--font-body);
  font-size: 14px;
  color: var(--text-muted);
  font-style: italic;
}

.receipts-summary {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
  margin-bottom: 28px;
}

.receipts-summary .summary-tile {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 20px 24px;
  position: relative;
  overflow: hidden;
}

.receipts-summary .summary-tile::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
}

.receipts-summary .summary-tile:nth-child(1)::before { background: var(--active); }
.receipts-summary .summary-tile:nth-child(2)::before { background: var(--orange); }
.receipts-summary .summary-tile:nth-child(3)::before { background: var(--teal); }

.summary-tile .sum-label {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 10px;
}

.summary-tile .sum-value {
  font-family: var(--font-mono);
  font-size: 27px;
  font-weight: 700;
  color: var(--text-primary);
}

/* =========================================================================
   TOAST
   ========================================================================= */
#crucibulum-toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--surface-raised);
  border: 1px solid var(--border);
  color: var(--text-primary);
  font-family: var(--font-mono);
  font-size: 13px;
  padding: 12px 26px;
  border-radius: 6px;
  z-index: 999;
  opacity: 0;
  transition: opacity 0.2s ease;
  pointer-events: none;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}

/* =========================================================================
   SCROLLBAR
   ========================================================================= */
::-webkit-scrollbar {
  width: 5px;
  height: 5px;
}

::-webkit-scrollbar-track {
  background: transparent;
}

::-webkit-scrollbar-thumb {
  background: var(--border);
  border-radius: 3px;
}

::-webkit-scrollbar-thumb:hover {
  background: var(--text-muted);
}

/* =========================================================================
   RESPONSIVE
   ========================================================================= */
@media (max-width: 1100px) {
  .summary-metrics {
    grid-template-columns: repeat(2, 1fr);
  }
  .run-layout {
    grid-template-columns: 1fr;
    height: auto;
  }
  .run-config-panel {
    max-height: 70vh;
  }
  .run-log-panel {
    min-height: 400px;
  }
  .pipeline-chain {
    flex-wrap: nowrap;
  }
  .verdict-grid {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }
  .verdict-review-row {
    grid-template-columns: 1fr;
  }
  .hero-top-row {
    flex-direction: column;
    gap: 16px;
  }
  .hero-score {
    font-size: 100px;
  }
  .metric-tile .metric-value {
    font-size: 36px;
  }
}

@media (max-width: 760px) {
  #sidebar {
    display: none;
  }
  .summary-metrics {
    grid-template-columns: 1fr;
  }
  .receipts-summary {
    grid-template-columns: 1fr;
  }
  #main-content {
    padding: 16px;
  }
  .form-group select,
  .form-group input {
    font-size: 16px;
    padding: 14px 12px;
    min-height: 48px;
  }
  .pipeline-summary {
    font-size: 11px;
    word-break: break-word;
    overflow-wrap: break-word;
  }
  .availability-note {
    font-size: 12px;
  }

<body>

<!-- Toast container -->
<div id="crucibulum-toast"></div>

<script>
/* =========================================================================
   STATE
   ========================================================================= */
let currentView = 'dashboard';
let runs = [];
let tasks = [];
let models = [];
let adapterCatalog = [];
let providerCatalog = [];
let notImplementedProviders = [];
let judgeMeta = {
  kind: 'deterministic',
  label: 'Judge: deterministic',
  description: 'oracle + hidden/public tests + integrity checks',
  verifier_model: null,
  components: ['oracle', 'hidden tests', 'public tests', 'diff rules', 'integrity checks'],
};
let stats = { total: 0, passRate: 0, avgScore: 0, avgTime: 0, totalTokens: 0, totalCost: 0 };
let apiLog = [];
let activeRunId = null;
let activeEventSource = null;
let runStartTime = null;
let runTimerInterval = null;
let sortState = { column: null, direction: 'desc' };
let historyFilters = { task: '', model: '', status: '', date: '' };

const API_BASE = window.location.origin;

const NAV_ITEMS = [
  { id: 'dashboard',    label: 'Dashboard',    key: '1' },
  { id: 'leaderboard',  label: 'Leaderboard',  key: '2' },
  { id: 'run',          label: 'Run Task',     key: '3' },
  { id: 'history',      label: 'History',      key: '4' },
  { id: 'receipts',     label: 'Receipts',     key: '5' },
  { id: 'compare',      label: 'Compare',      key: '6', disabled: true, badge: 'v1.1' },
  { id: 'bundles',      label: 'Bundles',      key: '7', disabled: true, badge: 'v1.1' },
];

/* =========================================================================
   API WRAPPER
   ========================================================================= */
async function api(method, path, body) {
  const entry = {
    method,
    path,
    status: 'pending',
    statusCode: '--',
    time: new Date().toISOString(),
    duration: null,
  };
  apiLog.push(entry);
  renderTransparencyLog();

  const start = performance.now();
  const opts = {
    method,
    headers: { 'Content-Type': 'application/json' },
  };
  if (body) opts.body = JSON.stringify(body);

  try {
    const res = await fetch(API_BASE + path, opts);
    entry.duration = Math.round(performance.now() - start);
    entry.statusCode = res.status;
    entry.status = res.ok ? 'ok' : 'err';
    renderTransparencyLog();
    if (!res.ok) {
      const errText = await res.text().catch(() => '');
      throw new Error(res.status + ' ' + res.statusText + ': ' + errText);
    }
    return await res.json();
  } catch (err) {
    entry.duration = entry.duration || Math.round(performance.now() - start);
    entry.status = 'err';
    entry.statusCode = entry.statusCode === '--' ? 'ERR' : entry.statusCode;
    renderTransparencyLog();
    throw err;
  }
}

/* =========================================================================
   DATA LOADING — NORMALIZED
   ========================================================================= */
async function loadRuns() {
  try {
    const data = await api('GET', '/api/runs');
    const rawRuns = data.runs || data || [];
    runs = rawRuns.map(function(r) {
      return {
        bundle_id: r.bundle_id,
        task_id: r.task_id || (r.task && r.task.id) || '',
        family: r.family || (r.task && r.task.family) || '',
        difficulty: r.difficulty || (r.task && r.task.difficulty) || '',
        model: r.model || (r.agent && r.agent.model) || '',
        provider: r.provider || (r.agent && r.agent.provider) || '',
        adapter: r.adapter || (r.agent && r.agent.adapter) || '',
        score: typeof r.score === 'number' ? r.score : (r.score && typeof r.score.total === 'number' ? r.score.total : 0),
        pass: typeof r.pass === 'boolean' ? r.pass : (r.score && typeof r.score.pass === 'boolean' ? r.score.pass : false),
        timestamp: r.timestamp || (r.environment && r.environment.timestamp_start) || '',
        duration_sec: r.duration_sec != null ? r.duration_sec : (r.verification_results && r.verification_results.efficiency ? r.verification_results.efficiency.time_sec : 0) || 0,
        tokens_in: r.tokens_in != null ? r.tokens_in : (r.usage ? r.usage.tokens_in : 0) || 0,
        tokens_out: r.tokens_out != null ? r.tokens_out : (r.usage ? r.usage.tokens_out : 0) || 0,
        cost_usd: r.cost_usd != null ? r.cost_usd : (r.usage ? r.usage.estimated_cost_usd : 0) || 0,
        judge: r.judge || null,
        trust: r.trust || null,
        integrity_violations: r.integrity_violations != null ? r.integrity_violations : (r.score && r.score.integrity_violations != null ? r.score.integrity_violations : 0),
        breakdown: (r.score && r.score.breakdown) || (r.verification_results ? { correctness: (r.verification_results.correctness && r.verification_results.correctness.score) || 0, regression: (r.verification_results.regression && r.verification_results.regression.score) || 0, integrity: (r.verification_results.integrity && r.verification_results.integrity.score) || 0, efficiency: (r.verification_results.efficiency && r.verification_results.efficiency.score) || 0 } : null) || r.breakdown || null,
      };
    });
    runs.sort(function(a, b) { return b.timestamp.localeCompare(a.timestamp); });
  } catch (e) {
    console.warn('Failed to load runs:', e.message);
    runs = [];
  }
}

async function loadTasks() {
  try {
    const data = await api('GET', '/api/tasks');
    tasks = data.tasks || data || [];
  } catch (e) {
    console.warn('Failed to load tasks:', e.message);
    tasks = [];
  }
}

async function loadAdapters() {
  try {
    const data = await api('GET', '/api/adapters');
    adapterCatalog = data.adapters || [];
    if (data.judge) judgeMeta = data.judge;
  } catch (e) {
    console.warn('Failed to load adapters:', e.message);
    adapterCatalog = [];
  }
}

async function loadProviders() {
  try {
    const data = await api('GET', '/api/providers');
    providerCatalog = data.providers || [];
    notImplementedProviders = data.notImplemented || [];
    if (data.judge) judgeMeta = data.judge;
  } catch (e) {
    console.warn('Failed to load providers:', e.message);
    providerCatalog = [];
    notImplementedProviders = [];
  }
}

async function loadModels() {
  try {
    const data = await api('GET', '/api/models');
    var raw = data.models || data || [];
    // Normalize API response: flatten metadata.size to size, kind to type
    models = raw.map(function(m) {
      return {
        id: m.id || m.name || '',
        name: m.name || m.id || '',
        adapter: m.adapter || m.provider || '',
        provider: m.provider || m.adapter || '',
        type: m.kind || m.type || 'local',
        size: (m.metadata && m.metadata.size) || m.size || '',
        available: m.available !== false,
        adapter_name: m.adapter_name || '',
      };
    });
    console.log('Models loaded:', models.length);
  } catch (e) {
    console.warn('Failed to load models:', e.message);
    models = [];
  }
}

function computeStats() {
  if (runs.length === 0) {
    stats = { total: 0, passRate: 0, avgScore: 0, avgTime: 0, totalTokens: 0, totalCost: 0 };
    return;
  }
  stats.total = runs.length;
  var passing = runs.filter(function(r) { return r.pass; }).length;
  stats.passRate = Math.round((passing / runs.length) * 100);
  var totalScore = runs.reduce(function(s, r) { return s + r.score; }, 0);
  stats.avgScore = Math.round((totalScore / runs.length) * 100);
  var totalTime = runs.reduce(function(s, r) { return s + r.duration_sec; }, 0);
  stats.avgTime = Math.round(totalTime / runs.length);
  stats.totalTokens = runs.reduce(function(s, r) { return s + r.tokens_in + r.tokens_out; }, 0);
  stats.totalCost = runs.reduce(function(s, r) { return s + r.cost_usd; }, 0);
}

async function loadStats() {
  try {
    var data = await api('GET', '/api/stats');
    stats = {
      total: data.total_runs != null ? data.total_runs : 0,
      passRate: data.pass_rate != null ? data.pass_rate : 0,
      avgScore: data.avg_score != null ? data.avg_score : 0,
      avgTime: data.avg_time_sec != null ? data.avg_time_sec : 0,
      totalTokens: data.total_tokens != null ? data.total_tokens : 0,
      totalCost: data.total_cost_usd != null ? data.total_cost_usd : 0,
    };
  } catch (e) {
    computeStats();
  }
}

async function loadReceipts() {
  try {
    var data = await api('GET', '/api/receipts');
    return {
      receipts: data.receipts || [],
      summary: data.summary || { total_runs: 0, total_cost_usd: 0, total_tokens: 0 },
    };
  } catch (e) {
    return { receipts: [], summary: { total_runs: 0, total_cost_usd: 0, total_tokens: 0 } };
  }
}

async function refreshData() {
  var btn = document.getElementById('btn-refresh');
  btn.textContent = 'Loading...';
  btn.disabled = true;
  try {
    await Promise.all([loadRuns(), loadTasks(), loadAdapters(), loadModels(), loadProviders()]);
    await loadStats();
    updateSidebarStatus();
    renderView();
  } finally {
    btn.textContent = 'Refresh';
    btn.disabled = false;
  }
}

/* =========================================================================
   TRUST BADGES — REUSABLE
   ========================================================================= */
function renderTrustBadges() {
  return '<div class="trust-badges">' +
    '<span class="trust-badge"><span class="trust-check">\u2713</span> Rubric Isolated</span>' +
    '<span class="trust-badge"><span class="trust-check">\u2713</span> Narration Discarded</span>' +
    '<span class="trust-badge"><span class="trust-check">\u2713</span> State-Based Scoring</span>' +
    '<span class="trust-badge"><span class="trust-check">\u2713</span> Bundle Verified</span>' +
  '</div>';
}

function reviewStatusLabel(reviewEntry, label) {
  if (!reviewEntry || !reviewEntry.enabled) return label + ': Disabled';
  var status = reviewEntry.status || 'unknown';
  var provider = reviewEntry.provider || 'Unavailable';
  var model = reviewEntry.model || 'Unavailable';
  return label + ': ' + status + ' / ' + provider + ' / ' + model;
}

function renderPipelineStage(label, value, meta, stateCls) {
  return '<div class="pipeline-stage ' + stateCls + '">' +
    '<span class="stage-value">' + esc(label.slice(0, 1)) + '</span>' +
    '<span class="stage-label">' + esc(label) + '</span>' +
    '<span class="stage-meta" title="' + esc(meta || '') + '">' + esc(value || meta || 'waiting') + '</span>' +
  '</div>';
}

function renderPipelineChain(data) {
  return '<div class="pipeline-chain">' +
    renderPipelineStage('Task', data.task, '', data.taskState) +
    renderPipelineStage('Provider', data.provider, data.adapter, data.providerState) +
    renderPipelineStage('Model', data.model, 'under test', data.modelState) +
    renderPipelineStage('Judge', data.judge, 'authoritative', data.judgeState) +
    renderPipelineStage('Review', data.review, 'advisory only', data.reviewState) +
    renderPipelineStage('Bundle', data.bundle, 'signed evidence', data.bundleState) +
  '</div>';
}

function renderVerdictChamber(data) {
  var scoreValue = data.score != null ? data.score + '%' : 'Unavailable';
  var confidenceValue = data.confidence || 'Unavailable';
  var runtimeValue = data.runtime || 'Unavailable';
  var tokensValue = data.tokens || 'Unavailable';
  var costValue = data.cost || 'Unavailable';
  var trustBadges = data.trustBadges || '';

  return '<div class="verdict-chamber">' +
    '<div class="verdict-header">' +
      '<div>' +
        '<div class="verdict-kicker">VERDICT</div>' +
        '<div class="verdict-state ' + esc(data.stateTone || 'pending') + '">' + esc(data.verdict || 'Pending') + '</div>' +
      '</div>' +
      '<div class="verdict-side">' +
        '<div class="verdict-score">' + esc(scoreValue) + '</div>' +
        '<div class="verdict-confidence">Confidence: ' + esc(confidenceValue) + '</div>' +
      '</div>' +
    '</div>' +
    '<div class="verdict-subcopy">' + esc(data.subcopy || 'Claim evaluated under controlled conditions.') + '</div>' +
    '<div class="verdict-grid">' +
      '<div class="verdict-item"><span class="verdict-item-label">Provider</span><span class="verdict-item-value">' + esc(data.provider || 'Unavailable') + '</span></div>' +
      '<div class="verdict-item"><span class="verdict-item-label">Model Under Test</span><span class="verdict-item-value">' + esc(data.model || 'Unavailable') + '</span></div>' +
      '<div class="verdict-item"><span class="verdict-item-label">Adapter</span><span class="verdict-item-value">' + esc(data.adapter || 'Unavailable') + '</span></div>' +
      '<div class="verdict-item"><span class="verdict-item-label">Runtime</span><span class="verdict-item-value">' + esc(runtimeValue) + '</span></div>' +
      '<div class="verdict-item"><span class="verdict-item-label">Deterministic Judge</span><span class="verdict-item-value">' + esc(data.judge || 'Deterministic Judge (authoritative)') + '</span></div>' +
      '<div class="verdict-item"><span class="verdict-item-label">Token Usage</span><span class="verdict-item-value">' + esc(tokensValue) + '</span></div>' +
      '<div class="verdict-item"><span class="verdict-item-label">Estimated Cost</span><span class="verdict-item-value">' + esc(costValue) + '</span></div>' +
      '<div class="verdict-item"><span class="verdict-item-label">Bundle</span><span class="verdict-item-value">' + esc(data.bundle || 'Bundle Signed') + '</span></div>' +
    '</div>' +
    trustBadges +
    '<div class="verdict-review-row">' +
      '<div class="verdict-review-card"><div class="verdict-review-title">Second Opinion</div><div class="verdict-review-status">' + esc(data.secondOpinion || 'Disabled') + '</div></div>' +
      '<div class="verdict-review-card"><div class="verdict-review-title">QC Review</div><div class="verdict-review-status">' + esc(data.qcReview || 'Disabled') + '</div></div>' +
      '<div class="verdict-review-card"><div class="verdict-review-title">Usage</div><div class="verdict-review-status">' + esc(data.usageLine || 'Unavailable') + '</div></div>' +
    '</div>' +
    '<div class="verdict-scorebar"><div class="verdict-scorebar-fill" style="width:' + esc(String(data.scoreBarWidth || 0)) + '%;"></div></div>' +
  '</div>';
}

/* =========================================================================
   SIDEBAR
   ========================================================================= */
function renderSidebar() {
  var badgeTones = ['var(--active)', 'var(--teal)', 'var(--integrity)', 'var(--warn)', 'var(--text-muted)', 'var(--text-muted)'];
  var nav = document.getElementById('sidebar-nav');
  nav.innerHTML = NAV_ITEMS.map(function(item) {
    var cls = ['nav-item'];
    if (item.id === currentView) cls.push('active');
    if (item.disabled) cls.push('disabled');
    var idx = NAV_ITEMS.indexOf(item);
    var badgeStyle = 'background:' + badgeTones[idx] + ';border-color:' + badgeTones[idx] + ';color:#081019;';
    var badge = item.badge ? '<span class="nav-badge">' + item.badge + '</span>' : '';
    var keyHint = !item.badge && item.key ? '<span class="nav-badge" style="' + badgeStyle + '">' + item.key + '</span>' : '';
    return '<div class="' + cls.join(' ') + '" data-view="' + item.id + '" onclick="navigate(\'' + item.id + '\')">' +
      '<span>' + item.label + '</span>' +
      (badge || keyHint) +
    '</div>';
  }).join('');
}

function updateSidebarStatus() {
  var lastModel = runs.length > 0 ? (runs[0].model || '--') : '--';
  document.getElementById('status-model').textContent = lastModel;
  document.getElementById('status-tasks').textContent = tasks.length > 0 ? tasks.length : '--';
  if (runs.length > 0) {
    var lastRunEl = document.getElementById('status-last-run');
    lastRunEl.textContent = runs[0].timestamp ? formatDateShort(runs[0].timestamp) : '--';
    lastRunEl.className = 'status-value ' + (runs[0].pass ? 'sv-lastrun-pass' : 'sv-lastrun-fail');
  } else {
    document.getElementById('status-last-run').textContent = '--';
  }
}

/* =========================================================================
   NAVIGATION
   ========================================================================= */
function navigate(view) {
  var item = NAV_ITEMS.find(function(n) { return n.id === view; });
  if (!item || item.disabled) return;
  currentView = view;
  renderSidebar();
  renderView();
}

/* =========================================================================
   VIEW ROUTER
   ========================================================================= */
function renderView() {
  var content = document.getElementById('main-content');
  var title = document.getElementById('view-title');

  switch (currentView) {
    case 'dashboard':
      title.textContent = 'Dashboard';
      renderDashboard(content);
      break;
    case 'leaderboard':
      title.textContent = 'Leaderboard';
      renderLeaderboard(content);
      break;
    case 'run':
      title.textContent = 'Run Task';
      renderRunTask(content);
      break;
    case 'history':
      title.textContent = 'History';
      renderHistory(content);
      break;
    case 'receipts':
      title.textContent = 'Receipts';
      renderReceipts(content);
      break;
    default:
      title.textContent = 'Dashboard';
      renderDashboard(content);
  }
}

/* =========================================================================
   DASHBOARD VIEW
   ========================================================================= */
function renderScoreTrendChart(recentRuns) {
  if (!recentRuns || recentRuns.length < 2) return '';
  var display = recentRuns.slice(0, 20).reverse();
  var w = 600, h = 120, pad = 24;
  var xStep = (w - pad * 2) / Math.max(display.length - 1, 1);
  var points = display.map(function(r, i) {
    var x = pad + i * xStep;
    var y = h - pad - (Math.round(r.score * 100) / 100) * (h - pad * 2);
    return { x: x, y: y, pass: r.pass, score: Math.round(r.score * 100), run: r };
  });
  var polyline = points.map(function(p) { return p.x + ',' + p.y; }).join(' ');
  var gridLines = '';
  for (var g = 0; g <= 4; g++) {
    var gy = pad + (g / 4) * (h - pad * 2);
    gridLines += '<line class="grid-line" x1="' + pad + '" y1="' + gy + '" x2="' + (w - pad) + '" y2="' + gy + '" />';
  }
  var dots = points.map(function(p, idx) {
    var latestCls = idx === points.length - 1 ? ' dot-latest' : '';
    var radius = idx === points.length - 1 ? 6 : 4;
    return '<circle class="dot-' + (p.pass ? 'pass' : 'fail') + latestCls + '" cx="' + p.x + '" cy="' + p.y + '" r="' + radius + '" />';
  }).join('');
  var drops = '';
  for (var i = 1; i < points.length; i++) {
    if ((points[i - 1].score - points[i].score) >= 20) {
      drops += '<text class="drop-label" x="' + (points[i].x + 6) + '" y="' + Math.max(points[i].y - 8, 14) + '">\u26a0 drop</text>';
    }
  }
  return '<div class="score-trend-section">' +
    '<div class="score-trend-title">Score Trend</div>' +
    '<svg class="score-trend-chart" viewBox="0 0 ' + w + ' ' + h + '" preserveAspectRatio="none">' +
      gridLines +
      '<polyline class="trend-line" points="' + polyline + '" />' +
      dots +
      drops +
    '</svg>' +
  '</div>';
}

function renderRunHeatmap(allRuns) {
  if (!allRuns || allRuns.length === 0) return '';
  var display = allRuns.slice(0, 60).reverse();
  var cells = display.map(function(r, idx) {
    return '<button type="button" class="heatmap-cell cell-' + (r.pass ? 'pass' : 'fail') + '" ' +
      'data-heatmap-index="' + idx + '" ' +
      'data-task="' + esc(r.task_id || '--') + '" ' +
      'data-model="' + esc(r.model || '--') + '" ' +
      'data-score="' + Math.round(r.score * 100) + '" ' +
      'data-time="' + esc(formatDuration(r.duration_sec)) + '" ' +

function taskFamilyPill(taskId, family) {
  var fam = (family || '').toLowerCase();
  if (!fam && taskId) {
    if (taskId.match(/^poison/i)) fam = 'poison';
    else if (taskId.match(/^spec/i)) fam = 'spec';
    else if (taskId.match(/^coord|^orch/i)) fam = 'coord';
    else if (taskId.match(/^personality/i)) fam = 'personality';
    else if (taskId.match(/^swe/i)) fam = 'swe';
  }
  var cls = 'fam-general';
  if (fam.indexOf('poison') !== -1) cls = 'fam-poison';
  else if (fam.indexOf('spec') !== -1) cls = 'fam-spec';
  else if (fam.indexOf('coord') !== -1 || fam.indexOf('orch') !== -1) cls = 'fam-coord';
  else if (fam.indexOf('personality') !== -1) cls = 'fam-personality';
  else if (fam.indexOf('swe') !== -1) cls = 'fam-swe';
  return '<span class="task-pill ' + cls + '">' + esc(taskId || '--') + '</span>';
}
