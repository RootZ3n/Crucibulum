// Fetch timeout for the ping. Keeps the UI responsive even when the server is

const esc=(v)=>String(v??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
const fmtMoney=(v)=>`$${Number(v??0).toFixed(4)}`;
const fmtDate=(v)=>{if(!v)return'Never';const d=new Date(v);return Number.isNaN(d.getTime())?String(v):d.toLocaleString()};
const fmtMs=(v)=>{const ms=Number(v??0);if(!Number.isFinite(ms)||ms<=0)return'0 ms';return ms>=1000?`${(ms/1000).toFixed(2)} s`:`${Math.round(ms)} ms`};
function scorePct(value){const n=Number(value??0);if(!Number.isFinite(n))return 0;return Math.max(0,Math.min(100,Math.round(n<=1?n*100:n)))}
function fmtPct(value){return `${scorePct(value)}%`}
function apiUrl(path,scope){
  const url=new URL(path,window.location.origin);
  if(Array.isArray(scope)&&scope.length)url.searchParams.set('families',scope.join(','));
  else if(scope&&Array.isArray(scope.taskFamilies)&&scope.taskFamilies.length)url.searchParams.set('task_families',scope.taskFamilies.join(','));
  else if(scope&&Array.isArray(scope.families)&&scope.families.length)url.searchParams.set('families',scope.families.join(','));
  if(scope&&scope.includeQuarantined)url.searchParams.set('include_quarantined','1');
  return url.toString();
}
// Stable, order-independent scope key used for tabData cache tagging and
// server-response verification. Mirrors the backend's resolveLaneScope() so
// a response can be verified against the request with a single string compare.
function laneScopeKey(tabKey){
  const families=TAB_CONFIG[tabKey]?.taskFamilies||[];
  if(!families.length)return 'all';
  return [...families].sort().join(',');
}
function responseScopeKey(payload){
  if(!payload||typeof payload!=='object')return null;
  if(typeof payload.scope_key==='string')return payload.scope_key;
  if(Array.isArray(payload.task_families)&&payload.task_families.length)return [...payload.task_families].sort().join(',');
  if(payload.task_families===null)return 'all';
  return null;
}
// ─── Single-source scope descriptor ────────────────────────────────────────
// Every hero/live/leaderboard/vitals surface reads scope via this helper so
// the wording can never drift between places. A tab is one of three kinds:
//   global    — dashboard: intentionally aggregates every lane
//   lane      — benchmark/poison/build/safety/memory/personality
//   settings  — providers tab: registry CRUD, not a benchmark surface
// sampleSize: how many runs are in scope right now (drives provisional
// banners). provisional: true when runs exist but none meet LEADERBOARD_MIN_N.
const LEADERBOARD_MIN_N_UI=3;
function laneScopeDescriptor(tabKey){
  const cfg=TAB_CONFIG[tabKey]||null;
  if(!cfg||tabKey==='dashboard'){
    const runs=allRuns();
    return{
      kind:'global',
      tabKey:'dashboard',
      tabLabel:cfg?.label||'Dashboard',
      scopeLabel:'GLOBAL · ALL LANES',
      families:[],
      familiesLabel:'every configured lane',
      sampleSize:runs.length,
      provisional:false,
      adequate:runs.length>=LEADERBOARD_MIN_N_UI,
    };
  }
  if(cfg.isSettings){
    return{kind:'settings',tabKey,tabLabel:cfg.label,scopeLabel:cfg.label.toUpperCase()+' · SETTINGS',families:[],familiesLabel:'registry only — no lane data',sampleSize:0,provisional:false,adequate:true};
  }
  const families=cfg.taskFamilies||[];
  const familiesLabel=families.map((f)=>TASK_FAMILY_LABELS[f]||f).join(' · ')||'—';
  const runs=state.tabData[tabKey]?.runs||[];
  const board=state.tabData[tabKey]?.leaderboard||[];
  // Provisional when we have SOMETHING to show but nothing crosses the min-N
  // threshold, OR when we have <3 runs total. Two signals, same verdict:
  // the operator should treat ranks as indicative, not authoritative.
  const anyAdequate=board.some((entry)=>entry&&entry.sample_adequate===true);
  const provisional=runs.length>0&&(!anyAdequate||runs.length<LEADERBOARD_MIN_N_UI);
  return{
    kind:'lane',
    tabKey,
    tabLabel:cfg.label,
    scopeLabel:`LANE · ${cfg.label.toUpperCase()}`,
    families,
    familiesLabel,
    sampleSize:runs.length,
    provisional,
    adequate:runs.length>=LEADERBOARD_MIN_N_UI&&anyAdequate,
  };
}
// Origin taxonomy used by the verdict badge + archive row rendering.
// A single source of truth so archive filters, badges, and row glyphs never
// diverge on which origins count as "infra" vs "test/judge" vs "model fail".
const VERDICT_ORIGIN_META={
  PASS:{cls:'vx-pass',glyph:'●',hue:'teal',label:'PASS',hint:'Completed and met the pass threshold.'},
  'FAIL.MODEL':{cls:'vx-fail-model',glyph:'▼',hue:'red',label:'FAIL · MODEL',hint:'The model ran but produced a failing result — this is the model losing on merit.'},
  'FAIL.OTHER':{cls:'vx-fail-other',glyph:'▼',hue:'red',label:'FAIL',hint:'Completed with a failing verdict.'},
  'NC.PROVIDER':{cls:'vx-nc-provider',glyph:'⚠',hue:'amber',label:'NC · PROVIDER',hint:'Provider/API rejected or errored out — no fair read of the model.'},
  'NC.NETWORK':{cls:'vx-nc-network',glyph:'⚠',hue:'amber',label:'NC · NETWORK',hint:'Network failure before or during the run — retry before judging the model.'},
  'NC.HARNESS':{cls:'vx-nc-harness',glyph:'◆',hue:'amber',label:'NC · HARNESS',hint:'Harness/adapter could not deliver the run — not a model verdict.'},
  'NC.TEST':{cls:'vx-nc-test',glyph:'◆',hue:'cyan',label:'NC · TEST',hint:'Test fixture/oracle issue — the test itself did not produce a decision.'},
  'NC.JUDGE':{cls:'vx-nc-judge',glyph:'◆',hue:'cyan',label:'NC · JUDGE',hint:'Judge could not score — run completed but no verdict was issued.'},
  'NC.UNKNOWN':{cls:'vx-nc-unknown',glyph:'◇',hue:'dim',label:'NC · UNKNOWN',hint:'Not complete — origin could not be classified from evidence.'},
  REVIEW:{cls:'vx-review',glyph:'◎',hue:'amber',label:'REVIEW',hint:'Borderline score — not a confident pass or fail.'},
  PENDING:{cls:'vx-pending',glyph:'◌',hue:'dim',label:'PENDING',hint:'No verdict resolved yet.'},
};
function verdictOriginKey(state,origin){
  const s=String(state||'').toUpperCase();
  const o=String(origin||'').toUpperCase();
  if(s==='PASS')return'PASS';
  if(s==='FAIL')return o==='MODEL'?'FAIL.MODEL':'FAIL.OTHER';
  if(s==='NC'){
    if(o==='PROVIDER')return'NC.PROVIDER';
    if(o==='NETWORK')return'NC.NETWORK';
    if(o==='HARNESS')return'NC.HARNESS';
    if(o==='TEST')return'NC.TEST';
    if(o==='JUDGE')return'NC.JUDGE';
    return'NC.UNKNOWN';
  }
  if(s==='REVIEW')return'REVIEW';
  return'PENDING';
}
function verdictOriginMeta(state,origin){
  return VERDICT_ORIGIN_META[verdictOriginKey(state,origin)]||VERDICT_ORIGIN_META.PENDING;
}
// Narrowly-scoped diagnostic hinter. Returns a short, actionable next step
// when the failure reason contains a signature we recognize — nothing
// otherwise. "Narrow" is the point: every hint added here must be true and
// load-bearing or it devolves into noise that operators learn to ignore.
function diagnoseReasonHint(reasonText,modelId){
  const msg=String(reasonText||'').toLowerCase();
  // MiniMax, OpenAI, Anthropic, and OpenRouter all answer an unknown model
  // with "unknown model" / "model not found" / "no such model" in the body.
  // In every case the fix is the same: register a real id via Providers tab.
  if(/unknown model|model not found|no such model|invalid model/.test(msg)){
    return`The provider does not recognize "${modelId||'this model id'}". Open the Providers tab and register a real model id for this adapter — the TEST button verifies it against the live API before you press RUN.`;
  }
  if(/model id not configured/.test(msg)){
    return'No model configured for this adapter. Open the Providers tab, register at least one model id, and re-arm it before running.';
  }
  if(/api[_ -]?key not set|missing api[_ -]?key/.test(msg)){
    return'API key not set. Configure the provider via the Providers tab (or export the expected env var) and TEST it before running.';
  }
  if(/invalid api[_ -]?key|auth/.test(msg)&&/401|403|2049/.test(msg)){
    return'The API key was rejected. Re-enter the key via the Providers tab — the TEST button flags auth failures without burning a full run.';
  }
  return null;
}
function defaultTabState(){return{selectedTask:'',selectedTasks:[],runCount:'all',taskFilter:'',taskOnlySelected:false,selectedModels:[],selectedProvider:'',selectedAdapter:'',stats:{},leaderboard:[],leaderboardMeta:{ranking_mode:'public_verified',eligible_count:0,quarantined_count:0,filters_applied:{}},runs:[],scopeKey:null,dataError:null}}
function normalizeId(v){return String(v||'').trim().toLowerCase()}
function normalizeKey(v){return normalizeId(v).replace(/[^a-z0-9]+/g,'_').replace(/^_+|_+$/g,'')}
function pick(obj,...keys){for(const key of keys){const v=obj?.[key];if(v!==undefined&&v!==null)return v}return undefined}
function humanizeToken(text){const raw=String(text||'').replace(/[_-]+/g,' ').replace(/\s+/g,' ').trim();if(!raw)return'General Check';return raw.replace(/\b\w/g,(m)=>m.toUpperCase())}
// Prefer the manifest's human-readable display_name over the raw ID. The
// /api/tasks endpoint puts the resolved name on each task; this helper
// looks it up cheaply and falls back to the legacy humanizeToken so old
// call sites keep working when state.tasks hasn't loaded yet.
function displayTestName(taskOrId){
  if(!taskOrId)return humanizeToken(taskOrId);
  const id=typeof taskOrId==='string'?taskOrId:taskOrId.id;
  if(typeof taskOrId==='object'&&taskOrId&&typeof taskOrId.display_name==='string'&&taskOrId.display_name.trim())return taskOrId.display_name.trim();
  const task=Array.isArray(state.tasks)?state.tasks.find((t)=>t.id===id):null;
  if(task&&typeof task.display_name==='string'&&task.display_name.trim())return task.display_name.trim();
  return humanizeToken(id);
}
function categoryInfo(name){const key=normalizeKey(name);if(CATEGORY_COPY[key])return CATEGORY_COPY[key];return{label:humanizeToken(name),description:'Checks whether the model handled this part of the task correctly.'}}
function outcomeClass(score,status){if(status==='pass'||score>=80)return'pass';if(status==='fail'||score<55)return'fail';return'warn'}
function statusWord(score,status){if(status==='pass'||score>=80)return'PASSED';if(status==='fail'||score<55)return'FAILED';return'REVIEW'}
function buildFailureText(entry,score,summary){if(summary)return summary;if(score>=80)return'It passed this check and stayed above the passing line.';if(score>=55)return'This was shaky. It partly worked, but not strongly enough to count as a clear pass.';return'This failed because the result fell below the passing line.'}
function normalizedVerdict(run){
  const verdict=pick(run,'verdict')||pick(run,'outcome')?.verdict||null;
  if(verdict&&typeof verdict==='object')return verdict;
  return null;
}
function verdictBadge(verdict,overall){
  if(verdict){
    const stateKey=String(verdict.completionState||'').toUpperCase();
    const structuredOrigin=verdict.evidence&&verdict.evidence.providerError&&verdict.completionState==='NC'
      ? String(verdict.evidence.providerError.origin||'').toUpperCase()
      : '';
    const origin=structuredOrigin||(verdict.failureOrigin?String(verdict.failureOrigin).toUpperCase():null);
    const summary=verdict.failureReasonSummary||'';
    // Legacy 3-bucket CSS class (pass/warn/fail) stays so existing markup
    // keeps working; originCls is the new origin-specific class the clarity
    // pass uses to distinguish MODEL fail from infra NC from test/judge NC.
    const cls=stateKey==='PASS'?'pass':stateKey==='FAIL'?'fail':'warn';
    const meta=verdictOriginMeta(stateKey,origin);
    return{
      cls,
      originCls:meta.cls,
      glyph:meta.glyph,
      hint:meta.hint,
      label:meta.label,
      summary,
      state:stateKey,
      origin:origin||'',
      isModelFailure:stateKey==='FAIL'&&origin==='MODEL',
      isInfra:stateKey==='NC'&&['PROVIDER','NETWORK','HARNESS','UNKNOWN'].includes(origin||''),
      isTestOrJudge:stateKey==='NC'&&['TEST','JUDGE'].includes(origin||''),
    };
  }
  const cls=overall>=80?'pass':overall>=55?'warn':'fail';
  const label=overall>=80?'PASS':overall>=55?'REVIEW':'FAIL';
  const fallbackMeta=overall>=80?VERDICT_ORIGIN_META.PASS:overall>=55?VERDICT_ORIGIN_META.REVIEW:VERDICT_ORIGIN_META['FAIL.OTHER'];
  return{cls,originCls:fallbackMeta.cls,glyph:fallbackMeta.glyph,hint:fallbackMeta.hint,label,summary:'',state:label,origin:'',isModelFailure:label==='FAIL',isInfra:false,isTestOrJudge:false};
}

  if(key==='regression')return'Did it break anything else?';

  if(score>=80)return{label:'🟢 Great',className:'great'};

function verdictFromScore(score){
  if(score>=90)return{className:'great',message:'✅ This AI performed very well — it completed the task correctly and safely',meaning:'This result suggests the model handled the task well, followed the benchmark rules, and stayed reliable under this test.'};
  if(score>=70)return{className:'okay',message:'⚠️ This AI performed adequately but has room for improvement',meaning:'This result is usable, but there were weaknesses or inconsistencies that make the model less dependable on harder versions of this task.'};
  return{className:'bad',message:'❌ This AI struggled with this task and may not be reliable here',meaning:'This result shows meaningful gaps. Treat this model as risky for this kind of task until it performs better on repeated runs.'};
}

  if(focused)return focused.overall;

function scopeNormalizedRuns(tabKey){return scopeRuns(tabKey).map((run)=>normalizeRunForDisplay(run))}

function runElapsedMs(run){
  if(!run)return 0;
  const start=run.startedAt?new Date(run.startedAt).getTime():0;
  const end=(run.status==='complete'||run.status==='error')&&run.completedAt?new Date(run.completedAt).getTime():Date.now();
  if(!start||Number.isNaN(start)||Number.isNaN(end)||end<start)return 0;
  return end-start;

// ─── Critical Failure Rate ────────────────────────────────────────
// A single, honest, explainable top-level metric.
//
// Definition:
//   CRITICAL_FAILURE_RATE = (# runs in current scope whose overall score
//                            falls in the CRITICAL band) ÷ (# runs in scope)
// Threshold: CRITICAL_THRESHOLD = 55 (mirrors the red band used throughout
// the UI's verdict classifications — a single source of truth, not a
// new arbitrary cutoff).
//
// Scope:
//   - dashboard tab: every run across every non-settings lane (allRuns())
//   - any other tab: state.tabData[tabKey].runs (the runs already
//     lane-filtered by /api/runs?task_families=...).
//
// Refresh:
//   Banner is re-rendered on every render() call. New runs completing via
//   SSE trigger refreshTabData(), which overwrites state.tabData[tab].runs,
//   so the banner reflects the newest data as soon as it lands.
//
// Empty / partial states are handled explicitly (see criticalFailureStats).
const CRITICAL_THRESHOLD=55;
function criticalFailureStats(scope){
  const runs=scope==='dashboard'?allRuns():(state.tabData[scope]?.runs||[]);
  // Only count runs whose overall score is actually known. A run without a
  // resolvable score must not be silently bucketed into "pass" or "critical"
  // — it's in-flight or malformed, and counting it would break the honesty
  // of the denominator. So we filter to "scored" runs and use that as the
  // denominator.
  const scored=[];
  const critical=[];
  for(const run of runs){
    const n=normalizeRunForDisplay(run);
    if(n.verdict&&n.verdict.completionState==='NC')continue;
    if(n.verdict&&n.verdict.completionState==='FAIL'&&n.verdict.failureOrigin==='MODEL'){
      scored.push({run,normalized:n});
      critical.push({run,normalized:n});
      continue;
    }
    if(!n.overallKnown)continue;
    scored.push({run,normalized:n});
    if(n.overall<CRITICAL_THRESHOLD)critical.push({run,normalized:n});
  }
  const total=scored.length;
  const rawTotal=runs.length;
  const rate=total>0?(critical.length/total)*100:null;
  return{
    scope,
    total,                // denominator — runs with a known score
    rawTotal,             // total runs in scope (incl. unscored)
    critical:critical.length,
    rate,                 // null when total === 0
    threshold:CRITICAL_THRESHOLD,
    criticalRuns:critical.map((c)=>c.run),
    pending:rawTotal-total,
  };
}
function jumpToCriticalEvidence(){
  // Click/tap handler on the banner. Scrolls to the run archive panel for
  // the current scope. The archive is where the contributing failures can
  // actually be inspected — banner → evidence in one tap.
  const target=document.getElementById('crit-evidence-anchor');
  if(target){
    target.scrollIntoView({behavior:'smooth',block:'start'});
    try{target.focus({preventScroll:true})}catch{}
  }
}
function renderCriticalBanner(){
  const s=criticalFailureStats(state.activeTab);
  const scopeLabel=state.activeTab==='dashboard'?'ALL LANES':(TAB_CONFIG[state.activeTab]?.label||'LANE').toUpperCase();

  // Empty state — NOT a fake 0%. Must be visually distinct from "clean".
  if(s.total===0){
    const hint=s.pending>0?`${s.pending} RUN${s.pending===1?'':'S'} PENDING SCORE`:`NO RUNS IN ${esc(scopeLabel)} YET`;
    return`<button type="button" class="status-strip neutral" disabled aria-label="Critical failure rate: no scored runs in scope yet" title="Critical Failure Rate — no scored runs in scope yet. A run enters this count once its score resolves."><div class="ss-left"><div class="ss-dot"></div></div><div class="ss-mid">CRITICAL FAILURE RATE · ${esc(scopeLabel)}</div><div class="ss-bar"><div class="ss-fill" style="width:0%"></div></div><div class="ss-score">—</div><div class="ss-sub">${hint}</div></button>`;
  }

  const rate=s.rate ?? 0;
  const rateRounded=Math.round(rate);
  // Banding on the rate itself, not on a score: 0 is clean (teal), 1–10 is
  // warn (orange), >10 is fail (red). Makes "0 critical" visually obvious
  // as a GOOD state rather than a vague absence.
  const cls=rateRounded===0?'pass':rateRounded<=10?'warn':'fail';
  const cleanSuffix=s.critical===0?' · CLEAN':'';
  const subtitle=`${s.critical}/${s.total} BELOW ${s.threshold}%${cleanSuffix}`;
  const explain=`Critical Failure Rate = runs scoring below ${s.threshold}% ÷ runs with a resolved score, in scope "${scopeLabel}". Currently ${s.critical} of ${s.total}. Click to jump to the contributing runs.`;
  return`<button type="button" class="status-strip ${cls}" onclick="jumpToCriticalEvidence()" aria-label="${esc(explain)}" title="${esc(explain)}"><div class="ss-left"><div class="ss-dot"></div></div><div class="ss-mid">CRITICAL FAILURE RATE · ${esc(scopeLabel)}</div><div class="ss-bar"><div class="ss-fill" style="width:${Math.min(100,Math.max(0,rateRounded))}%"></div></div><div class="ss-score">${rateRounded}%</div><div class="ss-sub">${esc(subtitle)}</div></button>`;
}
// Kept as an alias so any external reference (tests, tooling) continues
// to work. The banner is now the Critical Failure Rate, not a vague verdict.
function renderVerdictBanner(){return renderCriticalBanner()}

/**
 * Derive short visual tags from a category result. Used by signal
 * cards in place of the old paragraph "explanation" / "outcome" text.
 * Each tag is a one-or-two-word signal the reviewer can scan in
 * milliseconds — `stable`, `strong`, `unstable`, `failed`, `2 pass`.
 */
function deriveTags(category){
  const tags=[];
  const s=Number(category.score)||0;
  if(s>=90)tags.push({label:'strong',cls:'teal'});
  else if(s>=80)tags.push({label:'stable',cls:'teal'});
  else if(s>=55)tags.push({label:'unstable',cls:''});
  else tags.push({label:'failed',cls:'red'});
  if(category.pass>0)tags.push({label:`${category.pass} pass`,cls:'dim'});
  if(category.fail>0)tags.push({label:`${category.fail} fail`,cls:'red'});
  if(category.error>0)tags.push({label:`${category.error} err`,cls:'red'});
  if(category.timeMs>0)tags.push({label:fmtMs(category.timeMs).replace(/\s+/g,''),cls:'dim'});
  return tags.slice(0,5);
}

function dynamicLocalModelGroup(){

    .filter((model)=>normalizeId(model.provider)==='ollama'||normalizeId(model.adapter)==='ollama')

    if(!byId.has(id))byId.set(id,model);
  }

  const models=(byId.size?Array.from(byId.values()):fallback)

function mergedModelGroups(){
  const groups=[];
  groups.push(dynamicLocalModelGroup());
  // Index registry models by the preset id of their owning provider so each
  // preset's UI group picks up manually-registered models from the Providers
  // tab. Without this, anything the user added shows up in Providers but is
  // invisible in the lane model picker.
  const registryProviders=state.registry?.providers||[];
  const providersByPreset=new Map();
  for(const provider of registryProviders){
    if(!provider.enabled)continue;
    if(!providersByPreset.has(provider.presetId))providersByPreset.set(provider.presetId,[]);
    providersByPreset.get(provider.presetId).push(provider);
  }
  const registryModelsByTarget=new Map();
  for(const entry of state.registry?.catalog||[]){
    if(!entry.providerEnabled||!entry.enabled)continue;
    const targetKey=`${entry.presetId}:${entry.adapter}`;
    if(!registryModelsByTarget.has(targetKey))registryModelsByTarget.set(targetKey,new Map());
    const byId=registryModelsByTarget.get(targetKey);
    const key=normalizeId(entry.modelId);
    if(!byId.has(key))byId.set(key,{id:entry.modelId,label:entry.displayName||entry.modelId,available:true,metadata:{}});
  }
  for(const group of DEFAULT_MODEL_GROUPS){
    if(group.key==='ollama')continue;
    const registryKey=`${group.key}:${group.adapterId}`;
    const registryMap=registryModelsByTarget.get(registryKey);
    const curated=group.models.map((model)=>({id:model.id,label:model.label,available:true,metadata:{}}));
    const merged=new Map();
    if(registryMap){
      for(const [k,v] of registryMap)merged.set(k,v);
    }
    const accountScoped=ACCOUNT_SCOPED_PROVIDER_IDS.has(group.key);
    if(!accountScoped||!registryMap||registryMap.size===0){
      for(const model of curated){
        const k=normalizeId(model.id);
        if(!merged.has(k))merged.set(k,model);
      }
    }
    groups.push({
      ...group,
      inventoryMode:registryMap?'registered':'curated',
      models:Array.from(merged.values())
    });
  }
  // Registry presets without a hardcoded DEFAULT_MODEL_GROUPS entry still need
  // a place to surface their models.
  for(const [targetKey,byId] of registryModelsByTarget){
    const [presetId,adapterId]=String(targetKey).split(':');
    if(DEFAULT_MODEL_GROUPS.some((g)=>g.key===presetId))continue;
    const providers=providersByPreset.get(presetId)||[];
    const first=providers[0];
    const entry=(state.registry?.catalog||[]).find((c)=>c.presetId===presetId&&c.adapter===adapterId);
    if(!entry)continue;
    groups.push({
      key:presetId,
      label:first?.label||entry.providerLabel||entry.presetLabel||presetId,
      providerId:presetId,
      adapterId:adapterId||entry.adapter,
      kind:entry.kind==='local'?'local':'cloud',
      inventoryMode:'registered',
      models:Array.from(byId.values())
    });
  }
  return groups;
}
function catalogEntries(){return mergedModelGroups().flatMap((group)=>group.models.map((model)=>({...model,providerId:group.providerId,adapterId:group.adapterId,providerLabel:group.label,kind:group.kind,inventoryMode:group.inventoryMode})))}
function preferredDefaultModelId(){
  const groups=mergedModelGroups();
  const registeredCloud=groups.find((group)=>group.kind==='cloud'&&group.inventoryMode==='registered'&&group.models.length>0);
  if(registeredCloud)return registeredCloud.models[0].id;
  const cloud=groups.find((group)=>group.kind==='cloud'&&group.models.length>0);
  if(cloud)return cloud.models[0].id;
  const any=groups.find((group)=>group.models.length>0);

function catalogMap(){
  const byId=new Map();
  for(const entry of catalogEntries()){
    const key=normalizeId(entry.id);
    const existing=byId.get(key);
    if(!existing){

    // override curated defaults with the same raw id. This matters for
    // MiniMax: a registered direct model must beat the curated Squidley route.
    if(entry.inventoryMode==='registered'&&existing.inventoryMode!=='registered'){

}

// ── Auth: token storage + centralized fetch ─────────────────────────────
const AUTH_TOKEN_KEY='crucibulum-auth-token';
function getStoredToken(){try{return localStorage.getItem(AUTH_TOKEN_KEY)||''}catch{return ''}}
function setStoredToken(t){try{localStorage.setItem(AUTH_TOKEN_KEY,t)}catch{}}
function clearStoredToken(){try{localStorage.removeItem(AUTH_TOKEN_KEY)}catch{}}

// AuthError is thrown by fetchJSON on 401 so callers can branch without
// parsing error strings. Boot uses it to show the auth-required screen.
class AuthError extends Error{constructor(msg,reason){super(msg);this.name='AuthError';this.reason=reason||'unauthorized'}}

// HTTPError preserves the structured JSON body on non-2xx responses so the
// caller can surface a specific reason (e.g. 422 adapter_cannot_run_task) instead
// of stringifying the whole payload into a log line.
class HTTPError extends Error{
  constructor(status,text,body){
    super((body&&(body.reason||body.error))||text||`${status}`);
    this.name='HTTPError';
    this.status=status;
    this.body=body||null;
  }
}

async function fetchJSON(url,options){
  const opts={...(options||{})};
  const headers=new Headers(opts.headers||{});
  const token=getStoredToken();
  if(token&&!headers.has('Authorization'))headers.set('Authorization','Bearer '+token);
  opts.headers=headers;
  const res=await fetch(url,opts);
  if(res.status===401){
    let reason='unauthorized';
    try{const body=await res.clone().json();if(body&&typeof body.reason==='string')reason=body.reason}catch{}
    throw new AuthError('unauthorized',reason);
  }
  if(!res.ok){
    const text=await res.text();
    let body=null;
    try{body=text?JSON.parse(text):null}catch{}
    throw new HTTPError(res.status,text,body);
  }
  return res.json();
}

async function refreshTabData(tabKey){
  const config=TAB_CONFIG[tabKey];
  const scope=config.taskFamilies&&config.taskFamilies.length?{taskFamilies:config.taskFamilies}:null;
  const leaderboardScope=scope?{...scope,includeQuarantined:true}:{includeQuarantined:true};
  const expectedScopeKey=laneScopeKey(tabKey);
  let stats,leaderboard,runs;
  try{
    [stats,leaderboard,runs]=await Promise.all([
      fetchJSON(apiUrl('/api/stats',scope)),
      fetchJSON(apiUrl('/api/leaderboard',leaderboardScope)),
      fetchJSON(apiUrl('/api/runs',scope))
    ]);
  }catch(err){
    const next=reconcileTabSelection(tabKey,state.tabData[tabKey]||defaultTabState());
    const kind=classifyError(err,'data_refresh');
    const status=err instanceof HTTPError?err.status:null;
    state.tabData[tabKey]={...next,dataError:{kind,status,message:String(err&&err.message||err||'data refresh failed'),at:new Date().toISOString()},stats:next.stats||{},leaderboard:next.leaderboard||[],leaderboardMeta:{...(next.leaderboardMeta||{}),ranking_mode:'public_verified',rankings_incomplete:true,error_kind:kind,error_status:status},runs:next.runs||[],scopeKey:expectedScopeKey};
    return;
  }
  // Scope integrity: every lane-aware response echoes the resolved scope
  // (scope_key / task_families). If any arrived with a different scope — a
  // racing refresh, a cache rewrite, a proxy that stripped the query — we
  // refuse to commit the payload into this tab's cache. A stale empty state
  // is safer than silently showing another lane's numbers under this label.
  for(const [label,payload] of [['stats',stats],['leaderboard',leaderboard],['runs',runs]]){
    const got=responseScopeKey(payload);
    if(got!==null&&got!==expectedScopeKey){
      console.warn('refreshTabData: scope mismatch for',tabKey,label,'expected',expectedScopeKey,'got',got);
      return;
    }
  }
  const next=reconcileTabSelection(tabKey,state.tabData[tabKey]||defaultTabState());
  state.tabData[tabKey]={...next,stats,leaderboard:leaderboard.leaderboard||[],leaderboardMeta:{ranking_mode:leaderboard.ranking_mode||'public_verified',eligible_count:Number(leaderboard.eligible_count||0),quarantined_count:Number(leaderboard.quarantined_count||leaderboard.ineligible_count||0),malformed_count:Number(leaderboard.malformed_count||leaderboard.malformed_count_in_scope||0),malformed_count_total:Number(leaderboard.malformed_count_total||0),malformed_count_unknown_scope:Number(leaderboard.malformed_count_unknown_scope||0),filters_applied:leaderboard.filters_applied||{},reason_buckets:leaderboard.quarantine_reason_buckets||{},quarantine_examples:leaderboard.quarantine_examples||[],excluded_mock_demo:leaderboard.excluded_mock_demo===true,excluded_unverified_or_tampered:leaderboard.excluded_unverified_or_tampered===true},runs:runs.runs||[],scopeKey:expectedScopeKey,dataError:null};
  if(!state.focusedResult[tabKey]&&state.tabData[tabKey].runs[0])state.focusedResult[tabKey]=normalizeRunForDisplay(state.tabData[tabKey].runs[0]);
}

// ── Mission Banner ─────────────────────────────────────────────────────────
// Top-level "NOW RUNNING" strip. Shown only while a run is active — dominant,
// glanceable, and labeled in plain words rather than system jargon.
//
// Answers at a glance: What is running? What just finished? What is next?
// How far are we through the batch? Is anything failing?
function missionBatchCounts(run){
  const base=batchCounts(run);
  const running=base.started;
  const done=base.completed;
  const failed=base.failed+base.could_not_start;
  const skipped=base.skipped_by_preflight;
  const resolved=done+failed+skipped;
  const planned=base.planned||(run?.batchPlanned??run?.batchTotal??0);
  const remaining=Math.max(0,planned-resolved-running);
  const position=Math.min(planned,resolved+Math.max(1,running));
  return{planned,running,done,failed,skipped,resolved,remaining,position};
}
function nextQueuedItem(run,currentTaskId,currentModelId){
  const items=Array.isArray(run?.batchItems)?run.batchItems:[];
  let seenCurrent=false;
  for(const item of items){
    const isActive=item.taskId===currentTaskId&&item.modelId===currentModelId&&(item.status==='started'||item.status==='queued');
    if(isActive){seenCurrent=true;continue}
    if(!seenCurrent)continue;
    if(item.status==='queued')return item;
  }
  // Fallback: first queued item anywhere if we never matched the "active" one.
  for(const item of items){if(item.status==='queued')return item}
  return null;
}
function lastResolvedItem(run){
  const items=Array.isArray(run?.batchItems)?run.batchItems:[];
  for(let i=items.length-1;i>=0;i-=1){
    const s=items[i].status;
    if(s==='completed'||s==='failed'||s==='could_not_start'||s==='skipped_by_preflight')return items[i];
  }
  return null;
}
function laneLabelForTab(tabKey){return TAB_CONFIG[tabKey]?.label||humanizeToken(tabKey||'run')}
function phaseClass(run){
  const phase=run?.phase||'preparing';
  if(run?.status==='error')return'failed';
  if(run?.status==='complete')return'done';
  return phase;
}
function renderPhaseTrack(run){
  const active=phaseClass(run);
  const activeIdx=phaseIndex(active);
  return`<ol class="mb-phase-track" aria-label="Run phase">${PHASE_SEQUENCE.map((step,idx)=>{
    const state=idx<activeIdx?'done':idx===activeIdx?'active':'pending';
    return`<li class="mb-phase-step ${state}"><span class="mb-phase-dot" aria-hidden="true"></span><span class="mb-phase-name">${esc(PHASE_LABELS[step])}</span></li>`;
  }).join('')}</ol>`;
}
function renderMissionQueue(run,currentTaskId,currentModelId){
  const items=Array.isArray(run?.batchItems)?run.batchItems:[];
  if(!items.length)return'';
  // Keep the queue scannable — cap at 14 chips, tag overflow count at the end.
  const MAX=14;
  const chips=items.slice(0,MAX).map((item)=>{
    const isActive=item.taskId===currentTaskId&&item.modelId===currentModelId&&(item.status==='started'||item.status==='queued');
    let cls='queued';
    if(item.status==='completed')cls=item.pass===false?'failed':'done';
    else if(item.status==='failed'||item.status==='could_not_start')cls='failed';
    else if(item.status==='skipped_by_preflight')cls='skipped';
    else if(isActive)cls='active';
    const label=`${humanizeToken(item.taskId)} · ${item.modelId}`;
    const ariaLabel=`${label} — ${cls}`;
    return`<li class="mb-queue-item ${cls}" title="${esc(ariaLabel)}" aria-label="${esc(ariaLabel)}">${isActive?'<span class="mb-queue-pulse" aria-hidden="true"></span>':''}<span class="mb-queue-name">${esc(label)}</span>${isActive?'<span class="mb-queue-tag">Running Now</span>':''}</li>`;
  }).join('');
  const overflow=items.length>MAX?`<li class="mb-queue-more">+${items.length-MAX} more</li>`:'';
  return`<div class="mb-queue-shell"><div class="mb-section-label">Queue</div><ul class="mb-queue">${chips}${overflow}</ul></div>`;
}
function renderMissionFeed(run){
  const events=(run?.events||[]).slice(0,6);
  if(!events.length)return'';
  const rows=events.map((evt)=>{
    const cls=evt.kind||'info';

  }).join('');
  return`<div class="mb-feed-shell"><div class="mb-section-label">Activity</div><ul class="mb-feed">${rows}</ul></div>`;
}

  const itemElapsed=fmtElapsedCompact(Date.now()-startedAt);

  const lastVerdict=!last?'—':last.status==='completed'?(last.pass===false?'FAIL':'PASS'):last.status==='skipped_by_preflight'?'SKIPPED':last.status==='could_not_start'?'DID NOT START':'FAIL';
  const lastText=last?`${humanizeToken(last.taskId)} · ${last.modelId}`:'No results yet';

  const laneClick=`onclick="setActiveTab('${esc(tabKey)}')"`;
  return`<section class="mission-banner ${phaseState} ${phase}" aria-live="polite">

        <span class="mb-elapsed-total ls-ticker" data-kind="batch" data-started-at="${run.startedAt?new Date(run.startedAt).getTime():startedAt}" title="Elapsed for the whole batch">total ${esc(batchElapsed)}</span>

    <div class="mb-primary-row">

    <div class="mb-progress-row">

      <div class="mb-progress-counts">

        <span class="mb-count fail ${counts.failed>0?'hot':''}" title="Failed or could not start">Failed <strong>${counts.failed}</strong></span>
        <span class="mb-count skip" title="Skipped by preflight">Skipped <strong>${counts.skipped}</strong></span>

          <div class="mission-grid">

            <div class="mission-cell"><div class="mission-label">ELAPSED</div><div class="mission-value dim">0 ms</div></div>
            <div class="mission-cell"><div class="mission-label">COMPLETED CATEGORIES</div><div class="mission-value dim">0</div></div>
          </div>
          <div class="ls-progress"><div class="ls-bar"><div class="ls-fill" style="width:0%"></div></div><div class="ls-progress-label">0/${selected||0} ran · standing by</div></div>

        <div class="live-side">

            <div class="count-chip"><span class="count-label">FAIL</span><span class="count-value">0</span></div>
            <div class="count-chip"><span class="count-label">SKIP</span><span class="count-value">0</span></div>
          </div>
          <div class="live-category-boxes"><div class="mini-live-box dim">No category results yet</div></div>
        </div>
      </div>
      <div class="ls-latest" style="opacity:.6">▲ no signal — press RUN to start</div>
      <div class="ls-telemetry">${renderTelemetryRow(focused)}</div>
    </div>`;
  }
  const status=run.status||'queued';
  const cls=status==='complete'?'teal':status==='error'?'red':status==='running'?'orange':'cyan';
  const label=status==='complete'?'COMPLETE':status==='error'?'FAILED':status==='running'?'RUNNING':status==='starting'?'QUEUED':String(status).toUpperCase();
  const counts=batchCounts(run);
  const planned=counts.planned||(run.batchPlanned??run.batchTotal??0);
  const attempted=(run.batchAttempted??run.batchDone??0);
  const executed=counts.completed||(run.batchExecuted??0);
  const failed=counts.failed;
  const couldNotStart=counts.could_not_start;
  const skippedByPreflight=counts.skipped_by_preflight;
  const passed=run.batchPassed??0;
  const resolved=executed+failed+couldNotStart+skippedByPreflight;
  const elapsed=fmtMs(runElapsedMs(run));
  const activeTaskLabel=run.currentTaskId?humanizeToken(run.currentTaskId):(tab.selectedTask?humanizeToken(tab.selectedTask):'Awaiting task');
  const activeModelLabel=run.currentModelId||focused?.model||'Awaiting model';
  const completedFamilies=(run.completedFamilies||[]).slice(0,6);
  const liveFeed=(run.recentCompletions||[]).slice(0,4);
  // Progress reflects work resolved (attempted) vs work planned — never inflated
  // before anything has happened. When runs couldn't start (adapter mismatch,
  // 422, stream error) they show as a dedicated "couldn't start" count rather
  // than silently inflating the pass/fail column.
  const pct=planned?Math.round((resolved/planned)*100):(status==='complete'?100:0);
  const latest=(run.lines||[]).slice(-1)[0]||'';
  const current=tab.selectedTask?humanizeToken(tab.selectedTask):'';
  const progressLabel=(()=>{
    if(!planned)return '';
    const parts=[`${executed}/${planned} ran`];
    if(counts.queued>0)parts.push(`${counts.queued} queued`);
    if(counts.started>0)parts.push(`${counts.started} running`);
    if(failed>0)parts.push(`${failed} failed after start`);
    if(couldNotStart>0)parts.push(`${couldNotStart} couldn't start`);
    if(skippedByPreflight>0)parts.push(`${skippedByPreflight} skipped by preflight`);
    if(passed>0)parts.push(`${passed} passed`);
    return parts.join(' · ');
  })();
  const progressHtml=planned>1?`<div class="ls-progress"><div class="ls-bar"><div class="ls-fill" style="width:${pct}%"></div></div><div class="ls-progress-label">${esc(progressLabel)}</div></div>`:'';
  const warnHtml=run.warn?`<div class="inline-warn">${esc(run.warn)}</div>`:'';
  const reasons=batchReasonItems(run);
  // Reason rows: surface the structured provider error as ORIGIN / KIND /
  // HTTP-status chips so the operator can tell AUTH vs RATE_LIMIT vs
  // UNAVAILABLE vs INVALID_RESPONSE apart at a glance instead of squinting
  // at a long reason sentence. A "retry" hint rides along when the error
  // is marked retryable — "this is worth pressing RUN again" vs "fix the
  // config first" is the product question people actually have.
  const reasonsHtml=reasons.length?`<div class="ls-reasons">${reasons.slice(0,6).map((entry)=>{
    const pe=entry.providerError;
    const originChip=pe&&pe.origin?`<span class="chip dim scope-chip" title="Where the failure originated">${esc(String(pe.origin).toUpperCase())}</span>`:'';
    const kindCls=pe&&pe.kind==='AUTH'?'red':pe&&(pe.kind==='RATE_LIMIT'||pe.kind==='UNAVAILABLE'||pe.kind==='HTTP_5XX')?'amber':pe&&pe.kind==='INVALID_RESPONSE'?'cyan':'dim';
    const kindChip=pe&&pe.kind?`<span class="chip ${kindCls}" title="Error kind">${esc(String(pe.kind))}</span>`:'';
    const statusChip=pe&&pe.statusCode?`<span class="chip dim" title="HTTP status">HTTP ${esc(String(pe.statusCode))}</span>`:'';
    const retryChip=pe&&pe.retryable?`<span class="chip teal" title="This error is retryable — pressing RUN again may succeed.">RETRYABLE</span>`:'';
    const stageChip=entry.stage?`<span class="chip dim" title="Stage where the failure occurred">${esc(String(entry.stage).replace(/_/g,' ').toUpperCase())}</span>`:'';
    // Pattern-match the reason text for well-known provider misconfigurations
    // so the row shows an actionable next step, not just a diagnostic. Keep
    // these strictly to cases where the fix really is obvious — over-hinting
    // turns into noise. The hint is rendered as a small row below the reason
    // line so it's legible but doesn't drown the original error.
    const reasonText=String(entry.reason||'');
    const hint=diagnoseReasonHint(reasonText,entry.modelId);
    const hintHtml=hint?`<div class="ls-reason-hint"><span class="chip amber hot">FIX</span> ${esc(hint)}</div>`:'';
    return`<div class="ls-reason"><span class="chip dim">${esc(entry.status.replace(/_/g,' ').toUpperCase())}</span>${stageChip}${originChip}${kindChip}${statusChip}${retryChip} <strong>${esc(entry.taskId)}</strong> · ${esc(entry.modelId)} · ${esc(entry.reason)}${hintHtml}</div>`;
  }).join('')}</div>`:'';
  const phaseLabel=PHASE_LABELS[phaseClass(run)]||'Preparing';
  return `<div class="live-status ${cls}">
    <div class="live-grid">
      <div class="live-primary">
        <div class="ls-head">
          <span class="chip ${cls} hot">${esc(label)}</span>
          ${scopeChip}
          ${healthChip}
          <span class="chip dim" title="Current phase">${esc(phaseLabel.toUpperCase())}</span>
          ${run.runId?`<span class="chip dim">${esc(String(run.runId).slice(0,14))}</span>`:''}
          <span class="ls-sub">${esc(current||activeTaskLabel)}</span>
        </div>
        <div class="mission-grid">
          <div class="mission-cell"><div class="mission-label">ACTIVE MODEL</div><div class="mission-value">${esc(activeModelLabel)}</div></div>
          <div class="mission-cell"><div class="mission-label">ACTIVE TEST</div><div class="mission-value">${esc(activeTaskLabel)}</div></div>
          <div class="mission-cell"><div class="mission-label">ELAPSED</div><div class="mission-value ls-ticker" data-kind="item" data-started-at="${run.currentItemStartedAt||(run.startedAt?new Date(run.startedAt).getTime():Date.now())}">${esc(fmtElapsedCompact(Date.now()-(run.currentItemStartedAt||(run.startedAt?new Date(run.startedAt).getTime():Date.now()))))}</div></div>
          <div class="mission-cell"><div class="mission-label">COMPLETED CATEGORIES</div><div class="mission-value">${completedFamilies.length}</div></div>
        </div>
        ${progressHtml}
        ${completedFamilies.length?`<div class="completed-strip">${completedFamilies.map((family)=>`<span class="chip teal">${esc(String(family).toUpperCase())}</span>`).join('')}</div>`:''}
        ${warnHtml}
        ${reasonsHtml}
      </div>
      <div class="live-side">
        <div class="live-counts">
          <div class="count-chip"><span class="count-label">DONE</span><span class="count-value">${resolved}</span></div>
          <div class="count-chip"><span class="count-label">FAIL</span><span class="count-value">${failed+couldNotStart}</span></div>
          <div class="count-chip"><span class="count-label">SKIP</span><span class="count-value">${skippedByPreflight}</span></div>
        </div>
        <div class="live-category-boxes">${liveFeed.length?liveFeed.map((entry)=>`<div class="mini-live-box ${entry.statusClass}"><div class="mini-live-top"><span>${esc(entry.modelId)}</span><span>${entry.overall}%</span></div><div class="mini-live-sub">${esc(entry.family)} · ${esc(humanizeToken(entry.taskId))}</div><div class="mini-live-tags">${entry.categories.map((category)=>`<span class="tag ${category.statusClass==='pass'?'teal':category.statusClass==='fail'?'red':'dim'}">${esc(category.label)} ${category.score}%</span>`).join('')}</div></div>`).join(''):'<div class="mini-live-box dim">Awaiting completed categories</div>'}</div>
      </div>
    </div>
    ${latest?`<div class="ls-latest" title="${esc(latest)}">${esc(latest)}</div>`:''}
    <div class="ls-telemetry">${renderTelemetryRow(focused)}</div>
  </div>`;
}

function renderTelemetryRow(focused){
  const op=focused?.operationalRows?.[0]||null;
  const tokensIn=op?.tokensIn??null;
  const tokensOut=op?.tokensOut??null;
  const cost=op?.cost??null;
  const duration=focused?.categories?.[0]?.timeMs??0;
  const dimCell=(v)=>`<span class="dim">${esc(v)}</span>`;
  const durHtml=duration>0?esc(fmtMs(duration)):dimCell('pending');
  const tokInHtml=(tokensIn!=null&&tokensIn>0)?esc(String(tokensIn)):dimCell('—');
  const tokOutHtml=(tokensOut!=null&&tokensOut>0)?esc(String(tokensOut)):dimCell('—');
  const costHtml=(cost!=null&&cost>0)?esc(fmtMoney(cost)):dimCell('—');
  return `<div class="tel-row">
    <div class="tel-cell"><div class="tel-k">DUR</div><div class="tel-v">${durHtml}</div></div>
    <div class="tel-cell"><div class="tel-k">TOK IN</div><div class="tel-v">${tokInHtml}</div></div>
    <div class="tel-cell"><div class="tel-k">TOK OUT</div><div class="tel-v">${tokOutHtml}</div></div>
    <div class="tel-cell"><div class="tel-k">COST</div><div class="tel-v">${costHtml}</div></div>
  </div>`;
}
function modelSelectionNote(tabKey){
  const models=(state.tabData[tabKey]?.selectedModels)||[];
  if(!models.length)return'No models selected.';

  const localCount=routes.filter((r)=>r.kind==='local').length;
  const cloudCount=routes.filter((r)=>r.kind==='cloud').length;

}
function modelInventoryNote(){
  const localInstalled=(state.liveModels||[]).filter((model)=>normalizeId(model.provider)==='ollama'||normalizeId(model.adapter)==='ollama').length;
  const localLabel=localInstalled>0
    ? `Local (Ollama) shows ${localInstalled} installed model${localInstalled===1?'':'s'} detected live from /api/models on this machine.`
    : 'Local (Ollama) falls back to the built-in shortlist because live inventory is unavailable right now.';
  return `${localLabel} Account-scoped cloud providers such as MiniMax use your registered provider inventory when available. Cloud groups remain the curated benchmark pool for everything else.`;

function canonicalBreakdownEntries(run){
  // The breakdown arrives in three shapes depending on source:
  // - /api/runs row: run.breakdown (flat, top-level)
  // - /api/runs/:id/summary: run.outcome.score_breakdown (nested under outcome)
  // - SSE 'complete' payload: run.score.breakdown (run.score is an object here, not a number)
  // All three must resolve to the same four-category order below.
  const scoreObj=run&&typeof run.score==='object'&&run.score?run.score:null;
  const raw=pick(run,'breakdown')||pick(run,'outcome')?.score_breakdown||scoreObj?.breakdown||{};
  const order=['correctness','regression','integrity','efficiency'];
  return order.filter((key)=>raw&&raw[key]!==undefined).map((key)=>{
    const score=scorePct(raw[key]);
    const info=categoryInfo(key);
    return{
      key,
      rawName:key,
      name:info.label,
      explanation:info.description,
      score,
      pass:score>=80?1:0,
      fail:score<55?1:0,
      error:0,
      timeMs:Number(pick(run,'duration_ms','elapsed_ms')||0),
      status:statusWord(score,score<55?'fail':'pass'),
      statusClass:outcomeClass(score,score<55?'fail':'pass'),
      outcome:`${info.label} contributed ${score}% to the canonical run result.`
    };
  });
}

function normalizeRunForDisplay(run){
  // Run payloads arrive in three shapes and the focused panel must bind to
  // all of them from one source of truth:
  //   1. /api/runs row         — flat {score: number, breakdown, tokens_in, cost_usd, ...}
  //   2. /api/runs/:id/summary — nested {outcome: {score, score_breakdown}, usage, target, ...}
  //   3. SSE 'complete' payload — nested {score: {total, breakdown, pass}, target, ...}
  // Hydration also re-normalizes an already-normalized object (overall, operationalRows, ...).
  // The fallback chains below accept all four so overall score never decays to a stale 0.
  const target=pick(run,'target')||{};
  const model=pick(run,'model','modelId','model_name')||target.model||'unknown';
  const provider=pick(run,'provider','providerId')||target.provider||deriveRoutingForModel(model).providerId||'unknown';
  const outcome=pick(run,'outcome')||null;
  const scoreField=run?run.score:undefined;
  const scoreIsObject=scoreField&&typeof scoreField==='object';
  const rawOverall=
    pick(run,'overall_score','composite','avg_score','overall')
    ??(scoreIsObject?undefined:scoreField)
    ??outcome?.score
    ??(scoreIsObject?scoreField.total:undefined);
  const overallKnown=rawOverall!==undefined&&rawOverall!==null&&Number.isFinite(Number(rawOverall));
  const overall=overallKnown?scorePct(rawOverall):0;
  const verdict=normalizedVerdict(run);
  const verdictView=verdictBadge(verdict,overall);
  const interpretation=pick(run,'interpretation')||null;
  const description=pick(run,'model_description','description')||`Run completed through ${provider}.`;
  const rawCategories=pick(run,'category_breakdown','categories','categoryScores')
    ||outcome?.score_breakdown
    ||(scoreIsObject?scoreField.breakdown:null)
    ||[];
  const categories=(Array.isArray(rawCategories)?rawCategories:Object.entries(rawCategories).map(([name,val])=>({name,...(typeof val==='object'?val:{score:val})}))).map((entry)=>{
    const score=scorePct(pick(entry,'score','value','overall'));
    const name=pick(entry,'name','category','label')||'general';
    const info=categoryInfo(name);
    const pass=Number(pick(entry,'pass_count','pass','passed')??(score>=80?1:0));
    const fail=Number(pick(entry,'fail_count','fail','failed')??(score<55?1:0));
    const error=Number(pick(entry,'error_count','errors')??0);
    const timeMs=Number(pick(entry,'time_ms','duration_ms','elapsed_ms')??pick(run,'duration_ms','elapsed_ms')??0);
    const rawSummary=pick(entry,'message','detail','summary','failure_reason','what_failed');
    return{
      key:normalizeKey(name),
      rawName:name,
      name:info.label,
      explanation:info.description,
      score,
      pass,
      fail,
      error,
      timeMs,
      status:statusWord(score,pick(entry,'status')),
      statusClass:outcomeClass(score,pick(entry,'status')),
      outcome:buildFailureText(entry,score,rawSummary)
    };
  });
  // Conversational bundles (the per-question format used by classification,
  // reasoning, truthfulness, context-degradation tasks) don't store
  // task_results — the per-question failures live on the timeline as
  // `error` events with a `detail` string like
  // "CL1-Q1: FAIL — Response did not match pattern /\\bbug\\b/. Got: …".
  // Surface those so the user doesn't end up staring at a single
  // "Run completed through minimax" row with no explanation of which
  // question failed or why.
  const timelineErrors=Array.isArray(pick(run,'timeline'))
    ?pick(run,'timeline').filter((e)=>e&&e.type==='error'&&typeof e.detail==='string')
    :[];
  const details=(Array.isArray(pick(run,'task_results','results','items','tests'))?pick(run,'task_results','results','items','tests'):[]).map((item)=>{
    const score=scorePct(pick(item,'score','overall_score'));
    const status=pick(item,'status')||(pick(item,'pass')===true?'pass':pick(item,'pass')===false?'fail':'review');
    return{
      id:pick(item,'id','task_id','name')||`detail-${Math.random().toString(36).slice(2,8)}`,
      name:humanizeToken(pick(item,'task','task_id','name','id')||'Task'),
      score,
      status:statusWord(score,status),
      statusClass:outcomeClass(score,status),
      message:buildFailureText(item,score,pick(item,'message','detail','summary')||''),
      timeMs:Number(pick(item,'time_ms','duration_ms','elapsed_ms')||0),
      latencyMs:Number(pick(item,'latency_ms','time_ms','duration_ms','elapsed_ms')||0),
      cost:Number(pick(item,'cost_usd','estimated_cost_usd')||0),
      prompt:pick(item,'prompt','question','input','user_prompt','query')||'',
      answer:pick(item,'answer','response','output','model_answer','assistant_response')||'',
      expected:pick(item,'expected','expected_answer','threshold','pass_condition','rubric','oracle')||'',
      errorText:pick(item,'error','error_text','stderr','failure_reason')||'',
      reason:pick(item,'reason','failure_reason','pass_reason','judge_note')||'',
      evidence:pick(item,'evidence','notes','judge_evidence','diff','excerpt')||''
    };
  });
  const fallbackCategory=categoryInfo('workflow');
  const breakdownEntries=canonicalBreakdownEntries(run);
  return{
    id:pick(run,'bundle_id','run_id','id')||`${model}-${Date.now()}`,
    runId:pick(run,'bundle_id','run_id','id')||'',
    bundleId:pick(run,'bundle_id','run_id','id')||'',
    bundleHash:pick(run,'bundle_hash')||'',
    model,
    provider,
    description,
    overall,
    verdict,
    verdictLabel:verdictView.label,
    verdictSummary:verdictView.summary,
    verdictClass:verdictView.cls,
    verdictOriginCls:verdictView.originCls,
    verdictGlyph:verdictView.glyph,
    verdictHint:verdictView.hint,
    interpretation,
    completionState:verdictView.state,
    failureOrigin:verdictView.origin,
    isModelFailure:!!verdictView.isModelFailure,
    isInfraIssue:!!verdictView.isInfra,
    isTestOrJudgeIssue:!!verdictView.isTestOrJudge,
    categories:categories.length?categories:(breakdownEntries.length?breakdownEntries:[{
      key:'workflow',
      rawName:'workflow',
      name:fallbackCategory.label,
      explanation:fallbackCategory.description,
      score:overall,
      pass:overall>=80?1:0,
      fail:overall<55?1:0,
      error:0,
      timeMs:Number(pick(run,'duration_ms','elapsed_ms')||0),
      status:statusWord(overall,pick(run,'pass')===false?'fail':'pass'),
      statusClass:outcomeClass(overall,pick(run,'pass')===false?'fail':'pass'),
      outcome:buildFailureText(run,overall,pick(run,'summary','message')||description)
    }]),
    operationalRows:[{
      model,
      efficiency:scorePct(pick(run,'breakdown')?.efficiency||outcome?.score_breakdown?.efficiency||(scoreIsObject?scoreField.breakdown?.efficiency:undefined)||pick(run,'efficiency_score','value_score')),
      tokensIn:Number(pick(run,'tokens_in')??pick(run,'usage')?.tokens_in??0),
      tokensOut:Number(pick(run,'tokens_out')??pick(run,'usage')?.tokens_out??0),
      cost:Number(pick(run,'cost_usd')??pick(run,'usage')?.estimated_cost_usd??0),
      correctness:scorePct(pick(run,'breakdown')?.correctness||outcome?.score_breakdown?.correctness||(scoreIsObject?scoreField.breakdown?.correctness:undefined)||pick(run,'correctness'))
    }],
    recommendations:Array.isArray(pick(run,'recommendations','findings','actionable_findings'))&&pick(run,'recommendations','findings','actionable_findings').length?pick(run,'recommendations','findings','actionable_findings'):[overall>=80?'This run is strong enough to keep in the preferred pool.':'This run needs attention before it should be trusted.'],
    details:details.length
      ?details
      :timelineErrors.length
        ?timelineErrors.map((event,idx)=>{
          const detail=String(event.detail||'');
          // Conversational error lines are usually "QID: VERDICT — reason … Got: answer"
          // Split on em-dash first, then on " Got: " to separate the judge's reason
          // from what the model actually said.
          const labelSplit=detail.split(/\s[—-]\s/);
          const label=labelSplit[0]||`Step ${idx+1}`;
          const rest=labelSplit.slice(1).join(' — ');
          const gotSplit=rest.split(/\bGot:\s*/);
          const reason=gotSplit[0]?.trim()||rest||detail;
          const answer=gotSplit.slice(1).join('Got: ').trim();
          return{
            id:`tl-${idx}`,
            name:label.replace(/:\s*FAIL\s*$/i,''),
            score:0,
            status:'FAIL',
            statusClass:'fail',
            message:reason,
            reason,
            answer,
            prompt:'',
            expected:'',
            errorText:'',
            evidence:'',
            timeMs:Number(event.t||0),
            latencyMs:0,
            cost:0
          };
        })
        :[{name:humanizeToken(pick(run,'task_id','task')||'Run'),score:overall,status:statusWord(overall,pick(run,'pass')===false?'fail':'pass'),statusClass:outcomeClass(overall,pick(run,'pass')===false?'fail':'pass'),message:buildFailureText(run,overall,pick(run,'summary','message')||description),timeMs:Number(pick(run,'duration_ms','elapsed_ms')||0)}],
    timestamp:pick(run,'timestamp','created_at')||pick(run,'timing')?.started_at,
    task:pick(run,'task_id','task')||'batch',
    pass:pick(run,'pass')??outcome?.pass??(scoreIsObject?scoreField.pass:undefined),
    overallKnown,
    family:pick(run,'family'),
    difficulty:pick(run,'difficulty'),
    passThreshold:scorePct(pick(run,'pass_threshold')||pick(run,'outcome')?.pass_threshold),
    judge:pick(run,'judge')||{},
    oracleIntegrity:pick(run,'oracle_integrity')||{},
    benchmarkProvenance:pick(run,'benchmark_provenance')||pick(run,'task')?.benchmark_provenance||{},
    // Judge model spend, separate from tested-model spend. Always defined so
    // the UI can render "Judge cost: $0 (deterministic)" without branching.
    judgeUsage:pick(run,'judge_usage')||{provider:'',model:'',tokens_in:0,tokens_out:0,estimated_cost_usd:0,kind:'deterministic',note:'deterministic judge — no model cost'},
    trust:pick(run,'trust')||{},
    reviewSecurity:pick(run,'review_security')||{},
    secondOpinionStatus:pick(run,'second_opinion_status')||'skipped',
    qcReviewStatus:pick(run,'qc_review_status')||'skipped',
    schema:pick(run,'schema')||'crucibulum.evaluation.summary.v1',
    suiteId:pick(run,'suite_id')||'v1',
    authority:pick(run,'authority')||{}
  };
}

function runEligibilityMeta(run){
  const n=run?.n||run||{};
  const raw=run?.raw||run||{};
  const trust=n.trust||raw.trust||{};
  const sig=String(trust.bundle_signature_status||'legacy_unverified').toLowerCase();
  const values=[n.adapter,n.provider,n.model,raw.adapter,raw.provider,raw.model,raw.target?.adapter,raw.target?.provider,raw.target?.model]
    .map(v=>String(v||'').toLowerCase());
  const isMock=values.some(v=>v.includes('harness-mock')||v.includes('mock')||v.includes('demo'));
  const verified=trust.bundle_verified===true&&trust.bundle_authenticated===true&&sig==='valid'&&!isMock;
  if(verified)return{ranked:true,label:'ELIGIBLE FOR PUBLIC RANKING',cls:'teal'};
  if(isMock)return{ranked:false,label:'MOCK/DEMO · NOT RANKED',cls:'dim'};
  if(sig==='tampered'||sig==='forged')return{ranked:false,label:'TAMPERED · NOT RANKED',cls:'red'};
  if(sig==='legacy_unverified')return{ranked:false,label:'LEGACY · UNVERIFIED · NOT RANKED',cls:'warn'};
  if(sig==='unsigned_key_missing')return{ranked:false,label:'UNSIGNED · NOT RANKED',cls:'warn'};
  return{ranked:false,label:'UNVERIFIED · NOT RANKED',cls:'warn'};
}

async function hydrateFocusedRun(tabKey,runId){
  try{
    // Full bundle endpoint — gives us both the summary (scores, pass/fail)
    // and the raw bundle (timeline with per-question error detail). The
    // drilldown view leans on the timeline to show why each question failed;
    // the /summary-only endpoint strips it, which is why the failure panel
    // ended up showing a single generic "Run completed through minimax" row.
    const res=await fetchJSON(`/api/runs/${encodeURIComponent(runId)}`);
    if(!res?.summary&&!res?.bundle)return;
    const current=state.focusedResult[tabKey];
    if(!current||String(current.runId)!==String(runId))return;
    const timeline=res.bundle?.timeline||res.summary?.timeline;
    state.focusedResult[tabKey]=normalizeRunForDisplay({...current,...(res.summary||{}),...(timeline?{timeline}:{})});
    render();
  }catch{}
}

function setFocusedRun(tabKey,run){
  const normalized=normalizeRunForDisplay(run);
  state.focusedResult[tabKey]=normalized;
  render();
  if(normalized.runId)hydrateFocusedRun(tabKey,normalized.runId);
}

function toggleSection(name){state.collapsed[name]=!state.collapsed[name];render()}

// watchRunCompletion resolves with a structured outcome the caller can route
// into counters. Three outcomes matter:
//   {executed:true, pass:bool}   — SSE complete event fired → bundle stored
//   {executed:false, reason:str} — SSE error fired or stream lost → no bundle
// Conflating these was the core integrity bug: the UI treated "error" as
// "ran and failed" and ticked batchDone regardless. Now "did not run" is
// explicit and bubbles to progress display.
function watchRunCompletion(tabKey,runId,taskId,modelId){
  return new Promise((resolve)=>{
    const source=new EventSource(`/api/run/${encodeURIComponent(runId)}/live`);
    let started=false;
    source.addEventListener('step',(event)=>{
      try{
        const payload=JSON.parse(event.data);
        const line=payload.detail||payload.type||'Step';
        if(payload.type==='task_start'&&!started){
          started=true;
          updateBatchItem(tabKey,taskId,modelId,{status:'started',runId,startedAt:new Date().toISOString()});
          setRunPhase(tabKey,'executing');
          pushRunEvent(tabKey,'exec',`Executing ${humanizeToken(taskId)} · ${modelId}`);
        }
        if(state.runState[tabKey]){
          state.runState[tabKey].currentTaskId=taskId;
          state.runState[tabKey].currentModelId=modelId;
        }
        if(payload.type==='task_error'){
          updateBatchItem(tabKey,taskId,modelId,{reason:payload.detail||'Run failed after launch.'});
          pushRunEvent(tabKey,'fail',`Error in ${humanizeToken(taskId)}: ${(payload.detail||'').slice(0,80)}`);
        }
        state.runState[tabKey].lines.push(`[${taskId} :: ${modelId}] ${line}`);
        render();
      }catch{}
    });
    source.addEventListener('complete',async(event)=>{
      source.close();
      setRunPhase(tabKey,'judging');
      const payload=JSON.parse(event.data);
      const normalized=normalizeRunForDisplay({...payload,bundle_id:runId,task_id:taskId,model:modelId});
      const verdict=normalized.verdictLabel||((normalized.pass===false)?'FAIL':'PASS');
      pushRunEvent(tabKey,'judge',`Judged ${verdict} · ${normalized.overall}% · ${humanizeToken(taskId)}`);
      state.runState[tabKey].lines.push(`[${taskId} :: ${modelId}] ${verdict} at ${normalized.overall}%`);
      state.focusedResult[tabKey]=normalized;
      const family=taskFamilyLabel(taskId,normalized.family);
      const liveEntry={taskId,modelId,family,overall:normalized.overall,categories:topCategoryTags(normalized.categories,3),statusClass:normalized.overall>=80?'pass':normalized.overall>=55?'warn':'fail'};
      state.runState[tabKey].recentCompletions=[liveEntry,...(state.runState[tabKey].recentCompletions||[])].slice(0,6);
      state.runState[tabKey].completedFamilies=Array.from(new Set([...(state.runState[tabKey].completedFamilies||[]),family]));
      updateBatchItem(tabKey,taskId,modelId,{status:'completed',runId,pass:normalized.completionState==='PASS',completedAt:new Date().toISOString(),reason:normalized.verdictSummary||''});
      setRunPhase(tabKey,'recording');
      pushRunEvent(tabKey,'record','Recorded evidence bundle');
      for(const key of Object.keys(TAB_CONFIG))await refreshTabData(key);
      render();
      resolve({status:'completed',executed:true,started:true,pass:normalized.completionState==='PASS',payload});
    });
    source.addEventListener('error',(event)=>{
      source.close();
      let reason='Run stream interrupted — no evidence bundle produced.';
      let stage='stream';
      let classification=started?'failed':'could_not_start';
      let parsed=false;
      let providerError=null;
      try{
        const payload=JSON.parse(event.data);
        reason=payload.error||payload.reason||reason;
        stage=payload.stage||stage;
        classification=payload.classification||classification;
        providerError=payload.provider_error||null;
        parsed=true;
      }catch{}
      const finish=(finalStatus,finalReason,finalStage,finalProviderError)=>{
        updateBatchItem(tabKey,taskId,modelId,{status:finalStatus,runId,reason:finalReason,providerError:finalProviderError||providerError||null,stage:finalStage||stage||null,completedAt:new Date().toISOString()});
        state.runState[tabKey].lines.push(`[${taskId} :: ${modelId}] ${finalStatus==='failed'?'FAILED':'DID NOT RUN'} — ${finalReason}`);
        const kind=finalStatus==='skipped_by_preflight'?'skip':'fail';
        const verb=finalStatus==='skipped_by_preflight'?'Skipped':(finalStatus==='failed'?'Failed':'Could not start');
        // Map raw reason → categorized label so the feed shows *why*, not just a
        // stack trace. Auth / timeout / network / upstream are the cases the
        // user can actually act on.
        const category=classifyError({message:finalReason,reason:finalReason,provider_error:finalProviderError||providerError},finalStage);
        const label=failureReasonLabel(category);
        pushRunEvent(tabKey,kind,`${verb} ${humanizeToken(taskId)} · ${label} · ${String(finalReason||'').slice(0,80)}`);
        render();
        resolve({status:finalStatus,executed:false,started,pass:false,reason:finalReason,stage:finalStage,category});
      };
      if(parsed){
        const finalStatus=(classification==='skipped_by_preflight'?'skipped_by_preflight':(started||classification==='failed')?'failed':'could_not_start');
        finish(finalStatus,reason,stage,providerError);
        return;
      }
      fetchJSON(`/api/run/${encodeURIComponent(runId)}/status`).then((status)=>{
        if(status?.status==='complete'&&status?.bundle_id){
          updateBatchItem(tabKey,taskId,modelId,{status:'completed',runId,completedAt:new Date().toISOString()});
          state.runState[tabKey].lines.push(`[${taskId} :: ${modelId}] Stream closed after completion — reconciling from status endpoint.`);
          render();
          resolve({status:'completed',executed:true,started:true,pass:false,reconciled:true});
          return;
        }
        const finalStatus=(status?.failure_stage==='execution'||started)?'failed':'could_not_start';
        finish(finalStatus,status?.error||reason,status?.failure_stage||stage,status?.provider_error||providerError);
      }).catch(()=>finish(started?'failed':'could_not_start',reason,stage,providerError));
    });
  });
}

// runSingle distinguishes three failure points:
//   1. POST /api/run rejected (e.g. 422 adapter_cannot_run_task) → did NOT run
//   2. POST accepted but SSE never delivers 'complete' → did NOT run
//   3. POST accepted, SSE 'complete' fired → ran (pass may be true or false)
async function runSingle(tabKey,taskId,modelId){
  const routing=deriveRoutingForModel(modelId);
  let result;
  try{
    result=await fetchJSON('/api/run',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({task:taskId,adapter:routing.adapterId,provider:routing.providerId,model:modelId,count:1})});
  }catch(err){
    // 422 adapter_cannot_run_task lands here with a structured body; surface the reason.
    const body=err&&err.body;
    const reason=(body&&(body.reason||body.error))||(err&&err.message)||'POST /api/run rejected';
    const status=err&&err.status===422?'skipped_by_preflight':'could_not_start';
    // POST-time failures don't carry a server-emitted structured provider
    // error yet (the run never got past route validation), but err.body can
    // echo one back from handlers that set it. Pass through so the reason
    // row can still render origin/kind chips when available.
    const postProviderError=(body&&(body.provider_error||body.providerError))||null;
    updateBatchItem(tabKey,taskId,modelId,{status,reason,providerError:postProviderError,stage:'preflight',completedAt:new Date().toISOString()});
    state.runState[tabKey].lines.push(`[${taskId} :: ${modelId}] DID NOT RUN — ${reason}`);
    const kind=status==='skipped_by_preflight'?'skip':'fail';
    const verb=status==='skipped_by_preflight'?'Skipped':'Could not start';
    const category=classifyError(err,status==='skipped_by_preflight'?'preflight':undefined);
    const label=failureReasonLabel(category);
    pushRunEvent(tabKey,kind,`${verb} ${humanizeToken(taskId)} · ${label} · ${String(reason||'').slice(0,80)}`);
    return {status,executed:false,started:false,pass:false,reason,category};
  }
  updateBatchItem(tabKey,taskId,modelId,{status:'queued',runId:result.run_id,reason:''});
  state.runState[tabKey].status='running';
  state.runState[tabKey].runId=result.run_id;
  state.runState[tabKey].lines.push(`Queued ${taskId} on ${modelId}.`,`Run ID: ${result.run_id}`);
  render();
  return watchRunCompletion(tabKey,result.run_id,taskId,modelId);
}

async function resetAdapterCircuits(modelIds){
  // A fresh user-initiated batch shouldn't be blocked by a circuit that
  // opened during a previous session. Best-effort — failures here are
  // harmless; the run path still enforces the circuit on live failures.
  const adapters=new Set(modelIds.map((m)=>deriveRoutingForModel(m).adapterId).filter(Boolean));
  await Promise.all(Array.from(adapters).map((a)=>
    fetchJSON(`/api/adapters/${encodeURIComponent(a)}/reset-circuit`,{method:'POST'}).catch(()=>null)
  ));
}
async function runBatch(tabKey,taskIds,modelIds,label){
  if(!taskIds.length){
    state.runState[tabKey]={status:'error',runId:null,lines:['No tasks selected.'],result:null,warn:'Select one or more tests above, then try again.',batchPlanned:0,batchAttempted:0,batchExecuted:0,batchFailed:0,batchPassed:0};
    render();return;
  }
  if(!modelIds.length){
    state.runState[tabKey]={status:'error',runId:null,lines:['No models selected.'],result:null,warn:'Select one or more models from the list above, then try again.',batchPlanned:0,batchAttempted:0,batchExecuted:0,batchFailed:0,batchPassed:0};
    render();return;
  }
  const planned=taskIds.length*modelIds.length;
  // Progress starts empty. Counters only move when something real happens —
  // a run was attempted (POST returned), executed (bundle stored), or failed
  // to start (422 / SSE error). No inflated counts, no fake progress.
  state.runState[tabKey]={
    status:'starting',
    runId:null,
    startedAt:new Date().toISOString(),
    completedAt:null,
    lines:[`${label}: ${taskIds.length} test${taskIds.length===1?'':'s'} × ${modelIds.length} model${modelIds.length===1?'':'s'} = ${planned} run${planned===1?'':'s'} planned.`],
    result:null,
    warn:null,
    batchPlanned:planned,
    batchAttempted:0,
    batchExecuted:0,
    batchFailed:0,
    batchPassed:0,
    // batchTotal/batchDone retained for progress bar; done=attempts resolved, not plan size.
    batchTotal:planned,
    batchDone:0,
    batchItems:buildBatchItems(taskIds,modelIds),
    currentTaskId:taskIds[0]||'',
    currentModelId:modelIds[0]||'',
    recentCompletions:[],
    completedFamilies:[],
    // Mission-banner state: phase cursor + structured event feed.
    phase:'preparing',
    phaseAt:Date.now(),
    currentItemStartedAt:null,
    events:[]
  };
  pushRunEvent(tabKey,'start',`Batch armed · ${planned} run${planned===1?'':'s'} planned`);
  render();
  await resetAdapterCircuits(modelIds);
  let attempted=0,executed=0,failed=0,couldNotStart=0,skippedByPreflight=0,passed=0;
  for(const taskId of taskIds){
    state.tabData[tabKey]={...(state.tabData[tabKey]||defaultTabState()),selectedTask:taskId};
    render();
    for(const modelId of modelIds){
      state.runState[tabKey].lines.push(`Running ${humanizeToken(taskId)} on ${modelId}… (${attempted+1}/${planned} planned)`);
      state.runState[tabKey].status='running';
      state.runState[tabKey].currentTaskId=taskId;
      state.runState[tabKey].currentModelId=modelId;
      state.runState[tabKey].currentItemStartedAt=Date.now();
      setRunPhase(tabKey,'preparing');
      pushRunEvent(tabKey,'next',`Next: ${humanizeToken(taskId)} · ${modelId}`);
      render();
      attempted+=1;
      state.runState[tabKey].batchAttempted=attempted;
      let outcome;
      try{
        outcome=await runSingle(tabKey,taskId,modelId);
      }catch(err){
        outcome={status:'could_not_start',executed:false,pass:false,reason:String(err)};
        state.runState[tabKey].lines.push(`[${humanizeToken(taskId)} :: ${modelId}] DID NOT RUN — ${String(err).slice(0,200)}`);
      }
      if(outcome.executed){
        executed+=1;
        if(outcome.pass)passed+=1;
      }else if(outcome.status==='failed'){
        failed+=1;
      }else if(outcome.status==='skipped_by_preflight'){
        skippedByPreflight+=1;
      }else{
        couldNotStart+=1;
      }
      state.runState[tabKey].batchExecuted=executed;
      state.runState[tabKey].batchFailed=failed+couldNotStart+skippedByPreflight;
      state.runState[tabKey].batchPassed=passed;
      state.runState[tabKey].batchDone=attempted;
      render();
    }
  }
  state.runState[tabKey].status='complete';
  state.runState[tabKey].runId=null;
  state.runState[tabKey].completedAt=new Date().toISOString();
  setRunPhase(tabKey,'done');
  const summaryParts=[`Done. ${executed} of ${planned} actually ran`,`${passed} passed`];
  if(failed>0)summaryParts.push(`${failed} failed after start`);
  if(couldNotStart>0)summaryParts.push(`${couldNotStart} couldn't start`);
  if(skippedByPreflight>0)summaryParts.push(`${skippedByPreflight} skipped by preflight`);
  const summary=`${summaryParts.join(' — ')}.`;
  state.runState[tabKey].lines.push(summary);
  pushRunEvent(tabKey,'done',summary);
  render();
}

// Pre-run gate — compares selected model list against the current health
// snapshot. Cloud models fail fast when offline or when their provider's last
// test failed; local models stay usable. If *any* selected model is blocked,
// the user is shown a plain-English summary + offered to continue with the
// reachable subset, or cancel. Returns the filtered list, or null if the user
// cancels.
function gateSelectedModels(selectedModels){
  const blocked=blockedRunReasons(selectedModels);
  if(!blocked.length)return selectedModels;
  const reachable=selectedModels.filter((id)=>canRunModel(id));
  if(typeof alert!=='function'&&typeof confirm!=='function'){
    return reachable.length?reachable:selectedModels;
  }
  const lines=blocked.map((b)=>`• ${b.modelId} — ${b.reason}`).join('\n');
  if(!reachable.length){
    if(typeof alert==='function')alert(`None of the ${selectedModels.length} selected models can run right now.\n\n${lines}\n\nCheck the status bar, fix providers, and try again.`);
    return null;
  }
  const msg=`${blocked.length} of ${selectedModels.length} selected model${selectedModels.length===1?'':'s'} can't run right now:\n\n${lines}\n\nContinue with the ${reachable.length} reachable model${reachable.length===1?'':'s'}? (Cancel to abort and fix providers.)`;
  if(!confirm(msg))return null;
  return reachable;
}
async function handleRun(tabKey){
  const tab=state.tabData[tabKey]||defaultTabState();
  const selectedTasks=tab.selectedTasks||[];
  const rc=tab.runCount==null?'all':tab.runCount;
  // Honor the run-count segmented control: 1/3/5/10 caps the slice; 'all' runs every selected test.
  const limit=rc==='all'?selectedTasks.length:Math.min(Number(rc)||0,selectedTasks.length);
  const taskIds=selectedTasks.slice(0,Math.max(0,limit));
  const label=rc==='all'?`Run all ${taskIds.length} selected`:`Run ${taskIds.length} of ${selectedTasks.length} selected`;
  const models=gateSelectedModels(tab.selectedModels||[]);
  if(models===null)return;
  await runBatch(tabKey,taskIds,models,label);
}
async function handleRunAll(tabKey){
  const models=gateSelectedModels((state.tabData[tabKey]?.selectedModels)||[]);
  if(models===null)return;
  await runBatch(tabKey,taskOptionsForTab(tabKey).map((task)=>task.id),models,'Lane batch run');
}

function renderTabs(){return Object.values(TAB_CONFIG).map((tab)=>`<button class="tab ${state.activeTab===tab.key?'active':''}" onclick="setActiveTab('${tab.key}')">${esc(tab.label)}</button>`).join('')}
function renderTaskOptions(tabKey){const tabState=state.tabData[tabKey]||defaultTabState();return taskOptionsForTab(tabKey).map((task)=>`<option value="${esc(task.id)}" ${tabState.selectedTask===task.id?'selected':''}>${esc(displayTestName(task))} (${esc(task.id)}) · ${esc(TASK_FAMILY_LABELS[task.family]||task.family)} · ${esc(task.difficulty)}</option>`).join('')}
function renderAdapterOptions(tabKey){const tabState=state.tabData[tabKey]||defaultTabState();const options=[{id:'mixed',label:'Mixed by model selection'}].concat((state.adapters||[]).map((a)=>({id:a.id||a.adapter||a.key||'',label:a.label||a.name||a.id||a.key||''})));return options.map((opt)=>`<option value="${esc(opt.id)}" ${normalizeId(tabState.selectedAdapter)===normalizeId(opt.id)?'selected':''}>${esc(opt.label)}</option>`).join('')}
function renderProviderOptions(tabKey){const tabState=state.tabData[tabKey]||defaultTabState();const options=[{id:'mixed',label:'Mixed by model selection'}].concat(mergedProviders());return options.map((provider)=>`<option value="${esc(provider.id)}" ${normalizeId(tabState.selectedProvider)===normalizeId(provider.id)?'selected':''}>${esc(provider.label)}</option>`).join('')}

function currentRunState(){
