<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRUCIBULUM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=JetBrains+Mono:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* =========================================================================
   RESET + CUSTOM PROPERTIES
   ========================================================================= */
*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --void: #0a0d14;
  --surface: #111620;
  --surface-raised: #1a1f2e;
  --border: #252d3a;
  --border-subtle: #1e2535;
  --text-primary: #e2e8f0;
  --text-secondary: #94a3b8;
  --text-muted: #475569;
  --accent-primary: #FF9F1C;
  --accent-soft: #FFB347;
  --accent-muted: #E08A00;
  --pass: #34d399;
  --fail: #f87171;
  --warn: #fbbf24;
  --active: var(--accent-primary);
  --integrity: var(--accent-soft);
  --neutral: #64748b;
  --font-mono: 'JetBrains Mono', monospace;
  --font-body: 'IBM Plex Sans', sans-serif;
  --sidebar-width: 240px;
  --bundle-width: 640px;
  --transparency-width: 480px;
  --content-max: 1080px;
}

html, body {
  height: 100%;
  background: var(--void);
  color: var(--text-primary);
  font-family: var(--font-body);
  font-size: 17px;
  line-height: 1.7;
  overflow: hidden;
}

/* =========================================================================
   ANIMATIONS
   ========================================================================= */
@keyframes pulse-load {
  0%, 100% { opacity: 0.3; }
  50% { opacity: 0.8; }
}

@keyframes slide-in-right {
  from { transform: translateX(100%); }
  to { transform: translateX(0); }
}

@keyframes fade-in {
  from { opacity: 0; }
  to { opacity: 1; }
}

@keyframes progress-pulse {
  0% { background-position: -200% 0; }
  100% { background-position: 200% 0; }
}

@keyframes run-dot-pulse {
  0%, 100% { opacity: 0.4; }
  50% { opacity: 1; }
}

@keyframes bar-grow {
  from { width: 0%; }
}

.loading-pulse {
  animation: pulse-load 1.8s ease-in-out infinite;
}

/* =========================================================================
   LAYOUT
   ========================================================================= */
#app {
  display: flex;
  height: 100vh;
  width: 100vw;
  overflow: hidden;
}

/* =========================================================================
   SIDEBAR
   ========================================================================= */
#sidebar {
  width: var(--sidebar-width);
  min-width: var(--sidebar-width);
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow-y: auto;
  z-index: 10;
  position: relative;
}

#sidebar-header {
  padding: 32px 24px 20px;
  border-bottom: 1px solid var(--border-subtle);
}

#sidebar-header .logo {
  font-family: var(--font-body);
  font-size: 18px;
  font-weight: 700;
  letter-spacing: 0.2em;
  color: var(--text-primary);
  margin-bottom: 4px;
}

#sidebar-header .version {
  display: inline-block;
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 500;
  color: var(--text-muted);
  margin-left: 6px;
  letter-spacing: 0;
}

#sidebar-header .tagline {
  font-family: var(--font-body);
  font-style: italic;
  font-size: 13px;
  color: var(--text-muted);
  margin-top: 2px;
}

#sidebar-nav {
  padding: 16px 0;
  flex: 1;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 0;
  padding: 12px 24px;
  cursor: pointer;
  color: var(--text-muted);
  font-family: var(--font-body);
  font-size: 15px;
  font-weight: 500;
  border-left: 2px solid transparent;
  transition: all 0.15s ease;
  user-select: none;
  position: relative;
}

.nav-item:hover {
  color: var(--text-secondary);
  background: rgba(255, 159, 28, 0.05);
}

.nav-item.active {
  color: var(--text-primary);
  border-left-color: var(--active);
  background: rgba(255, 159, 28, 0.1);
}

.nav-item.disabled {
  color: var(--text-muted);
  cursor: not-allowed;
  pointer-events: none;
  opacity: 0.4;
}

.nav-item .nav-badge {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--accent-soft);
  background: var(--surface-raised);
  border: 1px solid rgba(255, 159, 28, 0.25);
  padding: 2px 8px;
  border-radius: 3px;
  margin-left: auto;
}

#sidebar-footer {
  padding: 16px 24px 20px;
  border-top: 1px solid var(--border-subtle);
}

.status-row {
  display: flex;
  justify-content: space-between;
  margin-bottom: 4px;
}

.status-label {
  color: var(--accent-muted);
  font-family: var(--font-mono);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  font-size: 11px;
}

.status-value {
  color: var(--text-secondary);
  font-family: var(--font-mono);
  font-size: 12px;
}

.sidebar-credit {
  margin-top: 16px;
  font-size: 11px;
  color: var(--text-muted);
  font-style: italic;
  text-align: center;
  letter-spacing: 0.3px;
  opacity: 0.7;
}

/* =========================================================================
   MAIN AREA
   ========================================================================= */
#main {
  flex: 1;
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
  position: relative;
}

#main-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 32px;
  border-bottom: 1px solid var(--border-subtle);
  background: var(--surface);
  min-height: 58px;
  flex-shrink: 0;
}

#main-header .view-title {
  font-family: var(--font-body);
  font-size: 17px;
  font-weight: 600;
  letter-spacing: 0.05em;
  color: var(--text-primary);
}

.header-actions {
  display: flex;
  align-items: center;
  gap: 8px;
}

.header-btn {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--accent-soft);
  font-family: var(--font-mono);
  font-size: 12px;
  padding: 8px 16px;
  border-radius: 5px;
  cursor: pointer;
  transition: all 0.15s ease;
  display: flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
}

.header-btn:hover {
  color: var(--accent-primary);
  border-color: rgba(255, 159, 28, 0.4);
  background: var(--surface-raised);
}

#main-content {
  flex: 1;
  overflow-y: auto;
  padding: 36px 32px 40px;
  background: var(--void);
}

.content-constrained {
  max-width: var(--content-max);
  margin: 0 auto;
}

/* =========================================================================
   HERO PANEL — LAST VERIFIED RUN
   ========================================================================= */
.hero-panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 40px 44px;
  margin-bottom: 32px;
  position: relative;
  overflow: hidden;
}

.hero-panel::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 2px;
}

.hero-panel.pass-accent::before { background: var(--pass); }
.hero-panel.fail-accent::before { background: var(--fail); }
.hero-panel.neutral-accent::before { background: var(--border); }

.hero-eyebrow {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--accent-muted);
  margin-bottom: 28px;
}

.hero-top-row {
  display: flex;
  align-items: flex-start;
  gap: 32px;
  margin-bottom: 32px;
}

.hero-score-block {
  flex-shrink: 0;
  display: flex;
  align-items: baseline;
  gap: 16px;
}

.hero-score {
  font-family: var(--font-mono);
  font-size: 88px;
  font-weight: 800;
  line-height: 1;
}

.hero-score.pass { color: var(--pass); }
.hero-score.fail { color: var(--fail); }

.hero-meta-line {
  font-family: var(--font-mono);
  font-size: 14px;
  color: var(--text-secondary);
  margin-bottom: 32px;
  line-height: 1.65;
}

.hero-meta-line .meta-sep {
  color: var(--text-muted);
  margin: 0 8px;
}

/* Trust Badges */
.trust-badges {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  margin-bottom: 32px;
}

.trust-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.03em;
  color: var(--accent-soft);
  padding: 6px 12px;
  background: rgba(255, 159, 28, 0.08);
  border: 1px solid rgba(255, 159, 28, 0.24);
  border-radius: 5px;
}

.trust-check {
  color: var(--accent-primary);
  font-size: 13px;
  opacity: 1;
}

/* Score Breakdown Section in Hero */
.hero-breakdown-label {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--accent-muted);
  margin-bottom: 18px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border-subtle);
}

.hero-footer-link {
  margin-top: 28px;
  text-align: right;
}

.hero-footer-link a {
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--active);
  cursor: pointer;
  text-decoration: none;
  opacity: 0.92;
  transition: opacity 0.15s ease;
}

.hero-footer-link a:hover {
  opacity: 1;
}

/* =========================================================================
   STAT TILES — SUMMARY METRICS (secondary)
   ========================================================================= */
.summary-metrics {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  margin-bottom: 32px;
}

.metric-tile {
  background: var(--surface);
  border: 1px solid var(--border-subtle);
  border-radius: 6px;
  padding: 18px 22px;
  position: relative;
  overflow: hidden;
}

.metric-tile::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 2px;
}

.metric-tile.accent-blue::before { background: var(--active); opacity: 0.6; }
.metric-tile.accent-green::before { background: var(--pass); opacity: 0.6; }
.metric-tile.accent-amber::before { background: var(--warn); opacity: 0.6; }
.metric-tile.accent-secondary::before { background: var(--neutral); opacity: 0.6; }
.metric-tile.accent-red::before { background: var(--fail); opacity: 0.6; }
.metric-tile.accent-purple::before { background: var(--integrity); opacity: 0.6; }

.metric-tile .metric-label {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--accent-muted);
  margin-bottom: 8px;
}

.metric-tile .metric-value {
  font-family: var(--font-mono);
  font-size: 29px;
  font-weight: 700;
  line-height: 1.1;
  color: var(--text-primary);
}

.metric-tile .metric-value.color-active { color: var(--active); }
.metric-tile .metric-value.color-pass { color: var(--pass); }
.metric-tile .metric-value.color-fail { color: var(--fail); }
.metric-tile .metric-value.color-warn { color: var(--warn); }
.metric-tile .metric-value.color-secondary { color: var(--text-secondary); }

/* =========================================================================
   BADGES
   ========================================================================= */
.badge {
  display: inline-block;
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.1em;
  padding: 5px 12px;
  border-radius: 12px;
  text-transform: uppercase;
}

.badge-pass {
  background: rgba(52, 211, 153, 0.1);
  color: var(--pass);
  border: 1px solid rgba(52, 211, 153, 0.2);
}

.badge-fail {
  background: rgba(248, 113, 113, 0.1);
  color: var(--fail);
  border: 1px solid rgba(248, 113, 113, 0.2);
}

.badge-warn {
  background: rgba(251, 191, 36, 0.1);
  color: var(--warn);
  border: 1px solid rgba(251, 191, 36, 0.2);
}

.badge-neutral {
  background: rgba(100, 116, 139, 0.1);
  color: var(--neutral);
  border: 1px solid rgba(100, 116, 139, 0.2);
}

/* =========================================================================
   SCORE BARS
   ========================================================================= */
.score-bars {
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.score-bar-row {
  display: flex;
  align-items: center;
  gap: 16px;
}

.score-bar-label {
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 500;
  color: var(--text-secondary);
  width: 114px;
  flex-shrink: 0;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

.score-bar-track {
  flex: 1;
  height: 10px;
  background: var(--border);
  border-radius: 4px;
  overflow: hidden;
  position: relative;
}

.score-bar-fill {
  height: 100%;
  border-radius: 4px;
  transition: width 0.6s ease;
  min-width: 2px;
}

.score-bar-fill.correctness { background: var(--pass); }
.score-bar-fill.regression { background: var(--active); }
.score-bar-fill.integrity { background: var(--integrity); }
.score-bar-fill.efficiency { background: var(--warn); }

.score-bar-pct {
  font-family: var(--font-mono);
  font-size: 13px;
  font-weight: 600;
  color: var(--text-primary);
  width: 48px;
  text-align: right;
  flex-shrink: 0;
}

/* =========================================================================
   DATA TABLES
   ========================================================================= */
.data-table-wrap {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
}

.data-table-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 22px;
  border-bottom: 1px solid var(--border-subtle);
}

.data-table-title {
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--accent-muted);
}

.table-scroll {
  overflow-x: auto;
}

table {
  width: 100%;
  border-collapse: collapse;
}

table thead th {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--accent-muted);
  text-align: left;
  padding: 14px 18px;
  border-bottom: 1px solid var(--border-subtle);
  cursor: pointer;
  user-select: none;
  white-space: nowrap;
  transition: color 0.1s ease;
}

table thead th:hover {
  color: var(--text-secondary);
}

table thead th.sorted-asc::after { content: ' \u25B2'; font-size: 8px; }
table thead th.sorted-desc::after { content: ' \u25BC'; font-size: 8px; }

table tbody tr {
  border-bottom: 1px solid var(--border-subtle);
  cursor: pointer;
  transition: background 0.1s ease;
}

table tbody tr:last-child {
  border-bottom: none;
}

table tbody tr:hover {
  background: rgba(255, 159, 28, 0.05);
}

table tbody td {
  padding: 14px 18px;
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--text-secondary);
  white-space: nowrap;
  line-height: 1.6;
}

table tbody td.mono-bright {
  color: var(--text-primary);
}

/* =========================================================================
   EMPTY STATE
   ========================================================================= */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 72px 24px;
  text-align: center;
}

.empty-state .empty-circle {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  border: 2px solid var(--border);
  margin-bottom: 20px;
  opacity: 0.3;
}

.empty-state .empty-title {
  font-family: var(--font-body);
  font-size: 17px;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 10px;
}

.empty-state .empty-sub {
  font-family: var(--font-body);
  font-size: 14px;
  color: var(--text-muted);
  margin-bottom: 24px;
  max-width: 320px;
  line-height: 1.7;
}

.empty-state .empty-link {
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--active);
  cursor: pointer;
  text-decoration: none;
  opacity: 0.8;
  transition: opacity 0.15s ease;
}

.empty-state .empty-link:hover {
  opacity: 1;
}

/* =========================================================================
   RUN TASK VIEW
   ========================================================================= */
.run-layout {
  display: grid;
  grid-template-columns: 40% 60%;
  gap: 24px;
  height: calc(100vh - 108px);
  min-height: 0;
  max-width: 1200px;
  margin: 0 auto;
}

.run-config-panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  display: flex;
  flex-direction: column;
  min-height: 0;
}

.run-config-scroll {
  flex: 1 1 0;
  overflow-y: auto;
  padding: 32px 32px 24px;
  min-height: 0;
}

.run-btn-container {
  flex-shrink: 0;
  padding: 0 32px 24px;
  background: var(--surface);
}

.config-section {
  margin-bottom: 28px;
}

.config-section-label {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--accent-muted);
  margin-bottom: 12px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border-subtle);
}

.form-group {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 8px;
}

.form-group label {
  display: none;
}

.form-group select,
.form-group input {
  background: var(--void);
  border: 1px solid var(--border);
  color: var(--text-primary);
  font-family: var(--font-mono);
  font-size: 14px;
  padding: 12px 14px;
  border-radius: 5px;
  outline: none;
  transition: border-color 0.15s ease;
  width: 100%;
}

.form-group select:focus,
.form-group input:focus {
  border-color: var(--active);
}

.form-group select option {
  background: var(--surface);
  color: var(--text-primary);
}

.form-hint {
  font-family: var(--font-body);
  font-size: 13px;
  color: var(--text-muted);
  line-height: 1.6;
  min-height: 18px;
}

.task-context-mini {
  background: var(--void);
  border: 1px solid var(--border-subtle);
  border-radius: 5px;
  padding: 14px 16px;
  margin-top: 10px;
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text-secondary);
  line-height: 1.9;
  display: none;
}

.task-context-mini.visible {
  display: block;
}

.task-context-mini .ctx-label {
  color: var(--accent-muted);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

.availability-note {
  font-family: var(--font-body);
  font-size: 13px;
  color: var(--text-muted);
  line-height: 1.6;
  min-height: 20px;
}

.pipeline-summary {
  background: var(--void);
  border: 1px solid var(--border-subtle);
  border-radius: 5px;
  padding: 14px 16px;
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text-secondary);
  line-height: 1.9;
  word-break: break-word;
  overflow-wrap: break-word;
}

.pipeline-summary .ctx-label {
  color: var(--accent-muted);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

.run-btn {
  height: 52px;
  background: var(--active);
  color: #fff;
  font-family: var(--font-mono);
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 0.1em;
  padding: 0 28px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.15s ease;
  width: 100%;
  text-transform: uppercase;
}

.run-btn:hover:not(:disabled) {
  background: var(--accent-soft);
  color: var(--void);
}

.run-btn:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}

.run-btn.running {
  background: var(--warn);
  color: var(--void);
}

.run-btn.running .run-dot {
  display: inline-block;
  animation: run-dot-pulse 1.2s ease-in-out infinite;
}

.run-log-panel {
  background: var(--void);
  border: 1px solid var(--border);
  border-radius: 8px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.run-log-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 18px;
  background: var(--surface);
  border-bottom: 1px solid var(--border-subtle);
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text-muted);
  flex-shrink: 0;
}

.run-log-header .log-meta-item {
  color: var(--text-secondary);
}

.run-log-progress {
  height: 3px;
  background: var(--border-subtle);
  width: 100%;
  position: relative;
  flex-shrink: 0;
}

.run-log-progress-bar {
  height: 100%;
  background: linear-gradient(90deg, var(--active), var(--integrity), var(--active));
  background-size: 200% 100%;
  animation: progress-pulse 2s linear infinite;
  width: 0%;
  transition: width 0.3s ease;

<body>

<div id="app">
  <div id="sidebar">
    <div id="sidebar-header">
      <div class="logo">CRUCIBULUM <span class="version">v1.0.0</span></div>

      <div class="header-actions">

      <div class="drawer-tagline">No hidden calls. Ever.</div>

<script>
/* =========================================================================
   STATE
   ========================================================================= */
let currentView = 'dashboard';
let runs = [];
let tasks = [];
let models = [];
let adapterCatalog = [];
let providerCatalog = [];
let notImplementedProviders = [];
let judgeMeta = {
  kind: 'deterministic',
  label: 'Judge: deterministic',
  description: 'oracle + hidden/public tests + integrity checks',
  verifier_model: null,
  components: ['oracle', 'hidden tests', 'public tests', 'diff rules', 'integrity checks'],
};
let stats = { total: 0, passRate: 0, avgScore: 0, avgTime: 0, totalTokens: 0, totalCost: 0 };
let apiLog = [];
let activeRunId = null;
let activeEventSource = null;
let runStartTime = null;
let runTimerInterval = null;
let sortState = { column: null, direction: 'desc' };
let historyFilters = { task: '', model: '', status: '', date: '' };

const API_BASE = window.location.origin;

const NAV_ITEMS = [
  { id: 'dashboard', label: 'Dashboard',  key: '1' },
  { id: 'run',       label: 'Run Task',   key: '2' },
  { id: 'history',   label: 'History',    key: '3' },
  { id: 'receipts',  label: 'Receipts',   key: '4' },
  { id: 'compare',   label: 'Compare',    key: '5', disabled: true, badge: 'v1.1' },
  { id: 'bundles',   label: 'Bundles',    key: '6', disabled: true, badge: 'v1.1' },
];

/* =========================================================================
   API WRAPPER
   ========================================================================= */
async function api(method, path, body) {
  const entry = {
    method,
    path,
    status: 'pending',
    statusCode: '--',
    time: new Date().toISOString(),
    duration: null,
  };
  apiLog.push(entry);
  renderTransparencyLog();

  const start = performance.now();
  const opts = {
    method,
    headers: { 'Content-Type': 'application/json' },
  };
  if (body) opts.body = JSON.stringify(body);

  try {
    const res = await fetch(API_BASE + path, opts);
    entry.duration = Math.round(performance.now() - start);
    entry.statusCode = res.status;
    entry.status = res.ok ? 'ok' : 'err';
    renderTransparencyLog();
    if (!res.ok) {
      const errText = await res.text().catch(() => '');
      throw new Error(res.status + ' ' + res.statusText + ': ' + errText);
    }
    return await res.json();
  } catch (err) {
    entry.duration = entry.duration || Math.round(performance.now() - start);
    entry.status = 'err';
    entry.statusCode = entry.statusCode === '--' ? 'ERR' : entry.statusCode;
    renderTransparencyLog();
    throw err;
  }
}

/* =========================================================================
   DATA LOADING — NORMALIZED
   ========================================================================= */
async function loadRuns() {
  try {
    const data = await api('GET', '/api/runs');
    const rawRuns = data.runs || data || [];
    runs = rawRuns.map(function(r) {
      return {
        bundle_id: r.bundle_id,
        task_id: r.task_id || (r.task && r.task.id) || '',
        family: r.family || (r.task && r.task.family) || '',
        difficulty: r.difficulty || (r.task && r.task.difficulty) || '',
        model: r.model || (r.agent && r.agent.model) || '',
        provider: r.provider || (r.agent && r.agent.provider) || '',
        adapter: r.adapter || (r.agent && r.agent.adapter) || '',
        score: typeof r.score === 'number' ? r.score : (r.score && typeof r.score.total === 'number' ? r.score.total : 0),
        pass: typeof r.pass === 'boolean' ? r.pass : (r.score && typeof r.score.pass === 'boolean' ? r.score.pass : false),
        timestamp: r.timestamp || (r.environment && r.environment.timestamp_start) || '',
        duration_sec: r.duration_sec != null ? r.duration_sec : (r.verification_results && r.verification_results.efficiency ? r.verification_results.efficiency.time_sec : 0) || 0,
        tokens_in: r.tokens_in != null ? r.tokens_in : (r.usage ? r.usage.tokens_in : 0) || 0,
        tokens_out: r.tokens_out != null ? r.tokens_out : (r.usage ? r.usage.tokens_out : 0) || 0,
        cost_usd: r.cost_usd != null ? r.cost_usd : (r.usage ? r.usage.estimated_cost_usd : 0) || 0,
        judge: r.judge || null,
        trust: r.trust || null,
        integrity_violations: r.integrity_violations != null ? r.integrity_violations : (r.score && r.score.integrity_violations != null ? r.score.integrity_violations : 0),
        breakdown: (r.score && r.score.breakdown) || (r.verification_results ? { correctness: (r.verification_results.correctness && r.verification_results.correctness.score) || 0, regression: (r.verification_results.regression && r.verification_results.regression.score) || 0, integrity: (r.verification_results.integrity && r.verification_results.integrity.score) || 0, efficiency: (r.verification_results.efficiency && r.verification_results.efficiency.score) || 0 } : null) || r.breakdown || null,
      };
    });
    runs.sort(function(a, b) { return b.timestamp.localeCompare(a.timestamp); });
  } catch (e) {
    console.warn('Failed to load runs:', e.message);
    runs = [];
  }
}

function computeStats() {
  if (runs.length === 0) {
    stats = { total: 0, passRate: 0, avgScore: 0, avgTime: 0, totalTokens: 0, totalCost: 0 };
    return;
  }
  stats.total = runs.length;
  var passing = runs.filter(function(r) { return r.pass; }).length;
  stats.passRate = Math.round((passing / runs.length) * 100);
  var totalScore = runs.reduce(function(s, r) { return s + r.score; }, 0);
  stats.avgScore = Math.round((totalScore / runs.length) * 100);
  var totalTime = runs.reduce(function(s, r) { return s + r.duration_sec; }, 0);
  stats.avgTime = Math.round(totalTime / runs.length);
  stats.totalTokens = runs.reduce(function(s, r) { return s + r.tokens_in + r.tokens_out; }, 0);
  stats.totalCost = runs.reduce(function(s, r) { return s + r.cost_usd; }, 0);
}

async function loadStats() {
  try {
    var data = await api('GET', '/api/stats');
    stats = {
      total: data.total_runs != null ? data.total_runs : 0,
      passRate: data.pass_rate != null ? data.pass_rate : 0,
      avgScore: data.avg_score != null ? data.avg_score : 0,
      avgTime: data.avg_time_sec != null ? data.avg_time_sec : 0,
      totalTokens: data.total_tokens != null ? data.total_tokens : 0,
      totalCost: data.total_cost_usd != null ? data.total_cost_usd : 0,
    };
  } catch (e) {
    computeStats();
  }
}

async function loadReceipts() {
  try {
    var data = await api('GET', '/api/receipts');
    return {
      receipts: data.receipts || [],
      summary: data.summary || { total_runs: 0, total_cost_usd: 0, total_tokens: 0 },
    };
  } catch (e) {
    return { receipts: [], summary: { total_runs: 0, total_cost_usd: 0, total_tokens: 0 } };
  }
}

async function refreshData() {
  var btn = document.getElementById('btn-refresh');
  btn.textContent = 'Loading...';
  btn.disabled = true;
  try {
    await Promise.all([loadRuns(), loadTasks(), loadAdapters(), loadModels(), loadProviders()]);
    await loadStats();
    updateSidebarStatus();
    renderView();
  } finally {
    btn.textContent = 'Refresh';
    btn.disabled = false;
  }
}

/* =========================================================================

function renderSidebar() {
  var nav = document.getElementById('sidebar-nav');
  nav.innerHTML = NAV_ITEMS.map(function(item) {
    var cls = ['nav-item'];
    if (item.id === currentView) cls.push('active');
    if (item.disabled) cls.push('disabled');
    var badge = item.badge ? '<span class="nav-badge">' + item.badge + '</span>' : '';
    var keyHint = !item.badge && item.key ? '<span class="nav-badge" style="opacity:0.4;">' + item.key + '</span>' : '';
    return '<div class="' + cls.join(' ') + '" data-view="' + item.id + '" onclick="navigate(\'' + item.id + '\')">' +
      '<span>' + item.label + '</span>' +
      (badge || keyHint) +
    '</div>';
  }).join('');
}

function updateSidebarStatus() {
  var lastModel = runs.length > 0 ? (runs[0].model || '--') : '--';
  document.getElementById('status-model').textContent = lastModel;
  document.getElementById('status-tasks').textContent = tasks.length > 0 ? tasks.length : '--';
  if (runs.length > 0) {
    document.getElementById('status-last-run').textContent = runs[0].timestamp ? formatDateShort(runs[0].timestamp) : '--';
  } else {
    document.getElementById('status-last-run').textContent = '--';
  }

/* =========================================================================
   NAVIGATION
   ========================================================================= */
function navigate(view) {
  var item = NAV_ITEMS.find(function(n) { return n.id === view; });
  if (!item || item.disabled) return;
  currentView = view;
  renderSidebar();
  renderView();
}

/* =========================================================================
   VIEW ROUTER
   ========================================================================= */
function renderView() {
  var content = document.getElementById('main-content');
  var title = document.getElementById('view-title');

  switch (currentView) {
    case 'dashboard':
      title.textContent = 'Dashboard';
      renderDashboard(content);
      break;
    case 'run':
      title.textContent = 'Run Task';
      renderRunTask(content);
      break;
    case 'history':
      title.textContent = 'History';
      renderHistory(content);
      break;
    case 'receipts':
      title.textContent = 'Receipts';
      renderReceipts(content);
      break;
    default:
      title.textContent = 'Dashboard';
      renderDashboard(content);
  }
}

function scoreColorClass(val) {
  if (val >= 70) return 'color-pass';
  if (val >= 50) return 'color-warn';
  return 'color-fail';
}

function prAccent(val) {
  if (val >= 70) return 'green';
  if (val >= 50) return 'amber';
  return 'red';
}

function getAdapterEntry(adapterId) {
  return adapterCatalog.find(function(entry) { return entry.id === adapterId; }) || null;
}

function getProviderEntry(providerId) {
  return providerCatalog.find(function(entry) { return entry.id === providerId; }) || null;
}

function getModelsForAdapter(adapterId) {
  return models.filter(function(model) { return model.adapter === adapterId; });
}

function getModelsForProvider(providerId) {
  // First try flattened models
  var providerModels = models.filter(function(model) { return model.adapter === providerId; });
  // Fallback to provider catalog models
  if (providerModels.length === 0) {
    var entry = getProviderEntry(providerId);
    if (entry && entry.models && entry.models.length > 0) {
      providerModels = entry.models.map(function(m) {
        return { id: m.id, name: m.label || m.id, adapter: providerId };
      });
    }
  }
  return providerModels;
}

function providerKindLabel(kind) {
  if (kind === 'cloud') return 'Cloud';
  if (kind === 'subprocess') return 'Subprocess';
  return 'Local';
}

function adapterKindLabel(kind) {
  return providerKindLabel(kind);
}

          if (t.family) ctxLines.push('<span class="ctx-label">Family:</span> ' + esc(t.family));
          if (t.difficulty) ctxLines.push('<span class="ctx-label">Difficulty:</span> ' + esc(t.difficulty));
          if (t.time_limit_sec) ctxLines.push('<span class="ctx-label">Time limit:</span> ' + t.time_limit_sec + 's');
          if (t.max_steps) ctxLines.push('<span class="ctx-label">Max steps:</span> ' + t.max_steps);
          if (t.public_tests_command) ctxLines.push('<span class="ctx-label">Tests:</span> ' + esc(t.public_tests_command));
          ctxEl.innerHTML = ctxLines.join('<br>');
          ctxEl.classList.add('visible');
        }
      } else {
        if (infoEl) infoEl.textContent = '';
        if (ctxEl) { ctxEl.innerHTML = ''; ctxEl.classList.remove('visible'); }
      }
    });
  }

  var providerSel = document.getElementById('run-provider');
  var modelInput = document.getElementById('run-model');

  function updateRunFormState() {
    var providerId = providerSel ? providerSel.value : defaultProvider;
    var providerEntry = getProviderEntry(providerId);
    // Fallback to adapter catalog if provider catalog not loaded
    if (!providerEntry) {
      var adapterEntry = getAdapterEntry(providerId);
      if (adapterEntry) {
        providerEntry = {
          id: adapterEntry.id,
          label: adapterEntry.name,
          kind: adapterEntry.kind,
          available: adapterEntry.available,
          reason: adapterEntry.reason,
          adapter: adapterEntry.id,
          manualModelAllowed: adapterEntry.supports_custom_model,
          models: (adapterEntry.models || []).map(function(m) { return { id: m.id, label: m.name || m.id, available: m.available }; }),
          envKey: null,
        };
      }
    }

    var providerAvailability = document.getElementById('provider-availability');
    var modelAvailability = document.getElementById('model-availability');
    var modelList = document.getElementById('model-list');
    var judgeSummary = document.getElementById('judge-summary');
    var pipelineSummary = document.getElementById('pipeline-summary');

    // Provider availability — distinct status wording
    if (providerAvailability) {
      if (!providerEntry) {
        providerAvailability.textContent = 'No providers loaded. Check server connection.';
      } else if (providerEntry.available) {
        providerAvailability.textContent = '\u2713 ' + providerEntry.label + ' available.';
      } else {
        var reason = providerEntry.reason || '';
        var statusLabel = '';
        if (reason.match(/API_KEY|api.key|not configured/i)) {
          statusLabel = 'Config required: ';
        } else if (reason.match(/spawn|ENOENT|binary|not found/i)) {
          statusLabel = 'Binary required: ';
        } else if (reason.match(/not.implemented/i)) {
          statusLabel = 'Not yet implemented: ';
        } else {
          statusLabel = 'Unavailable: ';
        }
        providerAvailability.textContent = statusLabel + reason;
      }
    }

    // Model list for selected provider
    var providerModels = getModelsForProvider(providerId);
    if (modelList) {
      modelList.innerHTML = providerModels.map(function(model) {
        return '<option value="' + esc(model.id || model.name || '') + '">';
      }).join('');
    }

    if (modelAvailability) {
      if (!providerEntry || !providerEntry.available) {
        modelAvailability.textContent = 'Provider unavailable. Select a different provider or fix configuration.';
      } else if (providerModels.length > 0) {
        modelAvailability.textContent = providerModels.length + ' discovered model' + (providerModels.length === 1 ? '' : 's') + '. Select from list or enter manually.';
      } else if (providerEntry.manualModelAllowed) {
        modelAvailability.textContent = 'No discovered models. Enter model name manually.';
      } else {
        modelAvailability.textContent = 'No models available for this provider.';
      }
    }

    // Judge summary
    if (judgeSummary) {
      judgeSummary.innerHTML =
        '<span class="ctx-label">Type:</span> ' + esc(judgeMeta.label || 'Judge: deterministic') + '<br>' +
        '<span class="ctx-label">Method:</span> ' + esc(judgeMeta.description || '') + '<br>' +
        '<span class="ctx-label">Verifier model:</span> ' + esc(judgeMeta.verifier_model || 'none');
    }

    // Review layer toggles
    var soEnabled = document.getElementById('review-so-enabled');
    var soFields = document.getElementById('review-so-fields');
    var qcEnabled = document.getElementById('review-qc-enabled');
    var qcFields = document.getElementById('review-qc-fields');
    if (soFields) soFields.style.display = (soEnabled && soEnabled.checked) ? 'block' : 'none';
    if (qcFields) qcFields.style.display = (qcEnabled && qcEnabled.checked) ? 'block' : 'none';

    // Populate review provider dropdowns with available cloud providers
    var reviewProviders = providers.filter(function(p) { return p.available && (p.kind === 'cloud' || p.kind === 'local'); });
    var reviewProvOpts = '<option value="">-- Provider --</option>' + reviewProviders.map(function(p) {
      return '<option value="' + esc(p.id) + '">' + esc((p.label || p.name) + ' [' + providerKindLabel(p.kind) + ']') + '</option>';
    }).join('');
    var soProv = document.getElementById('review-so-provider');
    var qcProv = document.getElementById('review-qc-provider');
    if (soProv && !soProv.dataset.init) { soProv.innerHTML = reviewProvOpts; soProv.dataset.init = '1'; }
    if (qcProv && !qcProv.dataset.init) { qcProv.innerHTML = reviewProvOpts; qcProv.dataset.init = '1'; }

    // Populate review model datalists based on selected review provider
    function fillReviewModels(provSelect, listId) {
      var rpid = provSelect ? provSelect.value : '';
      var rModels = getModelsForProvider(rpid);
      var rList = document.getElementById(listId);
      if (rList) {
        rList.innerHTML = rModels.map(function(m) {
          return '<option value="' + esc(m.id || m.name || '') + '">';
        }).join('');
      }
    }
    fillReviewModels(soProv, 'review-so-model-list');
    fillReviewModels(qcProv, 'review-qc-model-list');

    // Pipeline summary
    var taskId = taskSel ? taskSel.value : '';
    var currentModel = modelInput ? modelInput.value : '';
    var soOn = soEnabled && soEnabled.checked;
    var qcOn = qcEnabled && qcEnabled.checked;
    var reviewLine = 'none';
    if (soOn && qcOn) reviewLine = 'Second Opinion + QC Review';
    else if (soOn) reviewLine = 'Second Opinion';
    else if (qcOn) reviewLine = 'QC Review';

    if (pipelineSummary) {
      pipelineSummary.innerHTML =
        '<span class="ctx-label">Task:</span> ' + esc(taskId || 'not selected') + '<br>' +
        '<span class="ctx-label">Provider:</span> ' + esc(providerEntry ? providerEntry.label + ' [' + providerKindLabel(providerEntry.kind) + ']' : '--') + '<br>' +
        '<span class="ctx-label">Model:</span> ' + esc(currentModel || 'not entered') + '<br>' +
        '<span class="ctx-label">Judge:</span> deterministic (authoritative)' + '<br>' +
        '<span class="ctx-label">Review:</span> ' + esc(reviewLine) + ' (advisory only)' + '<br>' +
        '<span class="ctx-label">Bundle:</span> signed evidence bundle';
    }

    var runBtn = document.getElementById('run-btn');
    if (runBtn && !isRunning) {
      runBtn.disabled = !providerEntry || !providerEntry.available;
    }
  }

  if (providerSel) providerSel.addEventListener('change', updateRunFormState);
  if (modelInput) modelInput.addEventListener('input', updateRunFormState);
  if (taskSel) taskSel.addEventListener('change', updateRunFormState);

  // Wire review toggles
  var soChk = document.getElementById('review-so-enabled');
  var qcChk = document.getElementById('review-qc-enabled');
  if (soChk) soChk.addEventListener('change', updateRunFormState);
  if (qcChk) qcChk.addEventListener('change', updateRunFormState);
  var soProvSel = document.getElementById('review-so-provider');
  var qcProvSel = document.getElementById('review-qc-provider');
  if (soProvSel) soProvSel.addEventListener('change', updateRunFormState);
  if (qcProvSel) qcProvSel.addEventListener('change', updateRunFormState);

  updateRunFormState();
}

async function startRun() {
  var taskId = document.getElementById('run-task') ? document.getElementById('run-task').value : '';
  var model = document.getElementById('run-model') ? document.getElementById('run-model').value : '';
  var count = parseInt((document.getElementById('run-count') ? document.getElementById('run-count').value : '1') || '1', 10);
  var providerId = document.getElementById('run-provider') ? document.getElementById('run-provider').value : '';
  var providerEntry = getProviderEntry(providerId);
  // Derive adapter from provider (provider IS the adapter in this architecture)
  var adapter = providerEntry ? providerEntry.adapter : providerId;

  if (!taskId) { showToast('Select a task.'); return; }
  if (!providerId) { showToast('Select a provider.'); return; }
  if (!model) { showToast('Enter a model name.'); return; }
  if (count > 1) { showToast('Multi-run API batching is not available yet. Use 1 run per request.'); return; }
  if (!providerEntry) { showToast('Unknown provider: ' + providerId); return; }
  if (!providerEntry.available) { showToast('Provider unavailable: ' + (providerEntry.reason || 'check configuration')); return; }

  localStorage.setItem('crucibulum-model', model);
  localStorage.setItem('crucibulum-provider', providerId);

  var btn = document.getElementById('run-btn');
  var logBody = document.getElementById('run-log-body');
  var progressBar = document.getElementById('run-progress-bar');
  var logTask = document.getElementById('run-log-task');
  var logModel = document.getElementById('run-log-model');
  var logTimer = document.getElementById('run-log-timer');

  btn.className = 'run-btn running';
  btn.innerHTML = '<span class="run-dot">\u25C9</span> EVALUATING...';
  btn.disabled = true;
  logBody.innerHTML = '';
  progressBar.style.width = '5%';
  if (logTask) logTask.textContent = taskId;
  if (logModel) logModel.textContent = (providerEntry ? providerEntry.label : providerId) + ' \u2192 ' + model;

  // Start elapsed timer
  runStartTime = Date.now();
  if (runTimerInterval) clearInterval(runTimerInterval);
  runTimerInterval = setInterval(function() {
    if (logTimer && runStartTime) {
      var elapsed = Math.floor((Date.now() - runStartTime) / 1000);
      var mm = String(Math.floor(elapsed / 60)).padStart(2, '0');
      var ss = String(elapsed % 60).padStart(2, '0');
      logTimer.textContent = mm + ':' + ss;
    }
  }, 1000);

  try {
    // Build review config from form state
    var soEnabledChk = document.getElementById('review-so-enabled');
    var qcEnabledChk = document.getElementById('review-qc-enabled');
    var payload = {
      task: taskId,
      model: model,
      adapter: adapter,
      providerId: providerId,
      count: count,
      secondOpinion: (soEnabledChk && soEnabledChk.checked) ? {
        enabled: true,
        provider: (document.getElementById('review-so-provider') || {}).value || '',
        model: (document.getElementById('review-so-model') || {}).value || '',
      } : undefined,
      qcReview: (qcEnabledChk && qcEnabledChk.checked) ? {
        enabled: true,
        provider: (document.getElementById('review-qc-provider') || {}).value || '',
        model: (document.getElementById('review-qc-model') || {}).value || '',
      } : undefined,
    };
    var result = await api('POST', '/api/run', payload);
    var runId = result.run_id || result.runId || result.id;
    if (!runId) {
      appendLog(logBody, 'error', 'No run ID returned from API.');
      resetRunBtn();
      return;
    }

    activeRunId = runId;
    progressBar.style.width = '10%';
    appendLog(logBody, 'task_start', 'Run started: ' + runId);

    connectSSE(runId, logBody, progressBar);
  } catch (e) {
    appendLog(logBody, 'error', 'Failed to start run: ' + e.message);
    resetRunBtn();
  }
}

function connectSSE(runId, logBody, progressBar) {
  if (activeEventSource) {
    activeEventSource.close();
  }

  var url = API_BASE + '/api/run/' + encodeURIComponent(runId) + '/live';
  var es = new EventSource(url);
  activeEventSource = es;
  var stepCount = 0;
  var totalSteps = 40;

  apiLog.push({
    method: 'SSE',
    path: '/api/run/' + runId + '/live',
    status: 'ok',
    statusCode: 'STREAM',
    time: new Date().toISOString(),
    duration: null,
  });
  renderTransparencyLog();

  es.addEventListener('step', function(e) {
    try {
      var data = JSON.parse(e.data);
      stepCount++;
      var pct = Math.min(10 + (stepCount / totalSteps) * 85, 95);
      progressBar.style.width = pct + '%';

      var stepNum = String(stepCount).padStart(2, '0');
      var typeLabel = (data.type || 'step').toUpperCase();
      var detail = '';
      var logType = data.type || 'task_start';

      if (data.type === 'file_read') {
        detail = data.path || '';
        typeLabel = 'READ';
      } else if (data.type === 'file_write') {
        detail = data.path || '';
        if (data.size) detail += '  ' + data.size + 'B';
        typeLabel = 'WRITE';
      } else if (data.type === 'shell') {
        detail = (data.command || '') + (data.exit_code !== undefined ? '  EXIT ' + data.exit_code : '');
        logType = data.exit_code === 0 ? 'shell-pass' : 'shell-fail';
        typeLabel = 'SHELL';
        if (data.exit_code === 0) {
          detail += '  \u2713';
        } else {
          detail += '  \u2717';
        }
      } else if (data.type === 'search') {
        detail = data.query || data.path || '';
        typeLabel = 'SEARCH';
      } else {
        detail = data.detail || data.path || data.command || '';
      }

      appendLog(logBody, logType, '[' + stepNum + ']  ' + typeLabel.padEnd(10) + detail);
    } catch (err) {
      appendLog(logBody, 'error', 'Parse error: ' + err.message);
    }
  });

  es.addEventListener('complete', function(e) {
    progressBar.style.width = '100%';
    progressBar.style.animation = 'none';
    progressBar.style.background = 'var(--pass)';
    try {
      var data = JSON.parse(e.data);
      appendLog(logBody, 'complete', 'DONE     Task complete                    \u2713');

      if (data.score) {
        var scoreArea = document.createElement('div');
        scoreArea.className = 'run-score-result';
        var total = typeof data.score === 'number' ? Math.round(data.score * 100) : Math.round((data.score.total || 0) * 100);
        var pass = typeof data.pass === 'boolean' ? data.pass : (data.score.pass || false);
        var bd = (data.score && data.score.breakdown) || {};
        scoreArea.innerHTML =
          '<div style="display:flex;align-items:center;gap:16px;margin-bottom:20px;">' +
            '<span style="font-family:var(--font-mono);font-size:62px;font-weight:800;color:var(--' + (pass ? 'pass' : 'fail') + ');">' + total + '%</span>' +
            '<span class="badge ' + (pass ? 'badge-pass' : 'badge-fail') + '">' + (pass ? 'PASS' : 'FAIL') + '</span>' +
          '</div>' +
          renderTrustBadges() +
          '<div style="margin-top:16px;">' + renderScoreBars(bd) + '</div>';
        logBody.parentElement.appendChild(scoreArea);
      }
    } catch (err) {
      appendLog(logBody, 'complete', 'DONE     Task complete                    \u2713');
    }

    es.close();
    activeEventSource = null;
    activeRunId = null;
    if (runTimerInterval) clearInterval(runTimerInterval);
    runTimerInterval = null;
    resetRunBtn();

    loadRuns().then(function() {
      loadStats();
      updateSidebarStatus();
    });
  });

  es.addEventListener('error', function(e) {
    if (es.readyState === EventSource.CLOSED) return;
    if (e.data) {
      try {
        var data = JSON.parse(e.data);
        appendLog(logBody, 'error', 'ERROR: ' + (data.message || data.error || 'Unknown error'));
      } catch (err) {
        appendLog(logBody, 'error', 'ERROR: ' + e.data);
      }
    }
  });

  es.onerror = function() {
    if (activeRunId) {
      appendLog(logBody, 'error', 'Connection lost. Attempting reconnect...');
      setTimeout(function() {
        if (es.readyState === EventSource.CLOSED) {
          activeEventSource = null;
          activeRunId = null;
          if (runTimerInterval) clearInterval(runTimerInterval);
          runTimerInterval = null;
          resetRunBtn();
          progressBar.style.width = '0%';
          appendLog(logBody, 'error', 'Connection permanently closed.');
        }
      }, 5000);
    }
  };
}

function resetRunBtn() {
  var btn = document.getElementById('run-btn');
  if (btn) {
    btn.className = 'run-btn';
    btn.innerHTML = '\u25B6 RUN EVALUATION';
    btn.disabled = false;
  }
  runStartTime = null;
}

function appendLog(container, type, text) {
  if (!container) return;
  var idle = container.querySelector('.run-log-idle');
  if (idle) idle.remove();

  var line = document.createElement('div');
  line.className = 'log-line type-' + type;

  var now = new Date();
  var ts = String(now.getHours()).padStart(2, '0') + ':' +
           String(now.getMinutes()).padStart(2, '0') + ':' +
           String(now.getSeconds()).padStart(2, '0');

  var tsSpan = document.createElement('span');
  tsSpan.className = 'log-ts';
  tsSpan.textContent = '[' + ts + ']';
  line.appendChild(tsSpan);
  line.appendChild(document.createTextNode(text));
  container.appendChild(line);
  container.scrollTop = container.scrollHeight;
}

function renderHistory(el) {
  var uniqueTasks = [];
  var taskSet = {};
  runs.forEach(function(r) { if (r.task_id && !taskSet[r.task_id]) { taskSet[r.task_id] = true; uniqueTasks.push(r.task_id); } });
  var uniqueModels = [];
  var modelSet = {};
  runs.forEach(function(r) { if (r.model && !modelSet[r.model]) { modelSet[r.model] = true; uniqueModels.push(r.model); } });

  var taskFilterOpts = '<option value="">All Tasks</option>';
  uniqueTasks.forEach(function(t) {
    taskFilterOpts += '<option value="' + esc(t) + '" ' + (historyFilters.task === t ? 'selected' : '') + '>' + esc(t) + '</option>';
  });

  var modelFilterOpts = '<option value="">All Models</option>';
  uniqueModels.forEach(function(m) {
    modelFilterOpts += '<option value="' + esc(m) + '" ' + (historyFilters.model === m ? 'selected' : '') + '>' + esc(m) + '</option>';
  });

  var filtered = runs.filter(function(r) {
    if (historyFilters.task && r.task_id !== historyFilters.task) return false;
    if (historyFilters.model && r.model !== historyFilters.model) return false;
    if (historyFilters.status === 'pass' && !r.pass) return false;
    if (historyFilters.status === 'fail' && r.pass) return false;
    if (historyFilters.date) {
      var rd = (r.timestamp || '').slice(0, 10);
      if (rd !== historyFilters.date) return false;
    }
    return true;
  });

  if (sortState.column) {
    filtered = sortRuns(filtered, sortState.column, sortState.direction);
  }

  var rows = '';
  if (filtered.length > 0) {
    rows = filtered.map(function(r) {
      var sc = Math.round(r.score * 100);
      var badgeCls = r.pass ? 'badge-pass' : 'badge-fail';
      var badgeTxt = r.pass ? 'PASS' : 'FAIL';
      var date = formatDateShort(r.timestamp);
      return '<tr onclick="openBundle(\'' + esc(r.bundle_id || '') + '\')">' +
        '<td class="mono-bright">' + esc(shortId(r.bundle_id)) + '</td>' +
        '<td>' + esc(r.task_id || '--') + '</td>' +
        '<td>' + esc(r.provider || r.adapter || '--') + '</td>' +
        '<td>' + esc(r.model || '--') + '</td>' +
        '<td class="mono-bright">' + sc + '%</td>' +
        '<td>' + formatDuration(r.duration_sec) + '</td>' +
        '<td>' + date + '</td>' +
        '<td><span class="badge ' + badgeCls + '">' + badgeTxt + '</span></td>' +
      '</tr>';
    }).join('');
  }

  var thSorted = function(col, label) {
    var cls = '';
    if (sortState.column === col) cls = sortState.direction === 'asc' ? 'sorted-asc' : 'sorted-desc';
    return '<th class="' + cls + '" onclick="sortHistory(\'' + col + '\')">' + label + '</th>';
  };

  el.innerHTML =
    '<div class="content-constrained">' +
    '<div class="filter-row">' +
      '<select onchange="historyFilters.task=this.value;renderView()">' + taskFilterOpts + '</select>' +
      '<select onchange="historyFilters.model=this.value;renderView()">' + modelFilterOpts + '</select>' +
      '<select onchange="historyFilters.status=this.value;renderView()">' +
        '<option value="" ' + (historyFilters.status === '' ? 'selected' : '') + '>All Status</option>' +
        '<option value="pass" ' + (historyFilters.status === 'pass' ? 'selected' : '') + '>Pass</option>' +
        '<option value="fail" ' + (historyFilters.status === 'fail' ? 'selected' : '') + '>Fail</option>' +
      '</select>' +
      '<input type="date" value="' + historyFilters.date + '" onchange="historyFilters.date=this.value;renderView()" style="color-scheme:dark;">' +
      '<button class="header-btn" onclick="exportHistoryJSON()" style="margin-left:auto;">Export JSON</button>' +
    '</div>' +
    '<div class="data-table-wrap">' +
      '<div class="data-table-header">' +
        '<span class="data-table-title">All Runs</span>' +
        '<span style="font-family:var(--font-mono);font-size:12px;color:var(--accent-muted);">' + filtered.length + ' of ' + runs.length + '</span>' +
      '</div>' +
      (filtered.length > 0 ?
      '<div class="table-scroll">' +
      '<table>' +
        '<thead>' +
          '<tr>' +
            thSorted('id', 'Run ID') +
            thSorted('task', 'Task') +
            thSorted('provider', 'Provider') +
            thSorted('model', 'Model') +
            thSorted('score', 'Score') +
            thSorted('time', 'Time') +
            thSorted('date', 'Date') +
            thSorted('status', 'Status') +
          '</tr>' +
        '</thead>' +
        '<tbody>' + rows + '</tbody>' +
      '</table>' +
      '</div>' :
      '<div class="empty-state">' +
        '<div class="empty-circle"></div>' +
        '<div class="empty-title">No matching runs</div>' +
        '<div class="empty-sub">Try adjusting your filters or run an evaluation first.</div>' +
      '</div>') +
    '</div>' +
    '</div>';
}

function sortHistory(column) {
  if (sortState.column === column) {
    sortState.direction = sortState.direction === 'asc' ? 'desc' : 'asc';
  } else {
    sortState.column = column;
    sortState.direction = 'desc';
  }
  renderView();
}

function sortRuns(arr, col, dir) {
  var sorted = arr.slice();
  sorted.sort(function(a, b) {
    var va, vb;
    switch (col) {
      case 'id': va = a.bundle_id || ''; vb = b.bundle_id || ''; break;
      case 'task': va = a.task_id || ''; vb = b.task_id || ''; break;
      case 'model': va = a.model || ''; vb = b.model || ''; break;
      case 'score': va = a.score || 0; vb = b.score || 0; break;
      case 'time': va = a.duration_sec || 0; vb = b.duration_sec || 0; break;
      case 'date': va = a.timestamp || ''; vb = b.timestamp || ''; break;
      case 'status': va = a.pass ? 1 : 0; vb = b.pass ? 1 : 0; break;
      default: return 0;
    }
    if (typeof va === 'string') {
      return dir === 'asc' ? va.localeCompare(vb) : vb.localeCompare(va);
    }
    return dir === 'asc' ? va - vb : vb - va;
  });
  return sorted;
}

function exportHistoryJSON() {
  var data = JSON.stringify(runs, null, 2);
  downloadFile('crucibulum-history.json', data, 'application/json');
}

    '<div class="content-constrained">' +

      '<div class="receipts-title">Receipts</div>' +
      '<div class="receipts-tagline">Every token. Every cent. Every run. On the record.</div>' +
    '</div>' +
    '<div class="receipts-summary">' +
      '<div class="summary-tile loading-pulse"><div class="sum-label">Total Runs</div><div class="sum-value">--</div></div>' +
      '<div class="summary-tile loading-pulse"><div class="sum-label">Total Cost</div><div class="sum-value">--</div></div>' +

  var receipts = receiptData.receipts;
