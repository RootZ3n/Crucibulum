function renderBundleDrawer(bundle) {
  var titleEl = document.getElementById('bundle-drawer-title');
  var taskId = (bundle.task && bundle.task.id) || bundle.task_id || 'Bundle';
  var modelName = (bundle.agent && bundle.agent.model) || bundle.model || '';
  titleEl.textContent = taskId;
  var subEl = document.getElementById('bundle-drawer-sub');
  subEl.textContent = modelName;

  var body = document.getElementById('bundle-drawer-body');
  var sc = bundle.score || {};
  var bd = (typeof sc === 'object' && sc.breakdown) ? sc.breakdown : {};
  var total = typeof sc === 'number' ? Math.round(sc * 100) : Math.round((sc.total || 0) * 100);
  var pass = typeof bundle.pass === 'boolean' ? bundle.pass : (sc.pass || false);
  var env = bundle.environment || {};
  var sec = bundle.security || {};
  var usage = bundle.usage || {};
  var diag = bundle.diagnosis || {};
  var diff = bundle.diff || {};
  var timeline = bundle.timeline || [];

  // Meta grid
  var metaHTML =
    '<div class="bundle-meta-grid">' +
      '<div class="bundle-meta-item">' +
        '<span class="bm-label">Bundle ID</span>' +
        '<span class="bm-value" style="font-size:12px;word-break:break-all;">' + esc(bundle.bundle_id || '--') + '</span>' +
      '</div>' +
      '<div class="bundle-meta-item">' +
        '<span class="bm-label">Score</span>' +
        '<span class="bm-value" style="font-size:32px;font-weight:800;color:var(--' + (pass ? 'pass' : 'fail') + ');">' + total + '% <span class="badge ' + (pass ? 'badge-pass' : 'badge-fail') + '" style="font-size:11px;vertical-align:middle;">' + (pass ? 'PASS' : 'FAIL') + '</span></span>' +
      '</div>' +
      '<div class="bundle-meta-item">' +
        '<span class="bm-label">Task</span>' +
        '<span class="bm-value">' + esc(taskId) + ' <span style="color:var(--text-muted);font-size:11px;">' + esc((bundle.task && bundle.task.family) || '') + (bundle.task && bundle.task.difficulty ? ' / ' + esc(bundle.task.difficulty) : '') + '</span></span>' +
      '</div>' +
      '<div class="bundle-meta-item">' +
        '<span class="bm-label">Model</span>' +
        '<span class="bm-value">' + esc(modelName) + ' <span style="color:var(--text-muted);font-size:11px;">via ' + esc((bundle.agent && bundle.agent.adapter) || '') + '</span></span>' +
      '</div>' +
      '<div class="bundle-meta-item">' +
        '<span class="bm-label">Provider</span>' +
        '<span class="bm-value">' + esc((bundle.agent && bundle.agent.provider) || '--') + '</span>' +
      '</div>' +
      '<div class="bundle-meta-item">' +
        '<span class="bm-label">Judge</span>' +
        '<span class="bm-value">' + esc((bundle.judge && bundle.judge.description) || 'deterministic oracle + tests + integrity checks') + ' <span style="color:var(--active);font-size:11px;">authoritative</span></span>' +
      '</div>' +
      '<div class="bundle-meta-item">' +
        '<span class="bm-label">Timestamp</span>' +
        '<span class="bm-value" style="font-size:12px;">' + (env.timestamp_start ? formatDateFull(env.timestamp_start) : '--') + '</span>' +
      '</div>' +
      '<div class="bundle-meta-item">' +
        '<span class="bm-label">Duration</span>' +
        '<span class="bm-value">' + formatDuration(bundle.verification_results && bundle.verification_results.efficiency ? bundle.verification_results.efficiency.time_sec : (bundle.duration_sec || 0)) + '</span>' +
      '</div>' +
    '</div>';

  // Trust badges
  var trustHTML = '<div style="margin-bottom:24px;">' + renderTrustBadges() + '</div>';

  // Score Breakdown
  var scoreHTML = renderScoreBars(bd);

  // Timeline
  var timelineHTML = '';
  if (timeline.length > 0) {
    timelineHTML = timeline.map(function(t) {
      var typeCls = t.type || 'task_start';
      if (t.type === 'shell' && t.exit_code !== 0) typeCls = 'shell-fail';
      var detail = t.detail || t.path || '';
      if (t.type === 'shell') detail = (t.command || '') + (t.exit_code !== undefined ? ' (exit ' + t.exit_code + ')' : '');
      return '<div class="timeline-item">' +
        '<span class="timeline-time">' + formatTimeOffset(t.t) + '</span>' +
        '<span class="timeline-type-badge ' + typeCls + '">' + esc(t.type || 'step') + '</span>' +
        '<span class="timeline-detail">' + esc(detail) + '</span>' +
      '</div>';
    }).join('');
  } else {
    timelineHTML = '<div style="color:var(--text-muted);font-size:13px;font-style:italic;padding:10px 0;line-height:1.7;">No timeline data available.</div>';
  }

  // Diff
  var diffHTML = '';
  var changedFiles = diff.files_changed || [];
  var createdFiles = diff.files_created || [];
  var deletedFiles = diff.files_deleted || [];
  if (changedFiles.length > 0 || createdFiles.length > 0 || deletedFiles.length > 0) {
    var allFiles = []
      .concat(changedFiles.map(function(f) { return typeof f === 'string' ? { path: f, type: 'changed' } : Object.assign({}, f, { type: 'changed' }); }))
      .concat(createdFiles.map(function(f) { return typeof f === 'string' ? { path: f, type: 'created' } : Object.assign({}, f, { type: 'created' }); }))
      .concat(deletedFiles.map(function(f) { return typeof f === 'string' ? { path: f, type: 'deleted' } : Object.assign({}, f, { type: 'deleted' }); }));
    diffHTML = allFiles.map(function(f) {
      var path = f.path || f;
      var patch = f.patch || f.diff || '';
      var adds = f.additions || 0;
      var dels = f.deletions || 0;
      var patchLines = '';
      if (patch) {
        patchLines = patch.split('\n').map(function(line) {
          var cls = 'diff-line-ctx';
          if (line.startsWith('+')) cls = 'diff-line-add';
          else if (line.startsWith('-')) cls = 'diff-line-del';
          else if (line.startsWith('@@')) cls = 'diff-line-hdr';
          return '<span class="' + cls + '">' + esc(line) + '</span>';
        }).join('\n');
      }
      return '<div class="diff-file">' +
        '<div class="diff-file-header">' +
          '<span>' + esc(typeof path === 'string' ? path : JSON.stringify(path)) + '</span>' +
          (adds ? '<span class="diff-stat-add">+' + adds + '</span>' : '') +
          (dels ? '<span class="diff-stat-del">-' + dels + '</span>' : '') +
          '<span style="color:var(--text-muted);font-size:10px;margin-left:auto;letter-spacing:0.06em;text-transform:uppercase;">' + f.type + '</span>' +
        '</div>' +
        (patch ? '<div class="diff-patch">' + patchLines + '</div>' : '') +
      '</div>';
    }).join('');
  } else {
    diffHTML = '<div style="color:var(--text-muted);font-size:13px;font-style:italic;padding:10px 0;line-height:1.7;">No file changes recorded.</div>';
  }

  // Security
  var secHTML =
    '<div class="security-grid">' +
      '<div class="security-item">' +
        '<span class="sec-icon ' + (sec.injection_scan === 'clean' ? 'clean' : 'violation') + '">' + (sec.injection_scan === 'clean' ? '\u2713' : '\u2718') + '</span>' +
        '<span class="sec-label">Injection Scan: ' + esc(sec.injection_scan || '--') + '</span>' +
      '</div>' +
      '<div class="security-item">' +
        '<span class="sec-icon ' + ((sec.forbidden_paths_violations || 0) === 0 ? 'clean' : 'violation') + '">' + ((sec.forbidden_paths_violations || 0) === 0 ? '\u2713' : '\u2718') + '</span>' +
        '<span class="sec-label">Forbidden Paths: ' + (sec.forbidden_paths_violations || 0) + '</span>' +
      '</div>' +
      '<div class="security-item">' +
        '<span class="sec-icon ' + ((sec.anti_cheat_violations || 0) === 0 ? 'clean' : 'violation') + '">' + ((sec.anti_cheat_violations || 0) === 0 ? '\u2713' : '\u2718') + '</span>' +
        '<span class="sec-label">Anti-Cheat: ' + (sec.anti_cheat_violations || 0) + '</span>' +
      '</div>' +
      '<div class="security-item">' +
        '<span class="sec-icon ' + ((sec.workspace_escape_attempts || 0) === 0 ? 'clean' : 'violation') + '">' + ((sec.workspace_escape_attempts || 0) === 0 ? '\u2713' : '\u2718') + '</span>' +
        '<span class="sec-label">Workspace Escape: ' + (sec.workspace_escape_attempts || 0) + '</span>' +
      '</div>' +
    '</div>';

  // Usage
  var usageHTML =
    '<div class="usage-grid">' +
      '<div class="usage-item">' +
        '<span class="usage-label">Tokens In</span>' +
        '<span class="usage-value">' + (usage.tokens_in || 0).toLocaleString() + '</span>' +
      '</div>' +
      '<div class="usage-item">' +
        '<span class="usage-label">Tokens Out</span>' +
        '<span class="usage-value">' + (usage.tokens_out || 0).toLocaleString() + '</span>' +
      '</div>' +
      '<div class="usage-item">' +
        '<span class="usage-label">Est. Cost</span>' +
        '<span class="usage-value">$' + (usage.estimated_cost_usd || 0).toFixed(4) + '</span>' +
      '</div>' +
    '</div>' +
    (usage.provider_cost_note ? '<div style="font-family:var(--font-mono);font-size:11px;color:var(--text-muted);margin-top:10px;font-style:italic;line-height:1.7;">' + esc(usage.provider_cost_note) + '</div>' : '');

  // Diagnosis
  var diagChecks = [
    { key: 'localized_correctly', label: 'Localized Correctly' },
    { key: 'avoided_decoys', label: 'Avoided Decoys' },
    { key: 'first_fix_correct', label: 'First Fix Correct' },
    { key: 'self_verified', label: 'Self Verified' },
  ];
  var diagHTML = diagChecks.map(function(c) {
    var val = diag[c.key];
    var icon = val === true ? '\u2713' : val === false ? '\u2718' : '\u2014';
    var iconCls = val === true ? 'yes' : val === false ? 'no' : '';
    return '<div class="diagnosis-check">' +
      '<span class="diag-icon ' + iconCls + '">' + icon + '</span>' +
      '<span>' + c.label + '</span>' +
    '</div>';
  }).join('');
  if (diag.failure_mode) {
    diagHTML += '<div style="font-family:var(--font-mono);font-size:12px;color:var(--warn);margin-top:10px;line-height:1.7;">Failure mode: ' + esc(diag.failure_mode) + '</div>';
  }

  // Assemble
  body.innerHTML = metaHTML + trustHTML +
    buildSection('Score Breakdown', 'score-section', scoreHTML) +
    buildSection('Timeline', 'timeline-section', '<div style="max-height:300px;overflow-y:auto;">' + timelineHTML + '</div>') +
    buildSection('Diff', 'diff-section', diffHTML) +
    buildSection('Security', 'security-section', secHTML) +
    buildSection('Usage', 'usage-section', usageHTML) +
    buildSection('Diagnosis', 'diagnosis-section', '<div class="diagnosis-grid">' + diagHTML + '</div>') +
    buildReviewSection(bundle);

  wireCollapsibleSections(body);
}

function wireCollapsibleSections(container) {
  container.querySelectorAll('.bundle-section-header').forEach(function(h) {
    h.addEventListener('click', function() {
      h.classList.toggle('collapsed');
      h.nextElementSibling.classList.toggle('collapsed');
    });
  });
}

function buildSection(title, id, content) {
  return '<div class="bundle-section" id="' + id + '">' +
    '<div class="bundle-section-header">' +
      '<span class="section-title">' + title + '</span>' +
      '<span class="section-toggle">\u25BC</span>' +
    '</div>' +
    '<div class="bundle-section-content">' + content + '</div>' +
  '</div>';
}

function buildReviewSection(bundle) {
  var review = bundle.review;
  if (!review) return '';
  var reviewSecurity = review.security || {};

  function renderReviewSecurity() {
    var lines = [
      '<div><span style="color:var(--text-muted);font-size:11px;text-transform:uppercase;">Authority:</span> deterministic (authoritative)</div>',
      '<div><span style="color:var(--text-muted);font-size:11px;text-transform:uppercase;">Review role:</span> advisory only</div>',
      '<div style="color:var(--active);font-size:12px;">Deterministic result authoritative</div>'
    ];
    if (reviewSecurity.review_input_scanned) {
      lines.push('<div style="color:var(--pass);font-size:12px;">Review input sanitized</div>');
    }
    if ((reviewSecurity.injection_flags_count || 0) > 0) {
      lines.push('<div style="color:var(--warn);font-size:12px;">Injection flags detected: ' + esc(String(reviewSecurity.injection_flags_count)) + '</div>');
    }
    if (reviewSecurity.review_blocked_reason) {
      lines.push('<div style="color:var(--fail);font-size:12px;">Review blocked: ' + esc(reviewSecurity.review_blocked_reason) + '</div>');
    }
    if (reviewSecurity.review_output_invalid) {
      lines.push('<div style="color:var(--warn);font-size:12px;">Invalid review output rejected</div>');
    }
    return '<div style="margin-bottom:16px;font-size:13px;line-height:1.7;">' + lines.join('') + '</div>';
  }

  function renderReview(label, r) {
    if (!r || !r.enabled) return '<div style="color:var(--text-muted);font-size:13px;">Off</div>';
    if (r.status === 'blocked_injection') {
      return '<div style="color:var(--fail);font-size:13px;">Review blocked</div>' +
        '<div style="color:var(--text-secondary);font-size:12px;margin-top:6px;">' + esc(r.summary || 'Prompt-injection indicators detected in review input.') + '</div>';
    }
    if (r.status === 'invalid_output') {
      return '<div style="color:var(--warn);font-size:13px;">Invalid output rejected</div>' +
        '<div style="color:var(--text-secondary);font-size:12px;margin-top:6px;">' + esc(r.error || 'Schema validation failed.') + '</div>';
    }
    if (r.status === 'error') {
      return '<div style="color:var(--fail);font-size:13px;">Error: ' + esc(r.error || 'unknown') + '</div>';
    }
    if (r.status === 'skipped') {
      return '<div style="color:var(--text-muted);font-size:13px;">Skipped</div>';
    }
    var flagsHtml = (r.flags && r.flags.length > 0)
      ? r.flags.map(function(f) { return '<div style="color:var(--warn);font-size:12px;margin-left:8px;">\u26A0 ' + esc(f) + '</div>'; }).join('')
      : '<div style="color:var(--text-muted);font-size:12px;margin-left:8px;">No flags</div>';
    var recColor = r.recommendation === 'accept' ? 'var(--pass)' : r.recommendation === 'challenge' ? 'var(--fail)' : 'var(--warn)';
    var disagreeHtml = r.disagreement
      ? '<div style="color:var(--fail);font-weight:600;font-size:12px;margin-top:4px;">\u26A0 Disagreement detected</div>'
      : '';
    return '<div style="font-size:13px;line-height:1.7;">' +
      '<div><span style="color:var(--text-muted);font-size:11px;text-transform:uppercase;">Provider:</span> ' + esc(r.provider || '--') + ' / ' + esc(r.model || '--') + '</div>' +
      '<div><span style="color:var(--text-muted);font-size:11px;text-transform:uppercase;">Confidence:</span> ' + esc(r.confidence || '--') + '</div>' +
      '<div><span style="color:var(--text-muted);font-size:11px;text-transform:uppercase;">Recommendation:</span> <span style="color:' + recColor + ';">' + esc(r.recommendation || '--') + '</span></div>' +
      disagreeHtml +
      '<div style="margin-top:6px;">' + esc(r.summary || '') + '</div>' +
      '<div style="margin-top:4px;"><span style="color:var(--text-muted);font-size:11px;text-transform:uppercase;">Flags:</span></div>' +
      flagsHtml +
    '</div>';
  }

  var html =
    renderReviewSecurity() +
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;">' +
      '<div>' +
        '<div style="font-family:var(--font-mono);font-size:11px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-muted);margin-bottom:8px;">Second Opinion</div>' +
        renderReview('Second Opinion', review.secondOpinion) +
      '</div>' +
      '<div>' +
        '<div style="font-family:var(--font-mono);font-size:11px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-muted);margin-bottom:8px;">QC Review</div>' +
        renderReview('QC Review', review.qcReview) +
      '</div>' +
    '</div>';

  return buildSection('Review Layer', 'review-section', html);
}

/* =========================================================================
   TRANSPARENCY LOG
   ========================================================================= */
function toggleTransparency() {
  var overlay = document.getElementById('transparency-overlay');
  var drawer = document.getElementById('transparency-drawer');
  var isOpen = drawer.classList.contains('open');
  if (isOpen) {
    overlay.classList.remove('open');
    drawer.classList.remove('open');
  } else {
    overlay.classList.add('open');
    drawer.classList.add('open');
    renderTransparencyLog();
  }
}

function renderTransparencyLog() {
  var body = document.getElementById('transparency-drawer-body');
  var count = document.getElementById('transparency-count');
  if (!body) return;
  count.textContent = apiLog.length + ' request' + (apiLog.length === 1 ? '' : 's');

  if (apiLog.length === 0) {
    body.innerHTML = '<div class="transparency-empty">No API calls recorded yet.</div>';
    return;
  }

  body.innerHTML = apiLog.slice().reverse().map(function(e) {
    var time = e.time ? new Date(e.time).toLocaleTimeString() : '--';
    var statusCls = e.status === 'ok' ? 's-ok' : e.status === 'pending' ? 's-pending' : 's-err';
    var dur = e.duration !== null ? e.duration + 'ms' : '--';
    return '<div class="api-log-entry">' +
      '<span class="log-time">' + time + '</span>' +
      '<span class="log-method">' + esc(e.method) + '</span>' +
      '<span class="log-url" title="' + esc(e.path) + '">' + esc(e.path) + '</span>' +
      '<span class="log-status ' + statusCls + '">' + e.statusCode + '</span>' +
      '<span class="log-dur">' + dur + '</span>' +
    '</div>';
  }).join('');
}

function clearApiLog() {
  apiLog = [];
  renderTransparencyLog();
}

/* =========================================================================
   SHARED RENDER HELPERS
   ========================================================================= */
function renderScoreBars(breakdown) {
  if (!breakdown || typeof breakdown !== 'object') {
    return '<div style="color:var(--text-muted);font-size:13px;font-style:italic;padding:10px 0;line-height:1.7;">No score breakdown available.</div>';
  }
  var bars = [
    { key: 'correctness', label: 'Correctness', cls: 'correctness' },
    { key: 'regression',  label: 'Regression',  cls: 'regression' },
    { key: 'integrity',   label: 'Integrity',   cls: 'integrity' },
    { key: 'efficiency',  label: 'Efficiency',  cls: 'efficiency' },
  ];
  return '<div class="score-bars">' +
    bars.map(function(b) {
      var val = Math.round((breakdown[b.key] || 0) * 100);
      return '<div class="score-bar-row">' +
        '<span class="score-bar-label">' + b.label + '</span>' +
        '<div class="score-bar-track">' +
          '<div class="score-bar-fill ' + b.cls + '" style="width:' + val + '%"></div>' +
        '</div>' +
        '<span class="score-bar-pct">' + val + '%</span>' +
      '</div>';
    }).join('') +
  '</div>';
}

/* =========================================================================
   UTILITY
   ========================================================================= */
function esc(str) {
  if (str === null || str === undefined) return '';
  var d = document.createElement('div');
  d.textContent = String(str);
  return d.innerHTML;
}

function shortId(id) {
  if (!id) return '--';
  var s = id.replace(/^run_/, '');
  if (s.length > 16) return s.slice(0, 8) + '\u2026' + s.slice(-4);
  return s;
}

function formatDuration(sec) {
  if (!sec && sec !== 0) return '--';
  sec = Math.round(sec);
  if (sec < 60) return sec + 's';
  var m = Math.floor(sec / 60);
  var s = sec % 60;
  return m + 'm ' + s + 's';
}

function formatDateShort(isoStr) {
  if (!isoStr) return '--';
  try {
    var d = new Date(isoStr);
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
  } catch (e) { return '--'; }
}

function formatDateFull(isoStr) {
  if (!isoStr) return '--';
  try {
    var d = new Date(isoStr);
    return d.toLocaleString('en-US', {
      year: 'numeric', month: 'short', day: 'numeric',
      hour: '2-digit', minute: '2-digit', second: '2-digit',
    });
  } catch (e) { return '--'; }
}

function formatTimeOffset(ms) {
  if (ms === null || ms === undefined) return '--';
  if (ms < 1000) return ms + 'ms';
  var sec = (ms / 1000).toFixed(1);
  return sec + 's';
}

function downloadFile(filename, content, mimeType) {
  var blob = new Blob([content], { type: mimeType });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function showToast(msg) {
  var toast = document.getElementById('crucibulum-toast');
  toast.textContent = msg;
  toast.style.opacity = '1';
  clearTimeout(toast._timer);
  toast._timer = setTimeout(function() { toast.style.opacity = '0'; }, 2500);
}

/* =========================================================================
   KEYBOARD SHORTCUTS
   ========================================================================= */
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    closeBundle();
    var td = document.getElementById('transparency-drawer');
    if (td.classList.contains('open')) toggleTransparency();
    return;
  }

  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT' || e.target.tagName === 'TEXTAREA') return;

  var navMap = { '1': 'dashboard', '2': 'run', '3': 'history', '4': 'receipts' };
  if (navMap[e.key]) {
    navigate(navMap[e.key]);
    return;
  }

  if (e.key === 'r' && !e.ctrlKey && !e.metaKey) {
    refreshData();
    return;
  }
});

/* =========================================================================
   INIT
   ========================================================================= */
async function init() {
  renderSidebar();

  document.getElementById('main-content').innerHTML =
    '<div class="content-constrained">' +
      '<div class="summary-metrics">' +
        '<div class="metric-tile loading-pulse accent-blue"><span class="metric-label">Total Runs</span><span class="metric-value" style="font-size:26px;">--</span></div>' +
        '<div class="metric-tile loading-pulse accent-green"><span class="metric-label">Pass Rate</span><span class="metric-value" style="font-size:26px;">--</span></div>' +
        '<div class="metric-tile loading-pulse accent-amber"><span class="metric-label">Avg Score</span><span class="metric-value" style="font-size:26px;">--</span></div>' +
        '<div class="metric-tile loading-pulse accent-secondary"><span class="metric-label">Avg Time</span><span class="metric-value" style="font-size:26px;">--</span></div>' +
      '</div>' +
    '</div>';

  try {
    await Promise.all([loadRuns(), loadTasks(), loadAdapters(), loadModels(), loadProviders()]);
  } catch (e) {
    console.warn('Init load partial failure:', e.message);
  }

  await loadStats();
  updateSidebarStatus();
  renderView();
}

/* =========================================================================
   LEADERBOARD VIEW
   ========================================================================= */

var leaderboardData = [];
var leaderboardScores = [];
var leaderboardTab = 'global';
var leaderboardFamily = 'G';

async function loadLeaderboard() {
  try {
    var res = await api('GET', '/api/scores/leaderboard');
    leaderboardData = res.leaderboard || [];
  } catch (e) {
    console.warn('Leaderboard load failed:', e.message);
    leaderboardData = [];
  }
}

function scoreCell(val) {
  if (val === null || val === undefined) return '<td class="text-muted">—</td>';
  var cls = val >= 80 ? 'color:var(--pass)' : val >= 60 ? 'color:var(--warn)' : 'color:var(--fail)';
  return '<td style="' + cls + ';font-family:var(--font-mono)">' + Math.round(val) + '</td>';
}

function renderLeaderboard(el) {
  loadLeaderboard().then(function() {
    var tabs = '<div style="display:flex;gap:8px;margin-bottom:16px">' +
      ['global','family','personality'].map(function(t) {
        var active = leaderboardTab === t;
        var label = t === 'global' ? 'Global Ranking' : t === 'family' ? 'Per-Family' : 'Personality (G)';
        return '<button onclick="leaderboardTab=\'' + t + '\';renderView()" ' +
          'style="padding:8px 16px;border-radius:6px;border:1px solid ' +
          (active ? 'var(--active)' : 'var(--border-subtle)') + ';background:' +
          (active ? 'var(--active)' : 'var(--surface)') + ';color:' +
          (active ? '#fff' : 'var(--text-secondary)') + ';cursor:pointer;font-size:13px">' +
          label + '</button>';
      }).join('') + '</div>';

    if (leaderboardData.length === 0) {
      el.innerHTML = '<div class="content-constrained">' + tabs +
        '<div class="empty-state"><div class="empty-icon"></div>' +
        '<div class="empty-title">No scores yet</div>' +
        '<div class="empty-subtitle">Run some tasks or sync scores from Veritor to see the leaderboard.</div></div></div>';
      return;
    }

    var body = '';
    if (leaderboardTab === 'global') {
      body = renderGlobalRanking();
    } else if (leaderboardTab === 'family') {
      body = renderFamilyRanking();
    } else {
      body = renderPersonalityView();
    }

    el.innerHTML = '<div class="content-constrained">' + tabs + body + '</div>';
  });
}

function renderGlobalRanking() {
  var families = ['A','B','C','D','E','F','G','H','I'];
  var header = '<tr><th>#</th><th>Model</th><th>Composite</th>' +
    families.map(function(f) { return '<th>' + f + '</th>'; }).join('') +
    '<th>Runs</th><th>Source</th></tr>';

  var rows = leaderboardData.map(function(entry, i) {
    var badge = '<span class="badge" style="background:var(--surface-raised);padding:2px 6px;border-radius:4px;font-size:11px">' +
      esc(entry.source) + '</span>';
    return '<tr><td>' + (i + 1) + '</td><td style="font-family:var(--font-mono)">' + esc(entry.modelId) + '</td>' +
      scoreCell(entry.composite) +
      families.map(function(f) { return scoreCell(entry.families[f]); }).join('') +
      '<td>' + entry.totalRuns + '</td><td>' + badge + '</td></tr>';
  }).join('');

  return '<div class="panel" style="border-top:3px solid var(--teal)">' +
    '<h3 style="margin:0 0 12px;font-size:15px">Global Model Ranking</h3>' +
    '<p style="color:var(--text-muted);font-size:12px;margin-bottom:12px">Weighted composite: A(20%) B(25%) C(25%) D(10%) E(5%) F(5%) G(5%) H(5%) I(5%)</p>' +
    '<div class="table-scroll"><table class="data-table"><thead>' + header + '</thead><tbody>' + rows + '</tbody></table></div></div>';
}

function renderFamilyRanking() {
  var families = ['A','B','C','D','E','F','G','H','I'];
  var familyNames = {A:'Adversarial',B:'Capability',C:'Coordination',D:'Self-Knowledge',E:'Truthfulness',F:'Proactive',G:'Personality',H:'SWE Benchmark',I:'Cost/Efficiency'};

  var selector = '<div style="margin-bottom:12px"><select onchange="leaderboardFamily=this.value;renderView()" style="padding:6px 12px;background:var(--surface);border:1px solid var(--border-subtle);border-radius:6px;color:var(--text-primary);font-size:13px">' +
    families.map(function(f) {
      return '<option value="' + f + '"' + (leaderboardFamily === f ? ' selected' : '') + '>' +
        f + ' — ' + familyNames[f] + '</option>';
    }).join('') + '</select></div>';

  var filtered = leaderboardData.filter(function(e) { return e.families[leaderboardFamily] !== null; })
    .sort(function(a, b) { return (b.families[leaderboardFamily] || 0) - (a.families[leaderboardFamily] || 0); });

  if (filtered.length === 0) {
    return selector + '<div class="empty-state"><div class="empty-title">No scores for Family ' + leaderboardFamily + '</div></div>';
  }

  var rows = filtered.map(function(entry, i) {
    var score = entry.families[leaderboardFamily];
    return '<tr><td>' + (i + 1) + '</td><td style="font-family:var(--font-mono)">' + esc(entry.modelId) + '</td>' +
      scoreCell(score) + '<td>' + entry.totalRuns + '</td></tr>';
  }).join('');

  return selector +
    '<div class="panel" style="border-top:3px solid var(--active)">' +
    '<h3 style="margin:0 0 12px;font-size:15px">Family ' + leaderboardFamily + ' — ' + familyNames[leaderboardFamily] + '</h3>' +
    '<div class="table-scroll"><table class="data-table"><thead><tr><th>#</th><th>Model</th><th>Score</th><th>Runs</th></tr></thead><tbody>' + rows + '</tbody></table></div></div>';
}

function renderPersonalityView() {
  var filtered = leaderboardData.filter(function(e) { return e.families.G !== null; })
    .sort(function(a, b) { return (b.families.G || 0) - (a.families.G || 0); });

  if (filtered.length === 0) {
    return '<div class="empty-state"><div class="empty-title">No personality scores yet</div>' +
      '<div class="empty-subtitle">Run personality-001 through personality-005 to populate this view.</div></div>';
  }

  // Radar chart SVG for each model (simplified polar chart)
  var dims = ['Directness','No Corporate','No Fabrication','Consistency','Self Knowledge'];
  var cards = filtered.map(function(entry) {
    var score = entry.families.G || 0;
    var cls = score >= 80 ? 'var(--pass)' : score >= 60 ? 'var(--warn)' : 'var(--fail)';

    // SVG radar chart
    var cx = 80, cy = 80, r = 60;
    var n = dims.length;
    var points = [];
    for (var j = 0; j < n; j++) {
      // Use composite score as proxy for all dims (individual task scores need separate query)
      var val = score / 100;
      var angle = (Math.PI * 2 * j / n) - Math.PI / 2;
      points.push((cx + r * val * Math.cos(angle)).toFixed(1) + ',' + (cy + r * val * Math.sin(angle)).toFixed(1));
    }
    var gridLines = '';
    for (var ring = 0.25; ring <= 1; ring += 0.25) {
      var gp = [];
      for (var k = 0; k < n; k++) {
        var ga = (Math.PI * 2 * k / n) - Math.PI / 2;
        gp.push((cx + r * ring * Math.cos(ga)).toFixed(1) + ',' + (cy + r * ring * Math.sin(ga)).toFixed(1));
      }
      gridLines += '<polygon points="' + gp.join(' ') + '" fill="none" stroke="var(--border-subtle)" stroke-width="0.5"/>';
    }
    var labels = '';
    for (var l = 0; l < n; l++) {
      var la = (Math.PI * 2 * l / n) - Math.PI / 2;
      var lx = cx + (r + 15) * Math.cos(la);
      var ly = cy + (r + 15) * Math.sin(la);
      labels += '<text x="' + lx.toFixed(1) + '" y="' + ly.toFixed(1) + '" text-anchor="middle" fill="var(--text-muted)" font-size="8">' + dims[l] + '</text>';
    }

    var svg = '<svg width="160" height="160" viewBox="0 0 160 160">' +
      gridLines + labels +
      '<polygon points="' + points.join(' ') + '" fill="' + cls + '" fill-opacity="0.2" stroke="' + cls + '" stroke-width="1.5"/>' +
      '</svg>';

    return '<div class="panel" style="border-top:3px solid ' + cls + ';display:inline-block;width:280px;vertical-align:top;margin:8px">' +
      '<h4 style="margin:0 0 8px;font-size:13px;font-family:var(--font-mono)">' + esc(entry.modelId) + '</h4>' +
      '<div style="text-align:center">' + svg + '</div>' +
      '<div style="text-align:center;margin-top:8px"><span style="font-size:24px;font-weight:600;color:' + cls + '">' + Math.round(score) + '%</span>' +
      '<span style="color:var(--text-muted);font-size:12px;margin-left:6px">personality score</span></div></div>';
  }).join('');

  return '<div class="panel" style="border-top:3px solid var(--pink)">' +
    '<h3 style="margin:0 0 12px;font-size:15px">Personality Profile — Family G</h3>' +
    '<p style="color:var(--text-muted);font-size:12px;margin-bottom:12px">Sub-dimensions: Directness, No Corporate Speak, No Fabrication, Character Consistency, Self Knowledge</p>' +
    '</div>' +
    '<div style="display:flex;flex-wrap:wrap;gap:0">' + cards + '</div>';
}

document.addEventListener('DOMContentLoaded', init);
</script>
